body:
  text: 卷七仲景瀉心湯大黃酒炒二錢黃連三錢黃芩四錢心為君火化生血液是血即火之魄火即血之魂火升故血升火降即血降也知血生於火火主於心則知瀉心即是瀉火瀉火即是止血得力大黃一味逆折而下兼能破瘀逐陳使不為患此味今人多不敢用不知氣逆血升得此猛降之藥以損陽和陰真聖藥也且非徒下胃中之氣而已即外而經脈肌膚凡屬氣逆於血分之中者大黃之性亦無不達蓋其氣最盛凡人身氣血凝聚彼皆能以其藥氣克而治之使氣之逆者不敢不順今人不敢用往往留邪為患惜哉方名瀉心乃仲景探源之治能從此悟得血生於心心即是火之義於血證思過半矣十灰散大薊小薊茅根棕皮側柏大黃丹皮荷葉茜草梔子各等分上藥燒存性為末鋪地出火氣童便酒水隨引黑為水之色紅見黑即止水勝火之義也故燒灰取黑得力全在山梔之清大黃之降火清氣降而血自寧余藥皆行血之品只借以嚮導耳吹鼻止衄刃傷止血皆可用之獨參湯人參二兩濃煎細咽熟睡取養胃之陰安護其氣氣不脫則血不奔矣世以黨參代之並認為陽藥不知人參柔潤甘寒乃滋養中宮津液之藥人之真氣生於腎中全賴水陰含之出納於肺又賴水津以濡之故腎中水陰足則氣足而呼吸細肺中之水津足則氣足而喘息平人參滋補中宮之津液上布於肺下輸於腎故肺腎之氣得所補益世人不知氣為水之所化而以屬陽妄指參為陽藥幸陳修園力辨其誣而修園謂壯火食氣參瀉壯火故補氣其說猶有隔膜尚未識氣即是水之理吾於總論言之甚詳須知氣即是水而人參之真面乃見甘草乾薑湯甘草三錢炙乾薑二錢炮五味子一錢甘草炙過純於補中乾薑變黑兼能止血二藥辛甘合化扶陽氣以四達血自運行而不滯矣惟五味收斂肺氣使不上逆以止氣者止血凡陽虛脾不攝血者應手取效但血系陰汁血虧即是陰虧剛燥之劑往往忌用必審其脈證果系虛寒者始可投此方四物湯當歸四錢生地四錢川芎二錢白芍三錢柯韻伯曰心生血肝藏血故凡生血者則究之於心調血者當求之於肝也是方乃肝經調血之專劑非心經生血之主方也當歸和血川芎活血芍藥斂血地黃補血四物具生長收藏之用故能使榮氣安行經邃若血虛加參耆血結加桃仁紅花血閉加大黃芒硝血寒加桂附血熱加芩連欲行血去芍欲止血去芎隨宜加減則不拘於四物矣如遇血崩血暈等證四物不能驟補而反助其滑脫又當補氣生血助陽生陰長之理蓋此方能補有形之血於平時不能生無形之氣於倉卒能調陰中之血而不能培真陰之本韻伯此論雖有不足於四物然謂四物為肝經調血之專劑則深知四物之長者矣蓋肝主藏血衝任血海均屬於肝故調血者舍四物不能為功白虎湯石膏一兩知母五錢甘草二錢粳米一撮四藥甘寒生胃陰清胃火陽明燥熱得此如金飈夕起暑酷全消故以秋金白虎名湯乃仲景傷寒陽明之正方借治血症脈洪大發熱口渴者尤有捷效佛手散即歸芎湯當歸五錢川芎三錢酒水各半煎服辛以行氣溫以行血有汁能生血二味為活血行血之要藥失笑散蒲黃三錢五靈脂五錢蒲生水中花香行水水即氣也水行則氣行氣止則血止故蒲黃能止刀傷之血靈脂氣味溫行以行血二者合用大能行血也大柴胡湯柴胡三錢半夏三錢白芍三錢黃芩三錢枳殼二錢大黃錢半生薑三錢大棗三枚黃芩一味清表裡之火薑棗柴胡使邪從表解半夏白芍枳殼大黃使邪從里解乃表裡兩解之劑而用里藥較多後之雙解散通聖散皆從此套出借治血症或加表藥或加血藥可以隨宜致用逍遙散加丹梔名丹梔逍遙散柴胡三錢當歸四錢白芍三錢白朮三錢雲苓三錢甘草錢半薄荷一錢煨姜三錢丹皮三錢梔子二錢此治肝經血虛火旺鬱鬱不樂方用白朮茯苓助土德以升木當歸白芍益榮血以養肝薄荷解熱甘草緩中柴姜升發木鬱則達之遂其曲直之性故名之曰逍遙如火甚血不和者加丹皮山梔清理心包心包主火與血為肝之子為火之母治心包之血即是治肝之血瀉心包之火即是瀉肝之火以子母同氣故也當歸蘆薈湯當歸一兩膽草一兩蘆薈五錢青黛五錢梔子一兩黃連一兩黃柏一兩黃芩一兩大黃五錢木香二錢半麝香五分舊用神麯糊丸薑湯送下借治血病用酒丸童便下尤佳人身惟肝火最橫每挾諸經之火相持為害方用青黛蘆薈膽草直折本經之火芩連梔柏大黃分瀉各經之火火盛則氣實故以二香以行氣火盛則血虛故君當歸以補血治肝火決裂者惟此方最有力量莫嫌其多瀉少補也地黃湯熟地一兩山藥五錢山萸肉五錢茯苓三錢丹皮三錢澤瀉三錢陳修園謂人之既生以後天生先天全賴中宮輸精及腎而後腎得補益謂此方非補腎正藥然腎經水虛火旺者實不可離方取熟地以滋腎水而又恐肝木盜水之氣故用山萸以養肝之陰補子正以實母也再用山藥補脾土啓水津以給腎用丹皮清心胞瀉火邪以安腎庶幾腎中之水得以充足特慮有形之水質不化則無形之水津亦不能生尤妙茯苓澤瀉化氣利水以瀉為補雖非生水之正藥而實滋水之要藥花蕊石散花蕊石煅為末每服三錢男用酒調服女用醋水服瘀血化水而下按此藥獨得一氣之偏神於化血他藥行血皆能傷氣此獨能使血自化而氣不傷真去瘀妙品側柏葉湯側柏葉三錢炮姜錢半艾葉三錢馬通二兩熱氣藏伏於陰分逼血妄行不止用姜艾宣發其熱使行陽分則陰分之血無所逼而守其經矣柏葉屬金抑之使降馬為火畜同氣相求導之使下則餘燼之瘀一概蠲去此為熱伏陰分從治之法乃久吐不止一切寒溫補瀉藥幾用盡因變一法以從治之凡遇熱症用之須慎若系寒凝血滯者則無不宜馬通汁即馬糞泡水無馬通以童便代之人參瀉肺湯人參三錢黃芩三錢梔子三錢枳殼二錢甘草一錢連翹一錢杏仁三錢桔梗二錢桑皮三錢大黃一錢酒炒薄荷一錢葶藶大棗瀉肺湯是瀉肺中之水此方是瀉肺中之火肺體屬金不自生火皆由心火克之胃火熏之也故用梔子連翹以瀉心火黃芩大黃以瀉胃火肺為火鬱則皮毛灑淅用薄荷以發之肺金不清則水道不調用桑皮以泄之火盛即是氣盛用枳桔杏仁以利之而人參甘草又補土生金以主持之補瀉兼行調停盡善實從葶藶大棗湯套出變瀉水為瀉火之法凡上焦血滯痰凝因火所致者均可隨證加減甲己化土湯白芍五錢甘草三錢楊西山失血大法以此為主方而極贊其妙其實芍藥入肝歸芎桃仁善去舊血以生新血佐黑姜炙草引三味入於肺肝生血利氣為産後之聖藥各書多改炙草為益母草不知益母乃涼血利水之藥此方取其化血即能生血如益母草焉有生血之功與方名相左吾以為治紅痢尿血或可用之若此方斷不可用牛膝散牛膝三錢川芎錢半蒲黃三錢丹皮三錢桂心三錢當歸四錢當歸川芎蒲黃丹皮四藥和血桂枝辛溫以行之牛膝下走以引之用治下焦瘀血溫通經脈無不應驗方義亦淺而易見桃仁承氣湯桃仁五錢大黃二錢芒硝三錢桂枝二錢桂枝稟肝經木火之氣肝氣亢者見之即熾肝氣結者遇之即行故血證有宜有忌此方取其辛散合硝黃桃仁直入下焦破利結血瘀血去路不外二便硝黃引從大便出而桂枝兼化小水此又是一層意義小調經湯當歸三錢赤芍三錢沒藥二錢琥珀二錢桂枝二錢細辛五分麝香少許當歸補血赤芍行血樹脂似人之血沒藥為樹脂所結故能治結血琥珀乃樹脂所化故能化死血四藥專治瘀血亦云備矣而又恐不能內行外達也故領以辛桂麝香使藥性無所不到而內外上下自無伏留之瘀血所以不循經常者多是瘀血阻滯去瘀即是調經小柴胡湯柴胡八錢川産為真黃芩三錢半夏三錢大棗三枚人參二錢甘草一錢生薑二錢此方乃達表和里升清降濁之活劑人身之表腠理實營衛之樞機人身之裡三焦實臟腑之總管惟少陽內主三焦外主腠理論少陽之體則為相火之氣根於膽腑論少陽之用則為清陽之氣寄在胃中方取參棗甘草以培養其胃而用黃芩半夏降其濁火柴胡生薑升其清陽是以其氣和暢而腠理三焦罔不調治其有太陽之氣陷於胸前而不出者亦用此方以能清裡和中升達其氣則氣不結而外解矣有肺經鬱火大小便不利亦用此者以其宣通上焦則津液不結自能下行肝經鬱火而亦用此以能引肝氣使之上達則木不郁且其中兼有清降之品故餘火自除矣其治熱入血室諸病則尤有深義人身之血乃中焦受氣取汁變化而赤即隨陽明所屬衝任兩脈以下藏於肝此方非肝膽臟腑中之藥乃從胃中清達肝膽之氣者也胃為生血之主治胃中是治血海之上源血為肝之所司肝氣既得清達則血分之郁自解是正治法即是隔治法其靈妙有如此者犀角地黃湯犀角錢半生地五錢白芍三錢丹皮三錢犀牛土屬而秉水精地黃土色而含水質二物皆得水土之氣能滋胃陰清胃火乃治胃經血熱之正藥然君火之主在心故用丹皮以清心相火所寄在肝故用白芍以平肝使君相二火不湊集於胃則胃自清而血安甘露飲天門冬三錢麥門冬三錢生地黃三錢熟地黃三錢黃芩三錢枳殼一錢石斛三錢茵陳三錢甘草一錢枇杷葉二片去毛陳修園曰胃為燥土喜潤而惡燥喜降而惡升故用二地二冬石斛甘草潤以補之枇杷枳殼降以順之若用連柏之苦則增其燥若用耆朮之補則慮其升即有濕熱用一味黃芩以折之一味茵陳以滲之足矣蓋以陽明之治重在養津液方中地冬等藥即豬苓湯用阿膠以育陰意也茵陳芩枳即豬苓湯用滑澤以除垢意也清燥救肺湯人參一錢甘草一錢黑芝麻一錢石膏二錢煅阿膠一錢杏仁一錢去皮尖麥冬二錢枇杷葉炙一片冬桑葉三錢喻嘉言曰諸氣膹郁之屬於肺者屬於肺之燥也而古今治氣鬱之方用辛香行氣絶無一方治肺之燥者諸嘔喘痿之屬於上亦屬於肺之燥也而古今治法以痿嘔屬胃經以喘屬肺是則嘔與痿屬之中下而惟喘屬上矣所以亦無一方及於肺之燥也即喘之屬於肺者非行氣即泄氣間有一二用潤劑又不得肯綮今擬此方名清燥救肺大約以胃為主胃土為肺金之母也其天冬知母能清金滋水以苦寒而不用至苦寒降火之藥尤在所忌蓋肺金自至於燥所存陰氣不過一線倘更以苦寒下其氣傷其胃尚有生理乎誠仿此增損以救肺燥變生諸證庶克有濟保和湯甘草二錢阿膠三錢百合三錢知母三錢貝母三錢五味子一錢天冬三錢麥冬三錢桔梗三錢薄荷一錢飴糖三錢薏苡仁三錢馬兜鈴二錢肺經之津足則痰火不生而氣衝和若津不足則痰凝火鬱痿咳交作而氣失其和矣方用飴糖甘草阿膠補胃以滋肺津復加清火祛痰斂浮解鬱之品凡以保護肺金使不失其和而已葛可久此方雖不及救肺湯之清純然彼以滋干為主此以清火降痰為主各方用意不同無相詆訾麥門冬湯麥冬二兩半夏六錢人參四錢甘草四錢粳米一盞大棗十二枚參米甘棗四味大建中氣大生津液胃津上輸於肺肺清而火自平肺調而氣自順然未逆未上之火氣此固足以安之而已逆已上之火氣又不可任其遲留也故君麥冬以清火佐半夏以利氣火氣降則津液生津液生而火氣自降又並行而不悖也用治燥痰咳嗽最為對症以其潤利肺胃故亦治隔食又有沖氣上逆挾痰血而干肺者皆能治之蓋衝脈起於胞中下通肝腎實則麗於陽明以輸陽明之血下入胞中陽明之氣順則沖氣亦順胞中之血與水皆返其宅而不上逆矣此方與小柴胡合看更明小柴胡是從胃中引沖氣上行使火不下郁之法此方是從胃中降沖氣下行使火不上干之法或去粳米加蜜更滋潤四磨湯人參烏藥檳榔沉香各等分上藥磨水煎服治上氣喘急取人參滋肺以補母之氣取沉香入腎以納氣之根而後以檳榔烏藥從而治之瀉實補虛洵為調納逆氣之妙法蓋肺為陽而所以納氣下行者全賴陰津故用人參以生津腎為陰而所以化氣上行者全賴真陽故用沉香以固陽為沉其水故能直納水中之陽也桂苓五味甘草湯桂枝尖三錢雲茯苓四錢炙甘草二錢五味子一錢此治腎中水氣騰溢陰火上衝面赤咽痛咳逆諸病桂苓抑水下行水行即是氣行然逆氣非斂不降故以五味之酸斂其氣土厚則陰火自伏故以甘草之甘補其中也蘇子降氣湯蘇子三錢半夏二錢當歸三錢陳皮二錢前胡二錢厚朴一錢沉香一錢甘草一錢生薑三片氣即水也水凝則為痰水泛則為飲痰飲留滯則氣阻而為喘咳蘇子生薑半夏前胡陳皮宣除痰飲痰飲去而氣自順矣然氣以血為家喘則流蕩而忘返故用當歸以補血喘則氣急故用甘草以緩其急出氣者肺也納氣者腎也故用沉香之納氣入腎或肉桂之引火歸元為引導腎氣丸熟地黃八錢山萸肉四錢山藥四錢雲茯苓四錢澤瀉四錢牡丹皮五錢川附片三錢肉桂二錢腎為水臟而其中一點真陽便是呼吸之母水足陽祕則呼吸細而津液調如真陽不祕水泛火逆則用苓澤以行水飲用地萸以滋水陰用淮藥入脾以輸水於腎用丹皮入心以清火安腎得六味以滋腎而腎水足矣然水中一點真陽又恐其不能生化也故用附子肉桂以補之若加牛膝便具引火歸元之功若加知柏又治上熱下寒之法如去桂附加麥冬五味則純於滋陰兼治肺金辛字潤肺膏羊肺一具洗杏仁四錢柿霜五錢真酥五錢真粉三錢白蜜五錢為末攪勻入肺中燉熟食真粉即上白花粉真酥即上色羊乳如無以黑芝麻搗爛代之方取肺與肺同氣而用諸潤藥以滋補之義最淺而易見然方極有力可用瓊玉膏生地一斤汁白蜜一斤人參八兩雲苓十二兩生地汁合白蜜入瓷瓶內雲苓人參為末和勻放水中煮三晝夜懸井中晝夜取起仍煮半日白湯化服為潤利肺經之妙劑生脈散人參三錢麥門冬三錢五味子七粒人參生肺津麥冬清肺火五味斂肺氣合之酸甘化陰以清潤肺金是清燥救肺湯之先聲保元湯人參三錢黃耆三錢黑棗三錢炙甘草二錢煨姜三片草與黑棗大補中土再加煨姜以溫之黃耆以鼓之人參以滋之總使土氣衝和上生肺金肺陽布護陰翳自消一切寒怯虛悸之症自除此為溫補肺陽法與上滋肺陰法為一寒一熱之對子六君子湯人參三錢白朮三錢雲苓三錢甘草二錢陳皮三錢半夏三錢四君子補胃和中加陳皮半夏以除痰氣肺之所以有痰飲者皆胃中之水不行故爾沖逆治胃中即是治肺天王補心丹當歸三錢熟地黃五錢生地黃三錢遠志一錢人參三錢丹參三錢天門冬三錢麥門冬三錢元參三錢桔梗錢半酸棗仁三錢柏子仁三錢雲茯苓三錢五味子一錢陳修園曰心字篆文只是一倒火耳火不欲炎上故以生熟地補水使水上交於心以元參丹參二冬使火下交於腎又佐參苓以和心氣當歸以生心血棗仁以安心神遠志以宣其滯五味以收其散更假桔梗之浮為嚮導心得所養而何有健忘怔忡津液乾枯舌瘡祕結之苦哉硃砂安神丸硃砂一錢黃連三錢生地三錢當歸三錢甘草二錢硃砂之重以鎮怯黃連之苦以清熱當歸之辛以噓血更取甘草之甘以制黃連之太過地黃之潤以助當歸所不及合之養血清火安鎮心神怔忡昏煩不寐之症可以治之人參養榮湯人參三錢黃耆三錢炙白朮三錢甘草錢半當歸三錢熟地四錢大棗三錢生薑三片遠志一錢桂心一錢陳皮二錢白芍三錢雲苓三錢五味子一錢此方即中焦取汁奉心化赤以為血之義參耆朮草大棗大補中焦中焦谷化則汁益生故加陳皮以化谷中焦水停則穀不化故加姜苓以別水水穀既化中焦之汁自生矣再用歸地多汁以引其汁凡系婦人催乳用此足矣若必令其奉心化血則宜芍味以斂之使榮行脈中而不外散加桂心遠志啓導心火以助其化赤之令補中者開血之源也導心者化血之功也斂脈者成血之用也此心火不足之治法與炙甘草湯建中湯相近歸脾湯白朮三錢黃耆三錢茯神三錢人參三錢遠志錢半木香一錢甘草二錢炙棗仁三錢當歸三錢桂圓五枚去殼心主生血脾主統血養榮湯以治心為主歸脾湯以治脾為主心血生於脾故養榮湯補脾以益心脾土生於火故歸脾湯導心火以生脾總使脾氣充足能攝血而不滲也養真湯人參三錢白朮三錢雲苓三錢甘草錢半山藥三錢蓮米三錢麥冬三錢五味八分黃耆三錢白芍三錢煎去頭煎只服二三煎取燥氣盡去遂成甘淡之味蓋土本無味無味即為淡淡即土之正味也此方取淡以養脾深得其旨小建中湯桂枝二錢白芍四錢甘草二錢紅棗三枚生薑三片飴糖一兩虛勞裡急諸不足者五臟陰精陽氣俱不足也故用薑桂辛溫以生陽用芍飴酸甘以生陰大棗甘草純甘以補中使中宮建立則陽氣化而上行陰氣化而下降細按此方乃建胃滋脾以陽生陰之法歸脾湯從此方重濁處套出補中湯從此方輕清處套出正元湯人參附子汁煮黃耆川芎酒煮山藥乾薑煮白朮陳皮煎雲苓肉桂煮甘草烏藥煮各等分六藥為末鹽湯下取火烈之品法平和之藥雄烈之味既去誠為溫補少火之馴劑白鳳膏平胃散四兩人參一兩茯苓一兩上三味為末納棗內入鴨腹中陳酒煮爛食鴨肉將棗陰乾隨用參湯白湯化服鴨乃血肉之品其性滋陰酒為五穀之精其性和陽合諸藥養脾胃大收純和之效桂枝甘草龍骨牡蠣湯桂枝三錢甘草二錢龍骨三錢牡蠣三錢肝寒魂怯用辛溫鎮補之品以扶肝而斂魂心陽上越腎陽下泄此方皆可用之滑氏補肝散棗仁三錢熟地四錢白朮三錢當歸三錢山茱萸三錢山藥三錢川芎一錢木瓜一錢獨活一錢五味子五分肝體陰而用陽此以酸甘補肝體以辛甘補肝用加獨活者假風藥以張其氣也欲其氣之鼓蕩者則用獨活欲其氣之溫斂者則用巴戟欲其氣之清平者則用桑寄生欲其氣之疏達者則用柴胡白頭翁諸藥皆治風之品輕重不同在人用之得宜炙甘草湯一名復脈湯人參二錢地黃二兩六錢麥冬八錢阿膠二錢芝麻五錢炙草四錢大棗三枚桂枝三錢生薑三錢清酒一兩此方為補血之大劑鄉先輩楊西山言此方亟戒加減惜未能言明其義余按此方即中焦受氣取汁變化而赤是為血之義薑棗參草中焦取汁桂枝入心化氣變化而赤然桂性辛烈能傷血故重使生地麥冬芝麻以清潤之使桂枝雄烈之氣變為柔和生血而不傷血又得阿膠潛伏血脈使輸於血海下藏於肝合觀此方生血之源導血之流真補血之第一方未可輕議加減也時方養榮湯亦從此套出第養榮湯較溫此方多用生地麥冬則變為平劑專滋生血脈若催乳則無須桂枝若去桂加棗仁遠志則更不辛烈若加丹皮桃仁則能清心化血加山梔又是清心涼血之劑加五味則兼斂肺金此雖加減而仍不失仲景遺意又何不可大補陰丸熟地八錢知母三錢黃柏三錢龜板四錢苦寒之品能大伐生氣亦能大培生氣蓋陰虛火旺者非此不足以瀉火滋陰夫人之生氣根於腎中此氣全賴水陰含之若水陰不足則陽氣亢烈煩逆痿熱方用知柏折其亢龜板潛其陽熟地滋其陰陰足陽祕而生氣不泄矣四物湯為生血和血之通劑生地四錢白芍三錢川芎二錢當歸三錢四君子湯人參三錢白朮四錢雲苓四錢甘草二錢異功散即四君湯加陳皮二錢八珍湯即上二方合用也氣血雙補之平劑十全大補湯即八珍湯加黃耆肉桂為溫補氣血之大劑當歸補血湯黃耆一兩當歸五錢此方以氣統血氣行則血行外充皮膚則盜汗身熱自除內攝脾元則下血崩漏能止柴胡清骨散柴胡三錢青蒿三錢秦艽三錢白芍三錢丹皮三錢地骨皮三錢鱉甲三錢知母三錢黃芩二錢甘草一錢童便少許胡黃連一錢肝為藏血之臟又司相火血足則火溫而不烈遊行三焦達於腠理莫不得其溫養之功若血虛火旺內則煩渴淋閉外則骨蒸汗出皆肝經相火之為病也方用丹皮知母枯芩黃連童便大清相火而又恐外有所郁則火不能清也故用柴胡青蒿秦艽以達其鬱又恐內有所結則火不能清也故用白芍丹皮鱉甲以破其結佐甘草一味以和諸藥務使肝經之鬱結解而相火清較逍遙散更優保命生地散生地五錢熟地三錢枸杞三錢地骨皮三錢黃耆四錢白芍三錢甘草二錢黃芩二錢天門冬三錢方取黃耆甘草入脾統血余藥清潤肺腎以治血之源流或血止後用此調養亦宜豬苓湯豬苓三錢澤瀉三錢雲苓三錢滑石三錢阿膠三錢此方專主滋陰利水凡腎經陰虛水泛為痰者用之立效取阿膠潤燥滑石清熱合諸藥皆滋降之品以成其祛痰之功痰之根原於腎制肺者治其標治腎者治其本導赤散生地黃四錢木通二錢甘草梢三錢竹葉心三錢季楚重曰瀉心湯用黃連所以治實邪責木之有餘瀉子以清母也導赤散用地黃所以治虛邪責水之不足壯水以治火也麻黃人參芍藥湯麻黃一錢桂枝三錢黃耆三錢人參三錢炙草一錢當歸三錢白芍三錢麥冬三錢五味子一錢麻黃桂枝從外發表黃耆草參從內托裡使內犯之邪皆從外出自不至乘陰而吐衄矣然既亂之血又不可以治也故用當歸白芍以和之麥冬五味以清之又按麻桂力能發表表解而血自止是善用麻桂之功非麻桂自能止血也況仲景於吐血衄血皆忌發汗用此方者須審其的由外感非此不解然後一投即應設忌發汗而反汗之又誤用麻桂之過麻桂亦不任咎也止嗽散桔梗三錢荊芥三錢廣紫菀三錢廣百部三錢白前三錢陳皮三錢甘草一錢普明子制此方並論注其妙而未明指藥之治法余因即其注而增損之曰肺體屬金畏火者也遇熱則咳用紫菀百部以清熱金性剛燥惡冷者也遇寒則咳用白前陳皮以治寒且肺為嬌臟外主皮毛最易受邪不行表散則邪氣流連而不解故用荊芥以散表肺有二竅一在鼻一在喉鼻竅貴開而不貴閉喉竅貴閉不貴開今鼻竅不通則喉竅啓而為咳故用桔梗以開鼻竅此方溫潤和平不寒不熱肺氣安寧千金麥門冬湯麥冬三錢桔梗二錢桑皮三錢半夏二錢生地三錢紫菀三錢竹茹三錢麻黃一錢五味一錢生薑三片甘草一錢風寒客於肺中引痰生火故用桔梗桑皮半夏生薑以利除痰飲用生地紫菀竹茹麥冬五味以清斂火氣然陳寒不除則痰火旋去而旋生故以麻黃一味搜剔陳寒惟甘草則取調諸藥而已凡寒中包火火中伏寒皆能治之柴胡梅連散柴胡三錢人參三錢黃芩三錢甘草一錢黃連一錢白芍三錢當歸三錢柴胡湯逍遙散各半成方而重在黃連一味較二方尤擅清火之功心者肝之子黃連瀉心實則瀉其子甘桔湯甘草三錢桔梗三錢葶藶大棗瀉肺湯葶藶炒香搗三錢大棗擘破五枚先聖用藥瀉必兼補故無弊即如此兩方桔梗以開達肺氣凡咽痛肺癰排膿皆生用之而必君以甘草以土生金助其開達之勢葶藶苦寒力能降泄肺中之氣火熱壅肺水飲沖肺皆能隨其實而瀉之而必君以大棗使邪去而正不傷得此意者可知配合之義保和丸知母三錢貝母三錢天門冬三錢款冬花三錢天花粉三錢薏苡仁三錢五味子一錢甘草一錢馬兜鈴三錢生地黃三錢紫菀三錢百合三錢阿膠三錢當歸三錢紫蘇二錢薄荷一錢百部三錢飴糖二兩生薑三錢此方藥味雖多而實以潤肺清火為主凡是虛勞咳血皆肺中陰津不足火熱乘之使然火壅於內則皮毛固閉灑淅而惡寒易招外感火盛則水津凝滯膠結為痰而氣愈不得息痿咳所以不愈也方用飴膠地歸百合百部甘草紫菀花粉款冬大生津液以潤肺五味天冬知母以清肺火猶恐外寒閉之則火鬱而不清故佐以姜蘇薄荷以疏解其鬱痰飲滯之則火阻而不降故用貝母苡仁以導利其滯郁解滯行火清肺潤咳嗽愈而痿燥除無論寒久變火火鬱似寒諸症皆能治之十藥神書載此方加減甚詳余謂此方藥味已多如再加減便雜而無功對證之方甚夥何須執此一方苦苦加減便欲醫盡諸病耶為末飴糖丸服瀉肺丸栝蔞霜三錢貝母三錢半夏三錢鬱金二錢葶藶三錢炒杏仁三錢黃連二錢黃芩三錢大黃錢半甘草一錢肺部痰火血氣壅滯不降用此方解泄破下力量最大是從人參瀉肺湯葶藶大棗半夏瀉心小結胸等湯割取而成又加鬱金大破血分藥雖猛峻然果遇實證非此不克消化丸礞石三錢煅明礬二錢牙皂一錢雲苓三錢陳皮一錢枳殼一錢枳實一錢南星一錢生沉香一錢半夏一錢生薄荷一錢黃芩二錢神麯二錢薑汁一錢飴糖三錢為末神麯薑汁為丸臥時飴糖拌吞仰臥則藥流入肺去痰除根痰即水也寒鬱之氣阻之火凝之是以膠黏潮溢而不能去也此方以燥降墜利去水為主而用薄荷以散寒用黃芩以清火尤妙明礬入濁水而能清牙皂入汙垢而能去二物合用為滌除痰涎之妙品諸藥猛峻故用飴糖以緩之葛可久法服後即服太平丸以補之可知瀉實亦宜補虛然遇實證慎毋畏而不用也太平丸天門冬二錢麥門冬二錢款冬花二錢知母二錢杏仁二錢熟地黃三錢生地黃三錢川黃連一錢當歸三錢阿膠二錢蛤粉炒蒲黃二錢京墨五分桔梗二錢薄荷一錢麝香少許煉蜜為丸彈子大食後薄荷湯化下一丸義取潤肺清金豁痰止血諸藥顯而易見惟黃連一味是瀉心之藥心者肺之賊瀉心即是清肺乃隔治之法麝香一味是透竅之藥肺者氣之竅通竅即所以安肺是從治法仲景金匱亦有上焦得通津液得下之語蓋上焦通則津液不凝為痰下降而火亦隨降葛可久制方原未證諸仲景而其義有可通故引證之第此方治肺取滋利宣通上焦虛枯滯澀者皆宜若下焦陰虛則大不宜蓋下焦之病宜斂藏用宣通法又其所忌二陳湯半夏三錢陳皮三錢茯苓三錢甘草二錢此方為去除痰飲之通劑痰之本水也茯苓治水以治其本痰之動濕也茯苓滲濕以鎮其動其餘半夏降逆陳皮順氣甘草調中皆取之以為茯苓之佐使耳故仲景書凡痰多者俱加茯苓嘔者俱加半夏今人不窮古訓以半夏為去痰專品不知半夏非不去痰而辛降之氣最甚究屬降氣之主故凡用藥不可失其真面也紫菀散紫菀三錢人參二錢知母二錢貝母二錢桔梗二錢茯苓三錢阿膠二錢五味一錢甘草一錢肺痿咳痰取參草膠苑以滋補肺陰又用知母以清其火五味以斂其氣桔梗貝母茯苓以利其痰火氣痰三者俱順則肺愈受其益此較保和湯救肺湯又在不清不濁之間用方者隨宜擇取礞石滾痰丸礞石三錢黃芩三錢大黃三錢沉香三錢痰者水之所結也肺胃火盛煎灼其水則凝而為瘀與飲同主於水而飲則動於寒故清而不稠痰則熬以火故黏而難下王隱君制此方用黃芩清肺中無形之火用大黃瀉胃中實積之火此治痰先清火所以治其原也然痰本水濕所成故佐以礞石之悍燥以除水痰之所留氣即阻而不利故用沉香以速降之二黃得礞石沉香則能迅掃直攻老痰巢穴濁垢之處而不少留此滾痰之所由名也為末水丸薑湯下仰臥忌飲食半日若喉間黏壅乃病藥相拒少頃藥力到自愈方雖猛峻然頑痰變見諸怪證非此不治旋覆代赭石湯人參三錢甘草二錢半夏三錢生薑三錢大棗五枚赭石三錢煅旋覆花三錢炙此方治噦厄人皆知之而不知厄有數端胃絶而厄不與焉一火厄宜用承氣湯一寒厄宜理中湯加丁香柿蒂一瘀血滯厄宜大柴胡加桃仁丹皮此方乃治痰飲作厄之劑與諸厄有異不得見厄即用此湯也方取參草大棗以補中而用生薑旋覆以去痰飲用半夏赭石以鎮逆氣中氣旺則痰飲自消痰飲清則氣順氣順則厄止治病者貴求其本斯方有效不為古人所瞞兼火者可加麥冬枯芩兼寒者可加丁香柿蒂痰多者加茯苓蓋既得其真面然後可議加減溫膽湯半夏三錢雲苓三錢陳皮二錢甘草錢半竹茹三錢枳殼錢半二陳湯為安胃祛痰之劑竹茹以清膈上之火加枳殼以利膈上之氣總求痰氣順利而膽自寧溫之實清之也用治痰氣嘔逆為宜真武湯白朮三錢茯苓三錢白芍三錢生薑三錢附子炮三錢水飲者腎之所主也腎陽化水則水下行而不泛上故用附子入腎補陽以為鎮管水氣之主制水者土也用苓朮以防之白芍苦降從其類以瀉之生薑辛散循其末而宣之合之宣瀉防制水有所宰而自不動矣故取此方真武水神以名湯苓桂朮甘湯茯苓五錢桂枝三錢白朮五錢甘草三錢炙甘草白朮填中宮以塞水茯苓以利之桂枝以化之水不停而飲自除治水氣陵心大效蓋桂枝補心火使下交於腎茯苓利腎水使不上陵心其實茯苓是脾藥土能治水則水不剋火也桂枝是肝藥化水者肝為腎之子實則瀉其子而肝又主疏泄故有化水氣之功補心火者虛則補其母肝為心火之母而桂又色赤入心也發汗亦用桂枝借木氣之溫以散布外達也其降沖逆亦用桂枝者以衝脈下屬於肝內通於腎桂枝溫肝氣以引之化腎水以泄之凡下焦寒水攻發衝陽上浮者往往佐苓夏以收功須知桂枝其色赤其氣溫純得水火之氣助火化木是其所長如無寒水而用之發熱動血陽盛則斃仲景已有明戒不可不凜失血之家尤宜慎用或曰仲景炙甘草湯是補血藥而亦未嘗忌用桂枝何也曰此正仲景慎於用桂枝處方義以中焦取汁變赤為血不得不用桂枝助心火以化赤然即恐桂枝傷血故用桂極少而用麥冬地黃極多以柔濟剛用桂而能制桂仲景如此之慎可知失血家不可輕用桂也二加龍骨湯龍骨三錢煅牡蠣三錢煅白薇三錢附子錢半炮白芍三錢甘草一錢大棗三錢生薑三片此方乃清散上焦溫補下焦之藥方用甘棗從中宮以運上下姜薇清散使上焦之火不郁附芍龍牡溫斂使下焦之火歸根合觀其方以溫為正治以清為反佐真寒假熱虛陽上浮為對證陳修園極贊其妙今人不察往往誤用惜哉團魚丸川貝母知母前胡柴胡各五錢團魚重十二兩同煮先取肉汁食之次將藥渣焙乾為末魚骨煮汁丸梧子大麥冬湯下團魚乃甲蟲之長能破肝之癥結肉亦帶酸入肝養陰合清利痰火疏理凝滯之品凡肝經血鬱氣鬱火鬱痰鬱以致骨蒸咳嗽者此丸力能治之蓋此丸以調肝者利肺金木交和則血氣清寧癆瘵不作月華丸天門冬三錢麥門冬三錢生地黃三錢山藥二錢百部三錢川貝母三錢雲茯苓五錢白菊花三錢沙參三錢阿膠三錢三七二錢桑葉三錢獺肝一具獺肝隨月變形每月生一葉正月則合為一葉以其變化不測而性又能殺蟲凡癆蟲隱伏幻怪者亦以此幻怪之物治之乃自古相傳之靈藥方名月華實以此藥命名而蟲所由生則由於瘀血所變故用三七以化瘀血之所以化蟲者又由於痰熱所蒸故用余藥潤利以清痰火但取殺蟲則獺肝一味已足但取消瘀則三七一味已足而必多其品物者攻補兼行標本兼治乃為全勝之師也生化湯當歸三錢川芎二錢黑姜一錢桃仁三錢甘草一錢益母草三錢血瘀能化之則所以生之也産後多用止衄散生地五錢白芍三錢黃耆三錢炙赤苓三錢當歸三錢阿膠二錢生地涼血當歸和血白芍降血阿膠秉阿水潛行地中之性能潛伏血脈此最易見者也妙在黃耆運氣攝血則血不外泄赤苓滲水利氣則引血下行但黃耆一味氣虛者得之則鼓動充滿而血得所統矣設氣實者得之以水濟水以塗附塗益氣橫決愈逼血妄行矣此用方者所以貴有加減生地黃散生地五錢川芎錢半黃芩三錢側柏葉三錢桔梗二錢梔子二錢蒲黃三錢阿膠二錢白茅根三錢丹皮三錢白芍三錢甘草錢半童便一杯萊蔔汁一杯此方以治肝為主以肝主血故也而亦兼用心肺之藥者以心主火治火必先治心肺主氣降氣必先清肺為涼血止血之通劑方義雖淺而易效地骨皮散生地黃三錢當歸三錢川芎一錢白芍三錢牡丹皮三錢地骨皮三錢柯韻伯曰陰虛者陽湊之故熱仲景言陰弱則發熱陽氣陷入陰中必發熱然當分三陰而治之陽邪陷入太陰脾部當補中益氣湯以升舉之清陽復位而火自熄也若陷入少陰腎部當六味地黃丸以對待之壯水之主而火自平也陷入厥陰肝部當地骨皮飲以涼補之血有所藏而火自安也四物湯為肝家滋陰調血之劑加地骨皮清志中之火以安腎補其母也加牡丹皮清神中之火以涼心瀉其子也二皮涼而不潤但清肝火不傷脾胃與四物加知柏之苦寒者不同故逍遙散治肝火之鬱於本臟者也木鬱達之順其性也地骨皮飲治陽邪之陷於肝臟者也客者除之勿縱寇以遺患也二者皆肝家得力之劑歸脾湯白朮三錢黃耆三錢茯神三錢人參三錢遠志一錢木香一錢棗仁二錢龍眼三枚去殼當歸四錢炙草二錢回龍湯每自己小便每去頭尾接用一碗乘熱服化血清火自還神化為血證妙藥與秋石不同萬勿服秋石
