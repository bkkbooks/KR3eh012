body:
  text: 卷一陰陽水火氣血論人之一身不外陰陽而陰陽二字即是水火水火二字即是氣血水即化氣火即化血何以言水即化氣哉氣著於物復還為水是明驗也蓋人身之氣生於臍下丹田氣海之中臍下者腎與膀胱水所歸宿之地也此水不自化為氣又賴鼻間吸入天陽從肺管引心火下入於臍之下蒸其水使化為氣如易之坎卦一陽生於水中而為生氣之根氣既生則隨太陽經脈為布護於外是為衛氣上交於肺是為呼吸五臟六腑息以相吹止此一氣而已然氣生於水即能化水水化於氣亦能病氣氣之所至水亦無不至焉故太陽之氣達於皮毛則為汗氣挾水陰而行於外者也太陽之氣上輸於肺膀胱腎中之水陰即隨氣升騰而為津液是氣載水陰而行於上者也氣化於下則水道通而為溺是氣行水亦行也設水停不化外則太陽之氣不達而汗不得出內則津液不生痰飲交動此病水而即病氣矣又有肺之制節不行氣不得降因而癃閉滑數以及腎中陽氣不能鎮水為飲為瀉不一而足此病氣即病水矣總之氣與水本屬一家治氣即是治水治水即是治氣是以人參補氣以其生於北方水中之陽甘寒滋潤大生津液津液充足而肺金濡潤肺主氣其葉下垂以納氣得人參甘寒之陰內具陽性為生氣化水之良品故氣得所補益焉即如小柴胡仲景自注云上焦得通津液得下胃氣因和是通津液即是和胃氣蓋津液足則胃上輸肺肺得潤養其葉下垂津液又隨之而下如雨露之降五臟戴澤莫不順利而濁陰全消亢陽不作肺之所以制節五臟者如此設水陰不足津液枯竭上則痿咳無水以濟之也下則閉結制節不達於下也外則蒸熱水陰不能濡於肌膚也凡此之證皆以生水為治法故清燥救肺湯生津以補肺氣豬苓湯潤利以除痰氣都氣丸補水以益腎氣即如發汗所以調衛氣也而亦戒火攻以傷水陰故用白芍之滋陰以啟汗源用花粉之生津以救汗液即此觀之可知滋水即是補氣然補中益氣湯六君子腎氣丸是皆補氣之方也何以絕不滋水哉蓋無形之水陰生於下而濟於上所以奉養是氣者也此水則宜滋有形之水質入於口而化於下所以傳道是氣者也此水則宜瀉若水質一停則氣便阻滯故補中湯用陳術以制水六君子用苓半以利水腎氣丸亦用利水之藥以佐桂附桂附以氣藥化水苓澤即以利水之藥以化氣真武湯尤以術苓利水為主此治水之邪即以治氣與滋水之陰即以補氣者固並行而不悖也且水邪不去則水陰亦不能生故五苓散去水邪而即能散津止渴並能發汗退熱以水邪去則水陰布故也然水陰不滋則水邪亦不能去故小柴胡通達津液而即能下調水道總見水行則氣行水止則氣止能知此者乃可與言調氣矣何以言火即化血哉血色火赤之色也火者心之所主化生血液以濡周身火為陽而生血之陰即賴陰血以養火故火不上炎而血液下注內藏於肝寄居血海由衝任帶三脈行達周身以溫養肢體男子則血之轉輸無從覘驗女子則血之轉輸月事時下血下注於血海之中心火隨之下濟故血盛而火不亢烈是以男子無病而女子受胎也如或血虛則肝失所藏木旺而愈動火心失所養火旺而益傷血是血病即火病矣治法宜大補其血歸地是也然血由火生補血而不清火則火終亢而不能生血故滋血必用清火諸藥四物湯所以用白芍天王補心丹所以用二冬歸脾湯所以用棗仁仲景炙甘草湯所以用二冬阿膠皆是清水之法至於六黃湯四生丸則又以大瀉火熱為主是火化太過反失其化抑之即以培之清火即是補血又有火化不及而血不能生者仲景炙甘草湯所以有桂枝以宣心火人參養榮湯所以用遠志肉桂以補心火皆是補火生血之法其有血寒血痹者則用桂枝細辛艾葉乾姜等稟受火氣之藥以溫達之則知治火即是治血血與火原一家知此乃可與言調血矣夫水火氣血固是對子然亦互相維繫故水病則累血血病則累氣氣分之水陰不足則陽氣乘陰而乾血陰分之血液不足則津液不下而病氣故汗出過多則傷血下後亡津液則傷血熱結膀胱則下血是水病而累血也吐血咳血必兼痰飲血虛則精竭水結痰凝不散失血家往往水腫瘀血化水亦發水腫是血病而兼水也蓋在下焦則血海膀胱同居一地在上焦則肺主水道心主血脈又並域而居在軀殼外則汗出皮毛血循經脈亦相倚而行一陰一陽互相維繫而況運血者即是氣守氣者即是血氣為陽氣盛即為火盛血為陰血虛即是水虛一而二二而一者也人必深明此理而後治血理氣調陰和陽可以左右逢源又曰血生於心火而下藏於肝氣生於腎水而上主於肺其間運上下者脾也水火二藏皆系先天人之初胎以先天生後天人之既育以後天生先天故水火兩藏全賴於脾食氣入胃脾經化汁上奉心火心火得之變化而赤是之謂血故治血者必治脾為主仲景炙甘草湯皆是此義以及大黃下血亦因大黃秉土之色而大泄地道故也地黃生血亦因地黃秉土之潤而大滋脾燥故也其餘參耆運血統血皆是補脾可知治血者必以脾為主乃為有要至於治氣亦宜以脾為主氣雖生於腎中然食氣入胃脾經化水下輸於腎腎之陽氣乃從水中蒸騰而上清氣升而津液四布濁氣降而水道下行水道下行者猶地有江河以流其惡也津液上升者猶土膏脈動而雨露升也故治氣者必治脾為主六君子湯和脾利水以調氣真武湯扶脾鎮水以生氣十棗陷胸等湯攻脾奪水以通氣此去水邪以補氣之法也又有水津不灌壯火食氣則用人參滋脾以益氣花粉清脾以和氣凡治氣者亦必知以脾為主而後有得也李東垣治病以氣為主故專主脾胃然用藥偏於剛燥不知脾不制水固宜燥脾不升津則宜滋氣分不可留水邪氣分亦不可無水津也朱丹溪治病以血為主故用藥偏於寒涼不知病在火臟宜寒涼病在土臟宜甘緩也此論不專為失血立說然治血者必先知之而後於調氣和血無差爽云男女異同論參看經血胎產門世謂男子主氣女子主血因謂男子血貴女子血賤並謂男子之血與女子不同而不知皆同也其不同者女子有月信男子無月信只此不同而已矣夫同是血也何以女子有月信而男子無月信哉蓋女子主血血屬陰而下行其行也氣運之而行也女子以血為主未嘗不賴氣以運血氣即水化前論已詳氣血交會之所在臍下胞室之中男子謂之丹田女子謂之血室則肝腎所司氣與血之總會氣生於水而化水男子以氣為主故血入丹田亦從水化而變為水以其內為血所化故非清水而極穠極稠是謂之腎精女子之氣亦仍能復化為水然女子以血為主故其氣在血室之內皆從血化而變為血是謂之月信但其血中仍有氣化之水液故月信亦名信水且行經前後均有淡色之水是女子之血分未嘗不借氣分之水以引動而運行之也知此則知男子之精屬氣屬水而其中未嘗無血無火且知女子之經屬血屬火而其中未嘗無氣無水是以男子精薄則為血虛女子經病則為氣滯也問曰男子主氣女子主血其中變化誠如茲之所云矣而女子何以必行經男子何以不行經答曰經血者血之餘也夫新生舊除天地自然之理故月有盈虧海有朝汐女子之血除舊生新是滿則溢盈必虧之道女子每月則行經一度蓋所以泄血之餘也血主陰而下行所以從下泄而為經血也至於男子雖無經可驗然亦必泄其餘男子以氣為主氣主陽而上行故血餘不從下泄而隨氣上行循衝任脈上繞唇頤生為髭鬚是髭鬚者即所以泄血之餘也所以女子有月信上遂無髭鬚男子有髭鬚下遂無月信所主不同升降各異只此分別而已矣義出內經非創論也世謂男女血迥不同豈知變化之道哉夫必明氣血水火變化運行之道始可治氣血水火所生之病女子要血循其常男子亦要血循其常若血失常道即為血不循經在女子雖無崩帶亦不受胎男子雖無吐衄亦不榮體至失常之至則女子未有不崩帶男子未有不吐衄者也故女子血貴調經男子亦貴調血但男子吐衄乃上行之血女子崩帶乃下行之血不可例論耳然使女子吐衄則亦與男子無殊男子下血則亦與崩帶無異故是書原非婦科而於月經胎產尤為詳悉誠欲人觸類引伸於治血庶盡神歟又曰女子胞中之血每月一換除舊生新舊血即是瘀血此血不去便阻化機凡為醫者皆知破血通經矣獨於男女吐衄之證便不知去瘀生新之法抑思瘀血不行則新血斷無生理觀月信之去舊生新可以知之即瘡科治潰亦必先化腐而後生肌腐肉不化則新血亦斷無生理且如有膿管者必爛開腐肉取去膿管而後止治失血者不去瘀而求補血何異治瘡者不化腐而求生肌哉然又非去瘀是一事生新另是一事也蓋瘀血去則新血已生新血生而瘀血自去其間初無間隔即如月信下行是瘀去也此時新血已萌動於血海之中故受孕焉非月信已下多時然後另生新血也知此則知以去瘀為生新之法並知以生新為去瘀之法生血之機有如此者而生血之原則又在於脾胃經云中焦受氣取汁變化而赤是為血今且舉一可見者言之婦人乳汁即脾胃飲食所化乃中焦受氣所取之汁也婦人乳汁則月水不行以此汁既從乳出便不下行變血矣至於斷乳之後則此汁變化而赤仍下行而為經血人皆知催乳須補脾胃而不知滋血尤須補脾胃蓋血即乳也知催乳法便可知補血法但調治脾胃須分陰陽李東垣後重脾胃者但知宜補脾陽而不知滋養脾陰脾陽不足水穀固不化脾陰不足水穀仍不化也譬如釜中煮飯釜底無火固不熟釜中無水亦不熟也予親見脾不思食者用溫藥而反減用涼藥而反快予親見催乳者用耆朮鹿茸而乳多又親見催乳者用耆朮鹿茸而乳轉少則以有宜不宜耳是故宜補脾陽者雖乾薑附子轉能生津宜補脾陰者雖知母石膏反能開胃補脾陽法前人已備言之獨於補脾陰古少發明者予特標出俾知一陰一陽未可偏廢補脾陰以開胃進食乃吾臨證悟出而借傷寒論存津液三字為據此外固無證據也書既成後得泰西洋人醫法五種內言胃之化谷乃胃汁化之並有甜肉汁苦膽汁皆入腸胃化谷所謂汁者即予所謂津液也西醫論臟腑多言物而遺理如此條者實指其物而尚不與理相背適足以證予所論故並志之臟腑病機論臟腑各有主氣各有經脈各有部分故其主病亦各有見證之不同有一臟為病而不兼別臟之病者單治一臟而愈有一臟為病而兼別臟之病者兼治別臟而愈業醫不知臟腑則病原莫辨用藥無方烏睹其能治病哉吾故將臟腑大旨論列於後庶幾於病證藥方得其門徑云心者君主之官神明出焉蓋心為火臟燭照事物故司神明神有名而無物即心中之火氣也然此氣非虛懸無著切而指之乃心中一點血液湛然朗潤以含此氣故其氣時有精光發見即為神明心之能事又主生血而心竅中數點血液則又血中之最精微者乃生血之原泉亦出神之淵海血虛則神不安而怔忡有瘀血亦怔忡火擾其血則懊憹神不清明則虛煩不眠動悸驚惕水飲剋火心亦動悸血攻心則昏迷痛欲死痰入心則癲火亂心則狂與小腸相為表裡遺熱於小腸則小便赤澀火不下交於腎則神浮夢遺心之脈上挾咽喉絡於舌本實火上壅為喉痹虛火上升則舌強不能言分部於胸前火結則為結胸為痞為火痛火不宣發則為胸痹心之積曰伏梁在心下大如臂病則臍上有動氣此心經主病之大旨也包絡者心之外衛心為君主之官包絡即為臣故心稱君火包絡稱相火相心經宣布火化凡心之能事皆包絡為之見證治法亦如心臟肝為風木之臟膽寄其間膽為相火木生火也肝主藏血血生於心下行胞中是為血海凡周身之血總視血海為治亂血海不擾則周身之血無不隨之而安肝經主其部分故肝主藏血焉至其所以能藏之故則以肝屬木木氣衝和條達不致遏郁則血脈得暢設木鬱為火則血不和火發為怒則血橫決吐血錯經血痛諸證作焉怒太甚則狂火太甚則頰腫面青目赤頭痛木火剋土則口燥泄痢飢不能食回食逆滿皆系木鬱為火之見證也若木挾水邪上攻又為子借母勢肆虐脾經痰飲泄瀉嘔吐頭痛之病又作矣木之性主於疏泄食氣入胃全賴肝木之氣以疏泄之而水穀乃化設肝之清陽不升則不能疏泄水穀滲瀉中滿之證在所不免肝之清陽即魂氣也故又主藏魂血不養肝火擾其魂則夢遺不寐肝又主筋瘛瘲囊縮皆屬肝病分部於季脅少腹之間凡季脅少腹疝痛皆責於肝其經名為厥陰謂陰之盡也陰極則變陽故病至此厥深熱亦深厥微熱亦微血分不和尤多寒熱並見與少陽相表裡故肝病及膽亦能吐酸嘔苦耳聾目眩於位居左多病左脅痛又左脅有動氣肝之主病大略如此膽與肝連司相火膽汁味苦即火味也相火之宣布在三焦而寄居則在膽腑膽火不旺則虛怯驚悸膽火太亢則口苦嘔逆目眩耳聾其經繞耳故也界居身側風火交煽則身不可轉側手足抽掣以表裡言則少陽之氣內行三焦外行腠理為榮衛之樞機逆其樞機則嘔吐胸滿邪客腠理入與陰爭則熱出與陽爭則寒故瘧疾少陽主之虛勞骨蒸亦屬少陽以榮衛腠理之間不和而相火熾甚故也相火挾痰則為癲癇相火不戢則肝魂亦不寧故煩夢遺精且膽中相火如不亢烈則為清陽之木氣上升於胃胃土得其疏達故水穀化亢烈則清陽遏郁脾胃不和胸脅之間骨盡處乃少陽之分病則其分多痛經行身之側痛則不利屈伸此膽經主病之大略也胃者倉廩之官主納水穀胃火不足則不思食食入不化良久仍然吐出水停胸膈寒客胃中皆能嘔吐不止胃火炎上則飢不能食拒隔不納食入即吐津液枯竭則成隔食糞如羊屎火甚則結硬胃家實則譫語手足出汗肌肉潮熱以四肢肌肉皆中宮所主故也其經行身之前至面上表證目痛鼻乾發痙不能仰開竅於口口乾咽痛氣逆則噦又與脾相表裡遺熱於脾則從濕化發為黃癉胃實脾虛則能食而不消化主燥氣故病陽明總系燥熱獨水泛水結有心下如盤等證乃為寒病胃之大略其病如此脾稱濕土土濕則滋生萬物脾潤則長養臟腑胃土以燥納物脾土以濕化氣脾氣不布則胃燥而不能食食少而不能化譬如釜中無水不能熟物也故病隔食大便難口燥唇焦不能生血血虛火旺發熱盜汗若濕氣太甚則谷亦不化痰飲泄瀉腫脹腹痛之證作焉濕氣挾熱則發黃發痢腹痛壯熱手足不仁小水赤澀脾積名曰痞氣在心下如盤脾病則當臍有動氣居於中州主灌四旁外合肌肉邪在肌肉則手足蒸熱汗出或肌肉不仁其體陰而其用陽不得命門之火以生土則土寒而不化食少虛羸土虛而不運不能升達津液以奉心化血滲灌諸經經云脾統血血之運行上下全賴乎脾脾陽虛則不能統血脾陰虛又不能滋生血脈血虛津少則肺不得潤養是為土不生金蓋土之生金全在津液以滋之脾土之義有如是者肺為乾金象天之體又名華蓋五臟六腑受其覆冒凡五臟六腑之氣皆能上熏於肺以為病故於寸口肺脈可以診知五臟肺之令主行制節以其居高清肅下行天道下際而光明故五臟六腑皆潤利而氣不亢莫不受其制節也肺中常有津液潤養其金故金清火伏若津液傷則口渴氣喘癰痿咳嗽水源不清而小便澀遺熱大腸而大便難金不制木則肝火旺火盛刑金則蒸熱喘咳吐血癆瘵並作皮毛者肺之合也故凡膚表受邪皆屬於肺風寒襲之則皮毛灑淅客於肺中則為肺脹為水飲沖肺以其為嬌臟故畏火亦畏寒肺開竅於鼻主呼吸為氣之總司蓋氣根於腎乃先天水中之陽上出鼻肺司其出納腎為水肺為天金水相生天水循環腎為生水之原肺即為制氣之主也凡氣喘咳息故皆主於肺位在胸中胸中痛屬於肺主右脅積曰息賁病則右脅有動氣肺為之義大率如是腎者水臟水中含陽化生元氣根結丹田內主呼吸達於膀胱運行於外則為衛氣此氣乃水中之陽別名之曰命火腎水充足則火之藏於水中者韜光匿彩龍雷不升是以氣足而鼻息細微若水虛則火不歸元喘促虛癆諸證並作咽痛聲啞心腎不交遺精失血腫滿咳逆痰喘盜汗如陽氣不足者則水泛為痰凌心沖肺發為水腫腹痛奔豚下利厥冷亡陽大汗元氣暴脫腎又為先天主藏精氣女子主天癸男子主精水足則精血多水虛則精血竭於體主骨骨痿故屬於腎腎病者臍下有動氣腎上交於心則水火既濟不交則火愈亢位在腰主腰痛開竅於耳故虛則耳鳴耳聾瞳人屬腎虛則神水散縮或發內障虛陽上泛為咽痛頰赤陰虛不能化水則小便不利陽虛不能化水小便亦不利也腎之病機有如此者膀胱者貯小便之器經謂州都之官津液藏焉氣化則能出矣此指汗出非指小便小便雖出於膀胱而實則肺為水之上源上源清則下源自清脾為水之堤防堤防利則水道利腎又為水之主腎氣行則水行也經所謂氣化則能出者謂膀胱之氣載津液上行外達出而為汗則有云行雨施之象故膀胱稱為太陽經謂水中之陽達於外以為衛氣乃陽之最大者也外感則傷其衛陽發熱惡寒其經行身之背上頭項故頭項痛背痛角弓反張皆是太陽經病皮毛與肺合肺又為水源故發汗須治肺利水亦須治肺水天一氣之義也位居下部與胞相連故血結亦病水水結亦病血膀胱之為病其略有如此三焦古作膲即人身上下內外相聯之油膜也唐宋人不知膲形以為有名而無象不知內經明言焦理縱者焦理橫者焦有文理豈得謂其無象西洋醫書斥中國不知人有連網言人飲水入胃即滲出走連網而下以滲至膀胱膀胱上口即在連網中也中國醫林改錯一書亦言水走網油而入膀胱觀剖牲畜其網油中有水鈴鐺正是水過其處而未入膀胱者也此說近出力斥舊說之謬而不知唐宋後古膲作焦不知膜油即是三焦是以致謬然內經明言三焦者決瀆之官水道出焉與西洋醫法醫林改錯正合古之聖人何嘗不知連網膜膈也哉按兩腎中一條油膜為命門即是三焦之原上連肝氣膽氣及胸膈而上入心為包絡下連小腸大腸前連膀胱下焦夾室即血室氣海也循腔子為肉皮透肉出外為包裹周身之白膜皆是三焦所司白膜為腠理三焦氣行腠理故有寒熱之證命門相火布於三焦火化而上行為氣火衰則元氣虛火逆則元氣損水化而下行為溺水溢則腫結則淋連肝膽之氣故多挾木火與腎心包相通故原委多在兩處與膀胱一陰一陽皆屬腎之府也其主病知矣小腸者受盛之官變化出焉上接胃腑下接大腸與心為表裡遺熱則小水不清與脾相連屬土虛則水穀不化其部分上與胃接故小腸燥屎多借胃藥治之下與肝相近故小腸氣痛多借肝藥治之大腸司燥金喜潤而惡燥寒則滑脫熱則秘結泄痢後重痔漏下血與肺相表裡故病多治肺以治之與胃同是陽明之經故又借多治胃之法以治之以上條列皆臟腑之性情部位各有不同而主病亦異治雜病者宜知之治血證者亦宜知之臨證處方分經用藥斯不致南轅北轍耳脈證死生論醫者所以治人之生者也未知死焉知生知死之無可救藥則凡稍有一毫之生機自宜多方調治以挽回之欲辨死生惟明脈證高士宗以吐血多者為絡血吐血少者為經血謂吐多者病輕吐少者病重而其實經散為絡絡散為孫絡如干發為枝枝又有枝要皆統於一本也以經絡之血分輕重實則分無可分醫旨又謂外感吐血易治內傷吐血難療三指禪謂齒衄最輕鼻衄次之嘔吐稍重咳咯唾血為最重謂其病皆發於五臟而其血之來最深不似嘔吐之血其來出於胃間猶淺近也此如仲景近血遠血之義以此分輕重於理尚不差謬第鼻衄嘔吐血雖近而輕而吐衄不止亦有氣隨血脫登時即死者咳咯唾血雖遠而重亦有一哈便出微帶數口不藥可愈者仍不可執以定死生矣夫載氣者血也而運血者氣也人之生也全賴乎氣血脫而氣不脫雖危猶生一線之氣不絕則血可徐生復還其故血未傷而氣先脫雖安必死以血為魄而氣為魂魄未絕而魂先絕未有不死者也故吾謂定血證之死生者全在觀氣之平否吐血而不發熱者易愈以榮雖病而衛不病陽和則陰易守也發熱者難治以血病氣亦蒸則交相為虐矣吐血而不咳逆者易愈咳為氣嗆血傷而氣不嗆是腎中之水能納其氣以歸根故易愈若咳不止是血傷火灼腎水枯竭無以含此真氣故上氣咳逆為難治再加喘促則陽無所附矣大便不溏者猶有轉機可用滋陰之藥以養其陽若大便溏則上越下脫有死無生再驗其脈脈不數者易治以其氣尚平脈數者難治以其氣太疾浮大革數而無根者虛陽無依沉細澀數而不緩者真陰損失皆為難治若有一絲緩象尚可挽回若無緩象或兼代散死不治矣凡此之類皆是陰血受傷而陽氣無歸故主不治若陰血傷而陽氣不浮越者脈雖虛微遲弱亦不難治但用溫補無不回生蓋陽虛氣弱者易治惟陰虛氣不附者為難治所謂血傷而氣不傷者即以氣之不傷而知其血尚未盡損故氣猶有所歸附而易愈也氣之原委吾於水火血氣論已詳言之參看自見用藥宜忌論汗吐攻和為治雜病四大法而失血之證則有宜不宜傷寒過汗傷津液吐血既傷陰血又傷水津則水血兩傷苶然枯骨矣故仲景於衄家嚴戒發汗衄忌發汗吐咯可知矣夫脈潛氣伏斯血不升發汗則氣發泄吐血之人氣最難斂發泄不已血隨氣溢而不可遏抑故雖有表證止宜和散不得徑用麻桂羌獨果系因外感失血者乃可從外表散然亦須斂散兩施毋令過汗亡陰蓋必知血家忌汗然後可商取汗之法至於吐法尤為嚴禁失血之人氣既上逆若見有痰涎而復吐之是助其逆勢必氣上不止矣治病之法上者抑之必使氣不上奔斯血不上溢降其肺氣順其胃氣納其腎氣氣下則血下血止而氣亦平復血家最忌是動氣不但病時忌吐即已愈後另有雜證亦不得輕用吐藥往往因吐便發血證知血證忌吐則知降氣止吐便是治血之法或問血證多虛汗吐且有不可則攻下更當忌矣予曰不然血之所以上者以其氣騰溢也故忌吐汗再動其氣至於下法乃所以折其氣者血證氣盛火旺者十居八九當其騰溢而不可遏正宜下之以折其勢仲景陽明證有急下以存陰法少陰證有急下以存陰法血證火氣太盛者最恐亡陰下之正是救陰攻之不啻補之矣特下之須乘其時如實邪久留正氣已不復支或大便溏瀉則英雄無用武之地只可緩緩調停純用清潤降利以不違下之意斯得法矣至於和法則為血證之第一良法表則和其肺氣里者和其肝氣而尤照顧脾腎之氣或補陰以和陽或損陽以和陰或逐瘀以和血或瀉水以和氣或補瀉兼施或寒熱互用許多妙義未能盡舉四法之外又有補法血家屬虛癆門未有不議補者也即病家亦喜言補諸書重補者尤十之八九而不知血證之補法亦有宜有忌如邪氣不去而補之是關門逐賊瘀血未除而補之是助賊為殃當補脾者十之三四當補腎者十之五六補陽者十之二三補陰者十之八九古有補氣以攝血法此為氣脫者說非為氣逆者說又有引火歸元法此為水冷火泛者立說非為陰虛陽越者立說蓋失血家如火未發補中則愈如火已發則寒涼適足以伐五臟之生氣溫補又足以傷兩腎之真陰惟以甘寒滋其陰而養其陽血或歸其位耳血家用藥之宜忌大率如是知其大要而後細閱全書乃有把握本書補救論世之讀朱丹溪書者見其多用涼藥於是廢黜熱藥貽誤不少而丹溪不任咎也蓋丹溪之書實未常廢熱藥世之讀陳修園書者見其多用熱藥於是廢黜涼藥為害尤多而修園不任咎也蓋修園之書實未嘗廢涼藥兩賢立論不過救一時之偏明一己之見世之不善讀者得其所詳忽其所略豈知兩賢所略亦曰人所已詳吾固不必詳焉耳初何嘗廢黜不言哉即如予作此書亦多用涼藥少用熱藥然非棄熱藥而不用特以血症宜涼者多非謂血症全不用熱藥也予於每條當用熱藥者未嘗不反復言之慎毋誤讀是書而有偏重涼藥之弊總在分別陰陽審症處方斯無差忒又予是書為血症說法與雜症不同泥此書以治雜症固謬若執雜症以攻此書尤謬讀吾書者未知流弊若何吾且為此論先下一針砭
