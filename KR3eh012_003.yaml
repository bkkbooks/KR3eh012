body:
  text: 卷三汗血汗者氣分之水其源出於膀胱內經云膀胱者州都之官津液藏焉氣化則能出矣膀胱之氣從三焦行腠理充肌肉達於皮毛以衛外為固陽氣衛外百邪不入故其經稱為太陽也其有盛暑天氣亢陽蒸動膀胱水氣騰布於外則發為汗此猶天之有雨陽布陰和自然無病有時外感風寒皮毛疏泄發熱汗出者乃太陽之氣為邪所病不能衛外故汗得泄出其有心胃肝脾熱濕之病亦令汗出者此猶土潤溽暑亦能蒸作雲雨也又有亡陽自汗者則由膀胱腎中之元陽脫泄故其水陰之氣隨而奔溢散渙不收氣為水之所化水即氣也汗即水也氣脫外泄故汗出也知此則知汗出氣分不出血分矣然汗雖出於氣分而未嘗不與血分相關故血分有熱亦能蒸動氣分之水而為盜汗蓋血氣陰陽原互根互宅陰分之血盛則陽分之水陰自然充達陽分之水陰足以布護灌濡則陰分之血愈為和澤而無陽乘陰之病矣若陽分之水陰不足則益傷血之陰故傷寒汗出過多則虛煩不寐以其兼傷血分之陰心主血分血分之陰傷則心氣為之不寧矣又有傷寒即當從汗而解今不得汗乃從鼻衄而愈其衄名為紅汗蓋陽分之邪宜挾陽分之水發而外出今既不能外出乃乘陰分之血從鼻衄出名為紅汗是為陽邪干陰之一驗故古謂陽乘陰則吐衄知陽乘陰而內逆者發為吐衄則知陽乘陰而外泄者發為皮膚血汗矣血者心之液也皮毛者肺之合也治法宜清心火火清則陽不乘陰兼治肺金肺調則皮毛不泄涼血地黃湯加桑皮地骨皮蟬蛻百合蒲黃治之血虛火甚者當歸六黃湯治之氣虛血少者當歸補血湯加桑皮地骨丹皮蟬蛻棕櫚炭黃芩秦皮治之外用石灰散撲之仿仲景汗出不止用溫粉撲法之意也或用桃花散撲之亦可皮毛者肺之合也汗出皮毛故汗血宜治肺金以斂皮毛人參清肺湯加蒲黃最宜血者肝之所司也肝火亢烈逼血妄行宜當歸蘆薈丸從內以攻治之喻嘉言治女子經血閉而周身汗出者謂是陰分之熱泄出陽分用此方破經血即以苦堅止汗汗血同源若肝火亢甚而汗血者借用此方尤為合法胃火亢甚亦能汗血以胃主肌肉熱蒸肌肉故令汗血宜竹葉石膏湯加蒲黃蟬蛻丹皮治之犀角地黃湯亦治之總論曰汗者陽分之水血者陰分之液陰與陽原無間隔血與水本不相離故汗出過多則傷血下後亡津液則傷血熱結膀胱則下血是水病而不離乎血者也吐血咳血必兼痰飲血虛則口渴而津液不生失血家往往水腫瘀血化水亦發為腫是血病而不離乎水者也故衄血家不可再發汗以血病則陰液既虛不可發汗再傷氣分之水以致陽分之液亦虛也又先水腫再吐血者不治以水病不可重傷其血也觀小柴胡調津液而即治熱入血室觀桃仁承氣破血結而即治小便不利皆是治水即以治血治血即以治水蓋在下焦則血海膀胱同居一地在上焦則肺主水道心主血脈在軀殼外則汗出皮毛血循經脈一陰一陽皆相聯屬吾於水火血氣論已詳言之人必深知此理而後知治血理氣調陰和陽之法可以左右逢源血箭從毛孔中流出一條血來有似箭之射出故名血箭由心肺火盛逼血從毛孔中出治宜清心火以除血出之源涼血地黃湯加蒲黃又宜瀉肺火以斂皮毛之氣使毛孔不滲瀉則血自止瀉白散加生地蟬蛻百合五倍子黃芩蒲黃杏仁白芨心肺兼治宜用生地黃散血出過多昏憒不省人事者與吐衄血脫氣散無異宜獨參湯加附片蒲黃當歸補血湯十全大補湯皆可擇用外治法水調桃花散敷血孔則血止或用京墨磨醋搽或用石灰散干糝花蕊石散糝均效血痣血痣初起其形如痣漸大如豆觸破時長流血水此由肝經怒火鬱血凝聚而成內服丹梔逍遙散及涼血地黃湯觸破流血者用花蕊石散糝之血止後用田螺散枯其本痣另用生肌藥收口未觸破未流血者古無治法吾擬用虻蟲為末姜醋調搽鬱金三稜磨醋搽真琥珀擦熱每日數次內服之藥如上血瘙癬疥血點血疙瘩一切皮肉赤癢名色不一今統稱之曰血瘙皆由血為風火所擾火甚則起點起疙瘩風甚則生蟲生癢火甚赤痛者涼血地黃湯加荊芥蟬蛻紅花杏仁治之風甚作癢者和血消風散治之知血瘙之病則凡一切火遊丹漆瘡風丹諸治法總不外是兼熱者色白或流黃水照上二方加蒼朮赤苓兼寒者或青黯硬腫加桂尖外用銀花陳艾川椒食鹽煎水洗另搽大楓丹油調最妙瘡血瘡者血所凝結而成者也或是寒凝或是熱結或是風腫或是濕鬱總是凝聚其血而成初起總宜散血血散則寒熱風濕均無遺留之跡矣其繼則調膿化毒此即吐膿條內所言瘀血化膿之義治宜托裡使氣達瘡所以蒸血成膿蓋瘡之成由於血結膿之成亦由血化血何以能化成膿得氣之蒸而腐化成膿也氣即是水吾已論之屢矣惟其氣即是水故血隨氣化亦變為水不名為水而名膿以其由血所化較水更濃耳毒既化膿自不內攻方其未潰氣虛者難於蒸化及其既化雖氣實者亦隨膿滲泄而轉為氣虛矣法宜固元以大補其氣此與本書內證原不干涉然同是血病故兼論之以互相發明蓋氣迫血則逆而為吐衄血滯氣則凝而為瘡疽氣迫血者宜破氣以和血血滯氣者宜破血以和氣故吐衄宜補血血旺則氣平諸瘡宜補氣氣旺則血行也至於既穿潰後則軀殼已有破損與壅閉之證迥別試看針功刺期門瀉肝刺肺腧瀉氣以一針之孔尚能大瀉臟氣況潰膿之孔甚大其能大瀉內氣可知矣故凡潰後宜大補元氣不似吐衄乃氣盛血虛只宜滋血以平氣而不宜助氣以動血也然瘡潰之餘亦有瘀熱未清者亦不得驟用溫補吐血之後亦有元陽大虛者又不得拘守清涼故吐血家審其血亡而氣亦隨亡與陽氣不能攝血者十全養榮歸脾參附等湯亦所宜用瘡家潰後固為必需之方而亦有餘毒未盡諸上方又其所忌醫者不容執一諸瘡內治初起腫硬總宜散血仙方活命飲主之惡寒無汗加麻黃發熱心煩加老連石膏大便燥結加大黃瘡肉頑梗黯滯乃陰證結毒無氣以發之也加桂枝尖生薑大棗瘡內平塌不起以及走散恐毒內攻加黃耆大棗生薑蓋血凝於氣分之際血行則氣行故以破血為主是善調氣之法也若吐衄則是氣乘乎血分之內氣降則血降當以破氣為主一內一外反觀自知諸瘡調膿宜以托裡消毒散為主蓋血既凝而不化則須補氣以與之戰使蒸騰腐化托令速潰以瘡乃血凝氣分之病惟恐氣不足以化之故宜補氣而制血若吐衄則是氣乘血分惟恐氣逆而血升故宜平氣以調血與此不同諸瘡既潰屬於虛損宜固元以益氣內補黃耆湯主之又審膿乾者其氣虛蓋氣既是水氣不足故水少而干且氣既不足則不能送膿外出故留滯而結膿管黃耆建中湯重加銀花赤豆芽當歸治之若膿清者是血虛膿為血所化血少故膿清當歸補血湯主之炙甘草湯加黃耆亦治之養榮湯亦治之又曰潰後屬虛然亦有瘀未化盡者仍不得峻補以留毒內服托裡消毒散外用烏金膏化之此如失血虛中夾瘀亦不得關門逐賊潰久而仍有膿管者尤宜用烏金膏化之若徒生其口內毒攻發終不愈也此如干血癆內有乾血非去其乾血而新血亦不能生皆虛中夾實治血則虛虛補虛則實實未易療治只得攻補兼施以盡人事又曰吐血止後宜補血以調氣瘡疽潰後宜補氣以生血吐衄在血分氣實血虛也瘡疽在氣分血實氣虛也外治之法消腫宜遠志膏用遠志酒煮搗敷及金黃散化腐去瘀宜巴豆炒黑研點名烏金膏田螺捻子亦佳生肌宜乳香沒藥為末名海浮散再加珍珠化腐生肌散亦佳治瘡之法此不足以盡之茲不過舉外證以勘內證明於諸瘡之血而吐衄之血乃愈明創血刀傷出血與吐衄不同刀傷乃平人被傷出血既無偏陰偏陽之病故一味止血為要止得一分血則保得一分命其止血亦不分陰陽有以涼藥敷上而血止者桃花散是也有以熱藥敷上而血止者黑姜灰是也不似吐衄出於偏陰偏陽之病氣故吐衄家止血必以治病氣為主病氣退斯吐衄亦退與刀傷迥不同也然刀傷二三日後則亦與吐衄略同有瘀血腫痛者宜消瘀血刀口敷花蕊石散腫處用乳香沒藥麝香三七蔥白搗敷瘀血消散則痛腫自除內服黎洞丸治之刀傷去血過多傷其陰分證見心煩發熱口渴法宜補氣以生血血足津生則不渴矣聖愈湯加棗仁花粉兒茶乳香沒藥甘草此在吐衄則宜補血而抑氣以內證系血分之氣不可使氣乘血也刀傷乃是氣分之血故宜補氣以生血氣達患處乃能生肌氣充肌膚乃能行血與治內證者不同其有氣虛不能統血氣寒不能生血者則宜八珍養榮參附等湯以固氣者固血吐血家亦間用此等藥物然刀傷之血在氣分皮膚尤衛氣所統破其皮膚氣先漏泄故以補氣為主若內證吐血屬陰分血傷而氣未傷故以補血為主醫者須分別內外而知其同中之異異中之同則得之矣客問刀傷何以善於冒風答曰人之所以衛外者全賴衛氣衛氣生於膀胱達於三焦外循肌肉充於皮毛如室之有壁宅之有牆外邪不得而入也今既破其皮肉是猶壁之有穴牆之有竇揖盜而招之入也是以刀傷更易外感病見發熱頭痛牙關緊閉吐痰抽掣角弓反張皆是衛氣為病所不同者多一出血證而已治法列後無汗者為風中挾寒閉其皮毛宜用小柴胡湯加荊芥防風紫蘇蓋小柴胡乃治熱入血室之方凡外邪乾血分者小柴胡湯皆能疏理而和解之加宣助衛氣之藥則偏治衛氣而主發汗矣破傷風治法如是即失血家虛人感傷以及產後傷寒治法皆可參知若刀傷去血過多不可再發汗者宜當歸地黃湯即四物湯加去風之藥以補血而驅邪也失血家吐血過多與產後去血過多而復得感冒之症者與此治法無異皆宜先滋其血以助汗源後宣其氣以解外邪有汗者為風中挾熱沸出肌肉之間法宜清散其熱當歸芎黃湯加殭蠶蟬蛻若兼便結者加大黃治之此即傷寒論發熱汗出用白虎湯燥結者用承氣湯之意醫者得其意而變化之自有許多法門夫刀傷氣分之血病也故邪在表者從氣分以發之邪在裡者從氣分以奪之邪在半表半裡者從氣分以和之兼用血藥斡旋其間血調而氣亦調氣調而血愈治矣若失血家乃血中之氣病也故有感冒則但取調血而兼用氣分之藥以斡旋之與此同而不同凡是刀傷冒風宜殭蠶蟬蛻搗和蔥白敷之力能拔風消腫神效刀傷潰爛與瘡同治此即吐膿條內所謂瘀血變化成膿之說也血凝不散為氣所蒸則化而成膿血者陰也氣者陽也陰從陽化故膿似水以氣之所化即為水也而又非水者則以其為血所化仍不失血之本質故稠濁似水實則水與血交併而成形者也故凡去膿之藥即是去水之藥而提膿之藥又即是乾水之藥內服八珍湯加苡仁木通六君子湯加當歸赤豆芽治之外敷化腐生肌散提膿加龍骨生肌加珍珠此舉刀傷之血與吐衄之血較論其義務期血證互勘而明其於刀傷治法固未詳也然其理已具識者鑑之跌打血跌打折傷一切雖非失血之正病而其傷損血脈與失血之理固有可參因並論之凡跌打已見破皮出血者與刀傷治法無異外用花蕊石散敷之內服化腐生肌散血止瘀去而愈如流血不止者恐其血瀉盡則氣散而死去血過多心神不附則煩躁而死宜用當歸補血湯加棗仁人參硃砂白蠟茯神甘草治之外用人參為末珍珠血結象皮末糝之如亡血過多煩躁口渴發熱頭暈等證宜大補其血聖愈湯加棗仁麥冬柴胡花粉丹皮硃砂或用獨參湯亦可此條可悟失血過多陰虛發渴之理凡跌打未破皮者其血壞損傷其肌肉則腫痛傷其肋骨則折碎在腰脅間則滯痛傷重者制命不治不制命者凡是疼痛皆瘀血凝滯之故也無論接骨逐瘀總以黎洞丸去大黃加續斷脆蛇治之外用自然銅官桂沒藥乳香桂枝大黃虻蟲䗪蟲酒調敷之自效若是已傷之血流注結滯著而不去者須逐去之否則或發為吐血或釀作癰膿反為難治宜當歸導赤湯下之若已發吐血便從吐血法治之若已發癰膿便從癰膿法治之跌打最危險者則有血攻心肺之症血攻心者心痛欲死或心煩亂或昏迷不省人事歸芎散加乳香沒藥治之失笑散亦治之此與產婦血攻心血迷心治法略同血攻肺者面黑胸脹發喘作渴乃氣虛血乘肺也婦科治產後氣虛瘀血入肺面如茄色急用參蘇飲救之金鑑載跌打血乘肺者亦用此方所謂乘肺非第乘肺之氣分而已乃是血乾肺臟之危候肺為清虛之府其氣能下行以制節諸臟則氣順而血自寧其氣不順則血乾氣分而為吐衄今其血直干肺臟較之干氣分者為更危殆急用人參以補肺肺得補則節制行而氣下降使血亦隨氣而下再用蘇木以行血血氣順行或可救於萬一夫如此危候仍不外清金保肺以助其制節則凡一切血症其當清金保肺以助其制節舉可知矣第肺虛而制節不行者則宜人參以保肺肺實而制節不行者則宜葶藶以瀉肺肺寒而制節不行者則宜姜半以溫肺肺熱而制節不行者則宜知芩以清肺一切血證治肺之法均可從此隅反跌打後有作嘔者以損傷之人受驚發怒肝氣無有不動者也肝木傷肺是以發嘔小柴胡湯加丹皮青皮桃仁治之跌打後有咳衄喘逆者乃血蘊於氣分之中宜十味參蘇飲以疏發其氣氣散則血散與內傷咳衄者不同內傷咳血是氣蘊於血分之中若發其氣愈鼓動其血而不寧矣故以清理其血為主二者須對看內有瘀血則發渴血虛亦發渴有瘀血者身痛便結玉燭散治之血虛發渴者心煩不寐盜汗身熱竹葉石膏湯加生地治之凡失血發渴者可以類推跌打損傷既愈之後有遇節候或逢陰雨或逢濕熱傷處每作疼痛甚則作寒作熱此乃瘀血著而未去留伏經絡之間不遇天氣節候其身中運行之氣習慣而不相驚一遇天氣節候蒸動則不能安然內伏故作痛也宜小調經湯小溫經湯通脈四逆湯隨其上下內外以分治之
