front:
  text: 自序先君子體羸善病故海早歲即習方書有恙輒調治之癸酉六月驟得吐血繼復轉為下血查照各書施治罔效延請名宿仍無確見大約用調停之藥以俟病衰而已因此遍覽方書每於血證嘗三致意時里中人甚詡鄉先輩楊西山先生所著失血大法得血證不傳之祕門下鈔存私為鴻寶吾以先君病故多方購求僅得一覽而其書議論方藥究亦未能精詳以之治病卒鮮成效乃廢然自返寢饋於內經仲景之書觸類旁通豁然心有所得而悟其言外之旨用治血證十愈七八今先君既逝而荊妻馮氏又得血疾親制方劑竟獲安全慨然曰大丈夫不能立功名於天下苟有一材一藝稍足補救於當時而又吝不忍傳陋哉爰將失血之證精微奧義一一發明或伸古人所欲言或補前賢所未備務求理足方效不為影響之談書成自顧而轉憾悟道不早不能延吾父之壽也然猶幸此書之或可以救天下後世也光緒十年甲申重九後一日容川唐宗海自序
  hash: sha256:3ac31d5ca4d0ad01d7cac1d9a00fe153b9b7200b93295edead864c04e11037e4
  markers:
  - {type: 'tls:head', offset: 0, content: '', id: KR3eh012_jc_000-d2.h1s1}
body:
  text: 凡例一血證自古絶少名論故是書條分縷析務求精詳間有煩文冗字意取明顯故不刪削一時賢論及血證率多影響是書獨從內難仲景探源而出發揮盡致實補唐以下醫書之所不逮故除引經之外余無採録亦間有一二暗合者皆系偶同並非掠美識者鑑之一是書分別門類眉目極清即不知醫者臨時查閲無不了然最便世用之書一是書議論多由心得然其發明處要皆實事實理有憑有驗或從古聖引伸或從西法參得信而有徵之說也並非杜撰可比一是書單為血證說法與雜證不同幸勿執彼例此亦幸勿以此議彼
  hash: sha256:ecd541da262cf61853874a5879590c66ec4fbe722d1862ce9212a8a65bab56dd
