body:
  text: 卷八玉女煎熟地五錢石膏三錢知母三錢麥冬三錢牛膝三錢陳修園力闢此方之謬然修園之所以短於血證者即此可見夫血之總司在於胞室而胞宮衝脈上屬陽明平人則陽明中宮化汁變血隨衝脈下輸胞室吐血之人胞宮火動氣逆上合陽明血隨而溢咳嗽不休多是衝陽上合陽明而成此亢逆之證方用石膏知母以清陽明之熱用牛膝以折上逆之氣熟地以滋胞宮之陰使陽明之燥平衝脈之氣息亢逆之證乃愈矣景嶽制此方曾未見及於此修園又加貶斥而王士雄以為可治陰虛胃火齒痛之證皆不知此方之關衝脈有如是之切妙也麥門冬湯治沖逆是降痰之劑此方治沖逆是降火之劑聖愈湯即四物湯加黃耆人參參蘇飲人參五錢蘇木四錢治吐衄産後跌打損傷瘀血乾肺鼻起煙煤面目茄色蓋謂肺金氣足則制節下行血不獨不能犯肺臟而亦不能犯肺之氣分也今不獨干犯氣分瘀血上行並真犯肺臟血者肝木所司金氣將絶木乃敢侮之肺氣已敝血乃得乘之方取蘇木秉肝木之氣色赤味鹹以破血是治肝以去肺之賊而急用人參生津調肺以補氣使肺氣一旺則制節自行而血不得犯之矣參附湯人參一兩附子八錢人之元氣生於腎而出於肺肺陰不能制節腎陽不能歸根則為喘脫之證用附子入腎以補陽氣之根用人參入肺以濟出氣之主二藥相濟大補元氣氣為水之陽水即氣之陰人參是補氣之陰附子是補水之陽知此則知一切補氣之法通脾泄胃湯黃柏三錢元參三錢防風三錢大黃一錢知母三錢炒梔子三錢石膏三錢茺蔚三錢此方乃通治眼目外瘴之方借治目衄亦宜方取諸品清熱瀉火使火不上熏則目疾自除而防風一味獨以去風者治火火動風生去風則火勢自熄茺蔚一味又以利濕者清熱濕蒸熱遏利濕則熱氣自消通竅活血湯赤芍三錢川芎一錢桃仁三錢紅花一錢老蔥三錢生薑三片大棗三枚麝香少許黃酒一杯大棗薑蔥散達升騰使行血之品達於巔頂徹於皮膚而麝香一味尤無所不到以治巔頂胸背皮膚孔竅中瘀血誠有可取王清任醫林改錯論多粗舛而觀其一生所長只善醫瘀血此湯亦從小調經套來故可採防風通聖散大黃錢半芒硝三錢防風三錢荊芥二錢麻黃一錢炒梔子三錢白芍三錢連翹一錢川芎一錢當歸三錢甘草一錢桔梗二錢石膏三錢滑石三錢薄荷一錢黃芩三錢白朮三錢吳鶴皋曰防風麻黃解表藥也風熱之在皮膚者得之由汗而泄荊芥薄荷清上藥也風熱之在巔頂者得之由鼻而泄大黃芒硝通利藥也風熱之在腸胃者得之由後而泄滑石梔子水道藥也風熱之在決瀆者得之由溺而泄風注於膈肺胃受邪石膏桔梗清肺胃藥也而連翹黃芩又所以祛諸經之遊火風之為患肝木主之川芎歸芍和肝血也而甘草白朮所以和胃氣而健脾此方除硝黃名雙解散謂表裡兩解營衛俱和也本方名通聖散極言功用之妙耳余按此方治表裡實熱外無汗內便堅之症無論何證通治一切亦不但治中風也千金葦莖湯葦莖五錢苡仁三錢桃仁三錢瓜瓣即冬瓜仁三錢瓜蒂散甜瓜蒂三錢赤小豆三錢為末香豉湯下上二方皆取破泄宣吐虛人勿服白散方貝母三錢巴豆炒黑一錢桔梗三錢共為末服一字在膈上則吐在膈下則瀉不瀉進熱粥瀉不止進冷粥人參清肺湯人參三錢阿膠二錢地骨皮三錢知母三錢烏梅三枚甘草一錢炙大棗三枚桑白皮三錢粟殼一錢杏仁三錢治肺虛咳嗽喘急吐血下血等症方取參草大棗補土生金以保定其肺阿膠知母佐其滋潤骨皮桑皮瀉其火熱肺為司氣之臟肺中清潤則氣自下降而得其斂藏之性痰血不得干之也再用杏仁以利之烏梅粟殼以收之總使肺得其制節斯無諸病矣此與太平丸保和湯紫菀散人參瀉肺清燥救肺諸湯相為表裡用者可以推類盡致寧肺桔梗湯桔梗二錢貝母三錢當歸三錢栝蔞霜三錢黃耆四錢枳殼一錢甘草一錢防己二錢百合三錢桑白皮三錢苡仁三錢知母三錢五味子一錢地骨皮三錢杏仁三錢葶藶子二錢生薑三錢治肺癰無論已潰未潰及肺脹等症補瀉兼行使痰火血氣膿水俱從下泄而肺以安寧丹皮湯丹皮三錢栝蔞三錢桃仁三錢朴硝二錢大黃一錢內癰乃熱毒結血而成毒去其血熱亦隨去栝蔞以解氣結桃仁丹皮以破血結硝黃兼下氣血之結結除而癰自去矣赤豆薏苡湯赤豆芽三錢苡仁三錢防己二錢甘草一錢膿者血化為水也故排膿之法總不外破血利水赤豆芽入血分以疏利之助其腐化苡仁防己即從水分排逐其膿甘草調和數藥使得各奏其效此為治癰膿大法門方未能盡載從此可以類推人參固本湯人參三錢熟地三錢生地三錢白芍三錢天冬三錢五味五分知母二錢陳皮三錢麥冬三錢炙草一錢此方滋養肺胃兼輸腎水名曰固本謂胃肺之本肺為腎之本而腎又為生氣之本三臟互相灌溉則根本固而虛熱清蒸咳喘回食諸症自然不生當歸六黃湯生地五錢熟地三錢黃連二錢黃芩三錢黃柏二錢黃耆五錢當歸三錢陳修園曰陰虛火擾之汗得當歸地黃之滋陰又得黃連黃芩之瀉火則蒸汗之本治矣此方之妙全在苦寒寒能勝熱而苦復能堅之又恐過於苦寒傷其中氣中者陰之守也陰虛則火愈動火愈動則汗愈出尤妙在大苦大寒隊中倍加黃耆領苦寒之性盡達於表以堅汗孔不使留中為害謹按修園此論皆是惟言黃耆領苦寒之性盡達於表不使留中為害則差毫釐蓋藥之救病原於偏寒偏熱治偏寒偏熱之病自必用偏寒偏熱之藥此方大治內熱豈寒涼之藥能盡走皮膚而不留中者況黃耆是由中以托外之物非若麻黃直透皮毛而不留中也吾謂內熱而蒸為汗者此為對症如果外熱而內不利寒涼藥者則歸脾湯當歸補血湯加減可也涼血地黃湯生地四錢當歸三錢甘草錢半黃連二錢炒梔子一錢元參三錢黃芩二錢此方純是涼心血者心之所生涼心即是涼血田螺捻子田螺三枚冰片五分白砒五分硇砂一錢搗和米糊為捻子能化腐去瘀肉枯血痣用處少仙方活命飲穿山甲三片皂莢刺一錢當歸尾二錢草節一錢乳香二錢金銀花二錢赤芍藥二錢天花粉二錢沒藥二錢防風三錢貝母二錢白芷二錢陳皮二錢黃酒少許此方純用行血之藥加防風白芷使達於膚表加山甲皂刺使透乎經脈然血無氣不行故以陳皮貝母散利其氣血因火而結故以銀花花粉清解其火為瘡症散腫之第一方誠能窺及瘡由血結之所以然其真方也第其方乃平劑再視瘡之陰陽加寒熱之品無不應手取效托裡消毒散皂莢刺二錢甘草二錢桔梗二錢白芷三錢川芎一錢黃耆三錢金銀花三錢當歸三錢白芍三錢白朮三錢人參三錢雲苓三錢瘡之結腫血凝也瘡之潰膿血化為水也夫血與毒結而不散故凝凝則氣阻而為痛欲去其凝仍是以氣制之使氣與血戰以陽蒸陰則陰血從陽化而為水水即氣也氣化則為水此化膿之說也是方四君黃耆大補中氣而以解毒和血之品佐其變化為助氣戰血之大劑本此意以加減進退則得之矣麥冬養榮湯人參三錢麥冬三錢五味一錢當歸三錢白芍三錢生地三錢知母二錢陳皮三錢黃耆三錢甘草一錢壯火食氣則氣熱而血失所養故用麥冬知母以清火火清氣平則陽不乘陰血於是安故亦名養榮人參養榮湯所以用遠志桂尖者助心火以化血此湯所以用知母麥冬者清胃火以寧血也大楓丹大楓子肉三錢土硫黃二錢枯礬一錢明雄二錢共為末燈油調搽癬癢各瘡黎洞丸三七一錢大黃一錢阿魏一錢兒茶一錢竹黃一錢血竭三錢乳香三錢沒藥三錢雄黃二錢羊血心血二錢冰片少許麝香少許牛黃三分藤黃二分消瘀定痛降氣止血各藥氣味形質皆精氣所結非尋常草木可比故能建大功當歸地黃湯當歸五錢熟地四錢川芎一錢白芍三錢防風三錢白芷三錢藁本二錢細辛五分治風先治血血行風自滅無論熱風寒風風總屬陽天地之噫氣常以肅殺而為心犯人血分則為痛為腫為強硬血行則風在血分者隨之而行故治風先治血也方取四物湯補血以為去邪之本而加祛風之藥以令邪外出法淺而易效頭目頂脊諸風可以治之防風芎歸湯生地五錢當歸三錢川芎一錢甘草一錢防風三錢補血祛風藥無多而義易見加減得宜尤效化腐生肌散兒茶一錢乳香二錢沒藥二錢血竭二錢三七一錢冰片少許麝香少許去瘀血即是化腐之法乾水即是提膿之法活血即是生肌之法方主化腐去瘀欲提膿者加枯礬龍骨欲生肌者加珍珠人參識透立方之意則加減可以隨人烏梅丸黃柏二錢黃連八錢桂枝二錢附子二錢細辛二錢當歸二錢花椒二錢人參二錢烏梅十枚乾薑三錢共為末蜜搗千椎為丸米飲下溫肝斂木化蟲止利真神方也橘核丸橘核三錢吳萸二錢香附三錢楝子三錢楂核三錢荔核三錢小茴二錢共為細末寒食麵為丸淡鹽湯送下治小腹疝痛結氣等證當歸導滯湯大黃一錢當歸三錢麝香少許丹皮三錢桃仁三錢紅花一錢白芍三錢乳香三錢沒藥三錢生地三錢桂枝三錢柴胡二錢黃芩三錢枳殼一錢甘草一錢跌打損傷內外瘀血以此湯行之此通竅活血桃仁承氣小柴胡小調經諸湯之義參看自明不須贅說十味參蘇飲人參三錢紫蘇三錢半夏三錢雲苓三錢陳皮二錢桔梗二錢前胡二錢葛根二錢枳殼一錢甘草一錢生薑三片肺之氣生於胃故用甘草人參補胃生津以益肺肺氣旺則能上行外達內輸下降而不郁矣故凡治肺之方類以人參為主然能補津生氣而不能治氣之郁也風寒外束則氣蘊於內不能上行外達故用紫蘇前胡粉葛生薑以發散之痰飲內停則氣逆於上不能內輸下降故用夏苓桔枳陳皮以滲降之合計此方乃疏散風寒降利痰水之平劑而咳血衄血氣喘之症及跌打血蘊氣分皆借用之亦借疏利之功使鬱滯去而血自不遏玉燭散生地五錢當歸三錢川芎二錢白芍三錢朴硝二錢大黃一錢生薑三片治跌打瘀血發渴身痛便閉取四物以補調其血而朴硝大黃逐瘀去閉妙在生薑一味宣散其氣使硝黃之性不徒直下而亦能橫達俾在外在內之瘀一併廓清竹葉石膏湯淡竹葉五錢石膏五錢人參二錢甘草一錢麥冬三錢半夏二錢生薑三片粳米四錢口之所以發渴者胃中之火熱不降津液不升故也方取竹葉石膏麥冬以清熱人參甘草粳米以生津妙在半夏之降逆俾熱氣隨之而伏妙在生薑之升散俾津液隨之而布此二藥在口渴者本屬忌藥而在此方中則轉能止渴非二藥之功乃善用二藥之功也黃土湯灶心土三錢甘草一錢白朮三錢熟地三錢黃芩二錢阿膠二錢附子錢半炮血者脾之所統也先便後血乃脾氣不攝故便行氣下泄而血因隨之以下方用灶土草術建補脾土以為攝血之本氣陷則陽陷故用附子以振其陽血傷則陰虛火動故用黃芩以清火而阿膠熟地又滋其既虛之血合計此方乃滋補氣血而兼用溫清之品以和之為下血崩中之總方古皆目為聖方不敢加減吾謂聖師立法指示法門實則變化隨宜故此方熱症可去附子再加清藥寒症可去黃芩再加溫藥赤小豆當歸散赤小豆三錢當歸三錢此治先血後便即今所謂臟毒與痔瘡相似故用當歸以活血用赤豆色赤入血分發芽則能疏利血中之結使血解散則不聚結肛門赤豆芽又能化血成膿皆取其疏利之功癰膿故多用之俱用漿水服解毒湯大黃一錢黃連三錢黃芩三錢黃柏二錢梔子炒三錢赤芍二錢枳殼一錢連翹一錢防風三錢甘草一錢解毒者謂解除臟毒也臟毒由火迫結在肛門故用泄火之藥極多其用白芍者兼行其血血行則火無所著用枳殼者兼行其氣氣行則火自不聚而火勢之煽每扶風威故以防風去風以熄火且防風上行外達使火升散則不迫結肛門此即仲景白頭翁湯之意清胃散生地三錢當歸三錢丹皮三錢黃連二錢升麻一錢甘草一錢方治臟毒義取清火而升麻一味以升散為解除之法使不下迫且欲轉下注之熱使逆挽而上不復下注目疾口舌之風火亦可借其清火升散以解升麻與葛根黃芩湯相仿槐角丸槐角三錢地榆二錢黃連一錢黃芩三錢黃柏三錢生地三錢當歸三錢川芎一錢防風二錢荊芥二錢側柏二錢枳殼二錢烏梅三枚生薑一錢汁世謂腸風下血問腸何以有風則以外風由肺傷入大腸內風由肝煽動血分方用清火和血之藥亦系通治血病之泛法惟防風生薑以祛外來之風烏梅荊芥以治內動之風為腸風立法本於仲景白頭翁及葛根諸湯之意葛根黃連黃芩湯葛根三錢黃連二錢黃芩三錢甘草一錢治協熱下利便血等症用芩連以清熱用葛根升散使下陷之邪仍達於上出於表則不迫協於下矣喻嘉言治痢心得逆流挽舟之法仲景此湯實該其意能從此變化而治痢思過半矣龍膽瀉肝湯木通一錢澤瀉二錢柴胡二錢車前子三錢生地黃三錢甘草錢半當歸三錢黃芩三錢炒梔子二錢龍膽草二錢瀉青丸龍膽草三錢大黃一錢川芎一錢當歸三錢羌活一錢炒梔子二錢防風二錢竹葉一錢濟生烏梅丸殭蠶三錢烏梅五枚醋丸臟連丸熟地五錢山萸三錢山藥三錢雲苓三錢澤瀉三錢丹皮三錢黃連二錢入豬大臟腸內同糯米蒸熟去米搗腸與藥為丸淡鹽湯下斷紅丸鹿茸三錢附子二錢當歸五錢續斷三錢黃耆五錢阿膠三錢側柏葉三錢醋丸地榆散地榆三錢當歸四錢白芍三錢黃芩三錢黃連錢半炒梔子二錢犀角一錢薤白二錢地榆治下血薤白治後重逼脹余藥乃涼血常品四逆散柴胡三錢枳殼二錢白芍三錢甘草錢半四肢厥冷謂之四逆仲景四逆湯皆用溫藥乃以熱治寒之正法至四逆散則純用清疏平和之品亦能治四肢厥冷何也蓋虛寒固有四症亦有熱遏於內不得四達而亦四逆者實熱內伏熱深厥亦深非芩連大黃不克虛熱內伏非玉燭散玉女煎不退若是腠理不和遏其陽氣則但用四逆散枳殼甘草解中土之郁而白芍以調其內柴胡以達於外斯氣暢而四肢通自不冷厥矣此湯與小柴胡轉輸外達相似又疏平肝氣和降胃氣之通劑借用處尤多五苓散白朮三錢雲苓三錢豬苓三錢澤瀉三錢桂枝三錢仲景此方治胸滿發熱渴欲飲水小便不利而用桂枝入心以化胸前之水結余皆脾胃中州之藥使中上之水得通於下則小便利散於上則口渴除達於外則身熱解今遇小便不利便用五苓散雖去桂入膀胱化氣然桂實心肝之藥火交於水乃借治法不似附子臺烏本系膀胱正藥也且陰水可用而陽水絶不可用平胃散胃苓湯即此方合五苓散也厚朴二錢陳皮二錢蒼朮三錢甘草錢半石蓮湯人參錢半黃芩三錢黃連二錢石蓮即蓮米有黑殼者三錢胃火甚則拒格不納食用芩連以清火用人參石蓮以補胃故治噤口不食大清涼散木通一錢澤蘭二錢車前子三錢甘草梢一錢白殭蠶三錢金銀花二錢蟬蛻五錢全蠍一錢川黃連二錢炒梔子三錢五味子五錢龍膽草二錢當歸三錢生地三錢天門冬三錢麥門冬三錢牡丹皮三錢黃芩三錢知母三錢黃酒三錢蜂蜜三錢童便一杯澤瀉三錢諸藥清熱利水使瘟毒伏熱從小便去妙三蟲引藥及酒達於外使外邪俱豁然而解是徹內徹外之方左歸飲熟地八錢山藥三錢枸杞三錢甘草錢半茯苓四錢山萸三錢難經謂左腎屬水右腎屬火景嶽此方取其滋水故名左歸方取棗皮酸以入肝使子不盜母之氣枸杞赤以入心使火不為水之仇使熟地一味滋腎之水陰使茯苓一味利腎之水質有形之水質不去無形之水陰亦不生也然腎水實仰給於胃故用甘草山藥從中宮以輸水於腎景嶽方多駁雜此亦未可厚非血府逐瘀湯當歸三錢生地三錢桃仁三錢紅花一錢枳殼一錢赤芍三錢柴胡二錢桔梗二錢川芎一錢牛膝二錢甘草一錢王清任著醫林改錯論多粗舛惟治瘀血最長所立三方乃治瘀活套方也一書中惟此湯歌訣血化下行不作癆句頗有見識凡癆所由成多是瘀血為害吾於血症諸門言之綦詳並採此語以為印證膈下逐瘀湯五靈脂三錢當歸三錢川芎一錢桃仁三錢赤芍二錢烏藥二錢牡丹皮三錢玄胡二錢甘草一錢香附三錢紅花一錢枳殼一錢王清任立方即當芎失笑散意治中下焦瘀血可用王清任極言瘀血之證最詳而所用藥則仍淺近然亦有可用云土瓜根湯桂枝三錢白芍土瓜根䗪蟲各等分大黃甘遂湯大黃二錢甘遂一錢阿膠二錢大黃下血甘遂下水君阿膠滋水與血以補之瀉不傷正水血交結者須本此法治之代抵當湯大黃一錢酒炒莪朮一錢山甲珠三片紅花一錢桃仁三錢丹皮三錢當歸三錢牛膝二錢夜明砂三錢山甲攻血夜明砂是蚊被蝙蝠食後所化之糞蚊食人血蝙蝠食蚊故糞能去血齧死血余藥破下務使瘀血不留化滯丸巴豆一錢去油三稜二錢莪朮二錢青皮一錢陳皮一錢黃連三錢半夏三錢木香二錢丁香一錢蜜丸攻一切寒熱氣滯之積大黃䗪蟲丸大黃一錢黃芩二錢甘草一錢桃仁三錢杏仁三錢白芍二錢乾漆一錢虻蟲一錢水蛭三錢䗪蟲二錢蠐螬二錢地黃二錢蜜丸酒服治乾血癆舊血不去則新血斷不能生乾血癆人皆知其極虛而不知其補虛正是助病非治病也必去其乾血而後新血得生乃望回春乾血與尋常瘀血不同瘀血尚可以氣行之乾血與氣相隔故用齧血諸蟲以蝕之金蟾丸干蝦蟆三錢胡黃連二錢鶴蝨二錢雷丸二錢蘆薈二錢肉豆蔻二錢苦楝根二錢蕪荑二錢雄黃二錢治小兒疳蟲男子濕熱所生之癆蟲以此殺之夫癆蟲有二血化之蟲靈怪難治必用鱉甲鰻魚獺肝百部麝香諸靈藥而再加和血之品以除其根乃能克之濕熱之蟲蠢而易治用此方即仿烏梅丸之意而妙在干蝦蟆雄黃亦靈藥故治蟲最效白頭翁湯白頭翁三錢甘草二錢阿膠三錢青皮三錢黃連三錢黃柏三錢清風火平肝治痢移尸滅怪湯山萸肉三錢人參三錢當歸三錢虻蟲一錢水蛭一錢晚蠶砂三錢乳香三錢蜜丸日服三次共重一兩七日而傳尸之蟲滅跡夫癆蟲者瘀血所化也死而傳染家人亦染於血分聚血為巢生子蝕血故虻蟲水蛭下血即能下蟲此乃治蟲之根而蠶砂乳香棗皮又以味殺之人參當歸則助正氣以祛邪為攻補兼施之法辨症奇聞論皆循末忘本惟此丸能知血化為蟲之所以然而其自注卻未能及此毋亦象罔乃得元珠哉紫參湯紫參三錢甘草八錢先煮紫參後入甘草溫服當歸四逆湯當歸三錢白芍三錢桂枝二錢細辛一錢生薑三錢大棗四枚木通一錢治手足痹痛寒冷抵當湯大黃二錢桃仁三錢虻蟲三錢水蛭三錢琥珀散琥珀一錢三稜一錢莪朮一錢丹皮二錢肉桂一錢延胡索一錢烏藥一錢當歸三錢赤芍三錢生地三錢劉寄奴三錢方主行氣下血使經通而石瘕去葉氏養胃湯麥冬三錢扁豆三錢玉竹三錢甘草一錢沙參三錢桑葉三錢清平甘潤滋養胃陰在甘露飲救肺湯之間脾約丸麻仁三錢白芍三錢大黃一錢枳殼一錢厚朴二錢杏仁三錢為末蜜丸潤利大便三物湯厚朴二錢枳殼一錢大黃一錢附子湯附子五錢炮人參三錢白朮三錢雲苓三錢白芍三錢此仲景溫腎之主劑附子色黑大溫能補腎中之陽腎陽者水中之陽泄水之陽者木也故用白芍以平之封水之陽者土也故用白朮以填之水中之陽恐水邪泛溢則陽越茯苓利水俾陽不因水而泛陽斯祕矣水中之陽若無水津以養之則陽不得其宅故用人參以生水津使養陽氣陽得所養陽斯沖矣六味左歸補腎陰以養氣之法都氣丸所以得名也附子湯腎氣丸補腎陽以生氣化氣之法梔子豆豉湯梔子五錢淡豆豉五錢服後得吐為快甘麥大棗湯大棗五枚甘草三錢小麥五錢三藥平和養胃生津化血津水血液下達子臟則臟不燥而悲傷太息諸證自去此與麥門冬湯滋胃陰以達胞室之法相似亦與婦人乳少催乳之法相似乳多即是化血之本知催乳法則知此湯生津潤燥之法桃奴散肉桂一錢五靈脂三錢香附子三錢砂仁一錢桃仁三錢延胡索三錢桃奴三錢雄鼠屎一錢三一承氣湯芒硝三錢大黃二錢枳殼錢半厚朴二錢甘草一錢攻下火結之通劑都氣丸熟地五錢山藥三錢雲苓三錢丹皮三錢山萸肉三錢澤瀉三錢五味子一錢人身呼吸之氣司於肺而實根於腎此氣乃腎中一點真陽而深賴腎中之水陰充足涵陽氣而潛藏於下故氣出口鼻則有津液氣著於物則如露水以氣從水中出水氣足故氣亦帶水陰而出其納入於腎也有水封之而氣靜祕故腎水足者其氣細龍能蟄龜能息世傳仙術有五龍蟄有龜息皆是斂氣之法即皆是保養腎水之法氣者水之所化吾故有氣即是水之論此丸用六味地黃湯補水以保其氣利水以化其氣加五味收斂以涵蓄其氣則氣自歸元而不浮喘名曰都氣謂為氣之總持也腎氣丸為陽不足者立法此丸為陰不足者立法而皆以氣得名蓋一是補陽以化氣一是補陰以配氣補中益氣湯黃耆三錢人參三錢炙草一錢白朮三錢當歸三錢陳皮一錢升麻一錢柴胡二錢生薑三錢大棗三枚柯韻伯曰陽氣下陷陰中穀氣不盛表症頗同外感用補中之劑得發表之品而中益安用益氣之劑賴清氣之品而氣益倍此用藥相須之妙也是方也用以補脾使地道卑而上行亦可以補心肺損其肺者益其氣損其心者調其營衛也亦可以補肝木鬱則達之也惟不宜於腎陰虛於下不宜升陽虛於下者更不宜升也清燥養榮湯知母三錢花粉三錢當歸三錢白芍三錢生地三錢陳皮二錢甘草一錢燈心一錢大魂湯甘草二錢桂枝三錢茯苓三錢乾薑一錢人參三錢附子二錢火為陽而陽生於肝脾脾陷而肝木不生溫氣頽敗則陽無生化之原此方補之豁痰丸當歸三錢知母二錢天花粉三錢白前根三錢麥冬三錢枳殼一錢杏仁三錢栝蔞霜一錢竹瀝三錢桔梗二錢射干三錢雲苓三錢石斛三錢甘草一錢輕清潤降為治痰妙法燒裩散取近陰處裩襠方寸許燒灰存性為末開水送下女病取男男病取女以陰頭微腫則愈治陰陽易反男女相傳各病三才湯天冬五錢人參三錢地黃五錢清化湯升降散殭蠶三錢蟬蛻七個薑黃二錢大黃一錢金銀花一錢白芍二錢澤蘭二錢陳皮一錢元參三錢膽草二錢黃芩二錢當歸三錢黃連錢半梔子二錢生地三錢柴胡二錢甘草一錢前四味名升降散去薑黃大黃名清化湯均用白蜜陳酒沖服凡瘟疫裡熱等症用此湯去伏熱清邪毒生津養血玉泉散天花粉三錢粉葛根三錢麥門冬三錢生地黃四錢五味子五分甘草錢半方取甘寒滋潤生胃津以止渴妙葛根升達使水津上布清心飲當歸三錢生地三錢白芍二錢蓮心三錢連翹心一錢茯神二錢棗仁三錢草節一錢麥冬三錢川貝母一錢竹葉心一錢龍骨三錢心血虛有痰火不臥寐用此藥清補之最妙地黃飲安桂五分附子一錢蓯蓉二錢茯苓三錢地黃三錢麥冬三錢五味五分遠志一錢菖蒲一錢棗皮三錢巴戟三錢石斛三錢薄荷一錢勿久煎即取服之黃連阿膠湯黃連二錢黃芩二錢白芍三錢阿膠三錢雞子黃二枚煎成待溫入雞子黃攪勻服治心煩不寐大清心火生心中之陰液以安神仲景之大劑也仁熟散柏子仁三錢熟地四錢枸杞三錢五味子一錢山萸肉三錢桂心二錢人參三錢茯神三錢菊花一錢枳殼一錢酒服治肝膽虛恐畏不敢獨臥並補心以實其子則肝膽益旺而菊花散風以寧之枳殼和胃以安之又是閒中一子清瘟敗毒散石膏八錢知母三錢生地五錢犀角一錢黃連三錢梔子三錢桔梗三錢黃芩三錢赤芍三錢元參三錢連翹二錢丹皮三錢甘草一錢竹葉三錢酸棗仁湯棗仁四錢甘草一錢知母三錢茯神五錢川芎一錢清火和血安神則能寐矣甘草瀉心湯甘草二錢黃芩三錢人參三錢乾薑二錢半夏三錢黃連三錢大棗三枚胃虛不能調治上下水寒上逆火熱不得下降結而為痞用姜半以折水用芩連以清火而參棗甘草以從中和之生薑瀉心湯生薑三錢半夏三錢甘草二錢人參三錢黃芩二錢乾薑二錢黃連三錢大棗三枚桂苓甘草五味湯桂枝三錢茯苓四錢五味一錢甘草二錢小結胸湯黃連三錢半夏三錢栝蔞八錢大陷胸湯大黃二錢芒硝二錢甘遂一錢左金丸吳茱萸一錢川黃連六錢病左脅痛及嘔酸苦者肝火也以金平木清火生金其理至妙萆薢分清飲菖蒲二錢草梢三錢烏藥二錢益智一錢青鹽少許地魄湯甘草一錢半夏三錢麥冬三錢芍藥三錢五味子一錢元參三錢牡蠣三錢清君相之火降肺胃之逆益水斂神而生津此補陰法也葛根湯葛根三錢麻黃一錢白芍三錢桂枝二錢甘草一錢大棗三枚生薑三片風寒中太陽經背項痛發痙者皆以此湯為主蓋麻桂為太陽發表之通劑加葛根則能理太陽筋脈之邪大秦艽湯生地三錢熟地三錢川芎一錢當歸三錢白芍三錢白朮三錢雲苓三錢甘草一錢秦艽二錢羌活二錢獨活錢半防風三錢白芷二錢細辛五分黃芩三錢越鞠丸蒼朮三錢香附三錢川芎二錢神麯三錢炒梔子三錢十棗湯大戟一錢芫花一錢甘遂一錢大棗十枚共為末大棗十枚煎濃湯送下一字下水飲如神四神丸故紙四錢吳萸三錢肉蔻三錢去油五味一錢各等分為末蜜丸治脾腎虛瀉金箔鎮心丹膽南星一錢硃砂三錢琥珀三錢竹黃三錢牛黃五分珍珠一錢麝香少許金箔一錢蜜丸金箔為衣薄荷湯下治癲驚悸怔忡一切痰火之疾黃耆五物湯即桂枝湯加黃耆五蒸湯人參三錢生地三錢石膏三錢知母二錢粉葛根三錢黃芩二錢甘草一錢竹葉三錢粳米三錢小麥三錢赤茯苓三錢五蒸之名一曰骨蒸二曰脈蒸三曰皮蒸四曰外蒸五曰內蒸統以此方治之益氣安神湯當歸三錢茯苓三錢生地三錢麥冬三錢棗仁三錢遠志一錢人參三錢黃耆三錢甘草一錢膽南星三錢黃連二錢竹葉二錢生薑三片大棗三枚醋黃散下瘀止血大黃一錢鬱金子一錢降香一錢三七一錢當歸三錢牛膝二錢均用醋炒為末酒童便沖服小青龍湯桂枝三錢麻黃二錢乾薑三錢白芍三錢細辛五分半夏三錢五味一錢甘草一錢溫散寒水外去風寒內瀉飲之大劑九氣丸通治氣不和作痛薑黃三錢香附四錢甘草二錢香蘇飲發表輕劑香附子二錢紫蘇三錢陳皮二錢甘草一錢蔥白二根生薑三片指迷茯苓丸茯苓五錢風化硝三錢半夏三錢枳殼一錢腎著湯白朮紅棗甘草附子各等分天靈蓋散天靈蓋檀香水洗酥炙三錢檳榔二錢阿魏一錢麝香少許安息香一錢甘遂一錢硃砂一錢上為末用桃枝柳枝桑根皮榴根皮蔥白薤白童便煎湯送下三錢忍吐待下子時服巳時當下癆蟲更進一服除根如瀉不止用龍骨黃連末白湯下以止之白粥補之今不用天靈蓋以虎頭骨代之再加鰻魚骨是尤理得心安黃連解毒湯黃連三錢黃芩三錢黃柏二錢梔子三錢通治三焦之熱內外證加減隨宜五皮飲陳皮茯苓皮姜皮桑皮大腹皮各等分煎服瀉白散地骨皮三錢生桑皮三錢糯米四錢肺為火克以此生金清火利水水清火自降矣五淋散山梔子三錢車前子三錢當歸尾三錢甘草一錢心遺熱於小腸結而為淋以此清心平肝利水四逆湯乾薑三錢附子三錢甘草一錢膽腎陽虛四肢逆冷下利不止以此溫之小溫經湯當歸三錢白芍二錢阿膠三錢川芎一錢人參三錢丹皮三錢麥冬三錢半夏二錢吳萸一錢生薑一錢桂枝二錢甘草一錢此為調經第一方行血消瘀散寒降痰溫利而不燥烈為去瘀之妙藥理中湯白朮三錢人參三錢乾薑二錢甘草一錢霍亂吐瀉腹痛中土虛寒以此溫補之人參敗毒湯人參二錢羌活二錢獨活一錢柴胡二錢前胡一錢枳殼一錢桔梗二錢川芎一錢雲苓二錢甘草一錢散寒發汗兼利痰飲
