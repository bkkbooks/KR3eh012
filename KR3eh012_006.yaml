body:
  text: 卷六癆瘵癆瘵之證咯血痰嗽遺精泄瀉潮熱盜汗瘦削疲倦夢與鬼交或夢亡先喜見人過常懷忿怨平旦病減午後病增發熱心煩口燥鼻乾臉紅唇赤骨蒸肺痿咽痛失音若瀉不止則不治矣其原得於酒色損傷以及失血之後瘀血鬱熱化生癆蟲蝕人臟腑之精血變生諸般怪證病人死後蟲氣傳染家人名曰傳尸又名尸疰謂其自上注下見證與前死之人相似故也辨蟲之法或腹中有塊或腦後兩邊有小結核或用乳香薰手背以帛覆手心良久手上出毛長寸許白黃者可治紅者稍難青黑者死若熏手無毛非癆蟲證也又或用真安息香燒煙吸之不嗽者非傳尸煙入即嗽真傳尸也癆蟲之形或似蜣螂或似紅絲馬尾或似蝦蟆蝟鼠或似鞠面或有足無頭或有頭無足或化精血歸於元氣之內若傳至三人者其蟲靈怪不可治凡用藥治蟲勿令病者知之恐蟲覺悟難取效也夫癆蟲何由而生哉木必先腐而後蟲生之人身亦必先有瘀血虛熱鬱蒸乃生癆蟲蟲者風木之氣所化人身肝主風木又主藏血肝臟之血若有瘀積是猶木之先腐也於是肝臟之風氣郁遏蒸煽將瘀血化生為蟲既化為蟲即從蟲治之宜天靈蓋散治之然天靈蓋不易得且不宜用可用虎頭骨代或金蟾丸亦可余每用乾漆明雄川椒楝根皮白頸蚯蚓升麻鬱金共為末白湯五更時服其蟲不吐即下義固取於殺蟲而尤在乾漆鬱金兼治瘀血以癆蟲是瘀血所化殺蟲是治其標去瘀是治其本也諸書但言殺蟲而不知蟲之所自生宜乎未得其治也吾為指出癆蟲是瘀血所化治瘀血是治其本也辨證録用移尸滅怪湯治癆蟲傳尸方以去瘀為主故效癆蟲之生由瘀血所化而癆蟲既生蝕人精血人之正氣日以消耗不治其虛但殺其蟲病終不能愈也月華丸主之義取補虛而去瘀殺蟲兼施其治乃萬全之策鰻魚肉常食亦佳或鰻魚骨鱉甲知母山茱萸柴胡當歸青黛桃梟為丸人參湯下亦攻補兼行之術又凡濕熱積痰皆能生蟲與小兒疳蟲無異用金蟾丸即愈不比血化之蟲靈怪難治也既殺蟲後但當滋補其虛陰虛者十居八九瓊玉膏主之加黃柏知母紫河車更佳陽虛者十之二三六君子湯主之咳嗽雜病咳嗽另有方書可查未及備論茲所論者虛癆失血之咳嗽也失血家十有九咳所以然者肺為華蓋肺中常有津液則肺葉腴潤覆垂向下將氣斂抑使其氣下行氣下則津液隨之而降是以水津四布水道通調肝氣不逆腎氣不浮自無咳嗽之病矣血者火化之陰汁津者氣化之水液二者本相濟相養水不濟火則血傷血不養氣則水竭水竭則津不潤肺血傷則火來剋金金被火克不能行其制節於是在下之氣始得逆上氣既逆上則水津不能隨氣下布凝結為痰在下之水邪又得隨氣而升泛為水飲皆致咳嗽吾於咳血門已詳論之茲復條列如下以便查核一肺臟津虛火氣乘之致成燥咳氣嗆痰澀或帶血絲久成肺痿清燥救肺湯治之一痰火凝結咳逆發渴喉中痰滯者由於津液不散阻塞氣道治宜清利其痰滋養其津紫菀散主之一水飲沖肺咳逆倚息不得臥者由於失血之人肝經風火太盛激動其水上衝肺臥則肺葉張水飲愈沖是以不得臥息葶藶大棗瀉肺湯治之吾每用二陳湯治飲加蘇子柴胡白芥子黃芩石膏杏仁荊芥薄荷枇杷葉風火兼治尤效此與雜病咳嗽因寒動水者有異因寒動水以致水飲沖肺者宜小青龍及真武湯血證咳嗽多是內動風火激水而上青龍真武等又其所忌醫者辨之夫虛癆咳嗽原於火剋金水乘肺而切究其故則病皆在於胃胃為水穀之海化生津血血不足則火旺津不生則肺燥水氣不化則飲邪上干治胃火宜白虎湯加生地百合五味子或玉女煎治胃痰宜滾痰丸指迷茯苓丸輕者用豁痰丸治胃中水飲宜二陳湯加蘇子白芥子防己枳殼杏仁生薑若水飲挾火者加柴胡黃芩當歸白芍內經云五臟六腑皆有咳嗽而無不聚於胃關於肺上條分肺胃治已詳茲有一方可以統治肺胃者則莫如小柴胡湯肺火盛加麥冬心火盛加黃連當歸肝火盛加當歸胡黃連黃昏咳嗽為火浮於肺加五倍子五味子以斂之五更咳嗽為食積之火至寅時流入肺經加萊蔔子痰凝氣滯者加栝蔞霜旋覆花杏仁桔梗射干川貝母水飲上衝者加葶藶子桑白皮細辛五味子有寒加乾薑雲茯苓若兼外感發熱惡寒鼻塞頭痛而咳嗽者宜小柴胡湯加荊芥紫蘇杏仁薄荷蓋小柴胡能通水津散鬱火升清降濁左宜右有加減合法則曲盡其妙又有痰血作咳其證咳逆倚息而不能臥與水飲沖肺之證相似蓋人身氣道不可有塞滯內有瘀血則阻礙氣道不得升降是以壅而為咳氣壅即水壅氣即是水故也水壅即為痰飲痰飲為瘀血所阻則益衝犯肺經坐立則肺覆瘀血亦下墜其氣道尚無大礙故咳亦不甚臥則瘀血翻轉更為阻塞肺葉又張愈難斂戢是以倚息不得臥也若仍照水飲沖肺用葶藶大棗湯是得治飲之法而未得治瘀之法矣須知痰水之壅由瘀血使然但去瘀血則痰水自消宜代抵當丸加雲茯苓法半夏輕則用血府逐瘀湯加葶藶蘇子又有咳嗽側臥一邊翻身則咳益甚者諸書皆言側臥一邊乃失血咳嗽不治之證而不知仍是瘀血為病蓋瘀血偏著一邊以一邊氣道通一邊氣道塞氣道通之半邊可以側臥氣道塞之半邊側臥則更閉塞是以翻身則愈加咳逆也宜血府逐瘀湯加杏仁五味子主之側臥左邊者以左邊有瘀血故不得右臥也右臥則瘀血翻動益加壅塞宜加青皮鱉甲莪朮以去左邊之瘀血側臥右邊者以右邊有瘀血故不得左臥也宜加鬱金桑皮薑黃以去右邊之瘀血凡此瘀血咳嗽之證諸書少言及者朱丹溪略引其端亦未申明吾於臨證有悟不惜大聲疾呼者正欲起死人而肉白骨豈敢祕而不傳哉又有沖氣咳逆者以衝脈起於血海循行而上麗於陽明血海受傷則衝脈氣逆上合陽明而為火逆燥咳之證麥門冬湯主之玉女煎亦治之二方皆從陽明以抑沖氣之顛使不逆也又有沖氣挾肝經相火上乘肺金者其證目眩口苦嗆咳數十聲不止咳牽小腹作痛發熱頰赤宜四物湯合左金丸再加人尿豬膽汁牡蠣五味治之蓋血室為肝之所司衝脈起於血室故肝經之火得緣沖氣而上小柴胡湯加五味子青皮龍骨牡蠣丹皮地骨皮亦治之重者加胡黃連衝脈本屬肝經然其標在陽明而其根則在於腎蓋衝脈起胞中而腎氣即寄在胞中腎中之氣上於肺而為呼吸亦借衝脈之路以上循入肺是以臍旁衝脈之穴謂之氣衝內經又明言沖為氣衝衝脈之與腎經交合者如是是以衝脈每挾腎中之虛火上逆而咳喘促咽乾兩顴發赤宜豬苓湯加五味子知母牛膝黃柏熟地龜板或麥味地黃湯以安之三才湯加鐵落以鎮之或大補陰丸合磁朱丸加五味以吸沖氣使歸於腎則不咳逆矣又有胞中之水內動沖氣挾水上逆而咳者其證上熱下寒龍雷火升面赤浮腫頭暈咽痛發熱心悸大便反滑腰痛遺溺桂苓甘草五味湯治之腎氣丸亦治之參看吐血咳血門更詳咳嗽之病其標在肺其本在腎血家咳嗽尤多生於腎虛腎者氣之根也腎經陰虛則陽無所附氣不歸根故浮喘咳逆宜三才湯加五味子沉香陳修園用二加龍骨牡蠣湯加阿膠麥冬五味子其附子須少用只作引導耳余每用知柏地黃湯少加五味子肉桂以為報使常服都氣丸亦佳又有腎經陽虛不能化水腰痛便短氣喘咳逆者腎氣丸加五味治之更有腎水上泛脾土不制而為水飲咳嗽者乃屬五飲雜病非失血家應有之證自有各書可查茲不贅及發熱吐血家脈靜身涼不藥可愈以陰雖虧而陽猶不亢陰與陽尚得其和故易愈也或身有微熱皮毛似汗此為陽來求陰水來就血亦可自愈所謂發熱者與身有微熱不同失血家陽氣鬱於血分之中則身熱鬱冒但頭汗出身熱者火閉於內而不得達於外故也但頭汗出者火性炎上外有所束則火不能四達故愈炎上而頭汗也治法宜解其鬱使遍身微汗則氣達於外而陽不乘陰熱止血亦治矣此如盛暑遏熱得汗而解小柴胡湯主之又有瘀血發熱者瘀血在肌肉則翕翕發熱證象白虎口渴心煩肢體刺痛宜當歸補血湯合甲己化土湯加桃仁紅花柴胡防風知母石膏血府逐瘀湯亦治之瘀血在肌腠則寒熱往來以肌腠為半表半裡內陰外陽互相勝復也宜小柴胡湯加當歸白芍丹皮桃仁荊芥紅花治之桃奴散加黃芩柴胡亦治之瘀血在腑則血室主之證見日晡潮熱晝日明瞭暮則譫語以沖為血海其脈麗於陽明故有陽明燥熱之證桃仁承氣湯治之小柴胡湯加桃仁丹皮白芍亦治之瘀血在臟則肝主之以肝司血故也證見骨蒸癆熱手足心燒眼目青黑毛髮摧折世以為難治之證而不知熱血在肝臟使然宜柴胡清骨散加桃仁琥珀乾漆丹皮治之以上所論皆屬血家發熱之實證也又有發熱之虛證分血虛水虛兩類另條如下血虛者發熱汗出以血不配氣則氣盛而外泄也或夜則發熱以夜主血分故也或寅卯時即發熱以寅卯屬少陽肝血既虛則少陽之相火當寅卯旺時而發熱地骨皮散加柴胡青蒿胡黃連雲茯苓甘草治之又或胞中之火因血不足上合陽明燥氣日晡潮熱者犀角地黃湯治之水虛者水為氣之所化水津不足則氣熱皮毛枯燥口咽生瘡遺精淋祕午後發熱大補陰丸以補水濟火或清燥救肺湯從肺胃以生水津水足以濡血則陽氣不亢燥熱自除五蒸湯亦統治之復有陰虛於內陽浮於外而發熱者須大補其陰而復納其陽故産後發熱用四物湯加黑薑失血發熱亦可用之火重者再加芩連若腎陰不足真陽外浮發熱喘促者是為陰不戀陽陽不入陰宜從陰引陽用二加龍骨湯加五味子麥門冬阿膠或三才湯加鹽炒肉桂少許桑葉雲苓白芍冬蟲夏草山茱萸牛膝五味子知母沉香龜板此外又有食積發熱者手足心腹熱胸滿噦厄大便不調日晡及夜發煩宜枳殼厚朴大黃消去之則不壅熱矣勿謂虛人無實證也厥冷雜病四肢厥冷為脾腎陽虛不能達於四末四逆湯主之若失血之人而亦間有發厥者則多是熱邪內陷伏匿在裡外見假寒身如冷水目昏神暗脈伏不見或冷一陳反而發熱或厥數日反發熱數日其厥多熱少者是陽極似陰熱之至也厥少熱深者是伏熱猶得發泄熱尚淺也此即傷寒論厥陰篇所謂熱深厥亦深熱微厥亦微是矣蓋厥陰肝經內寄膽火病則火伏陰中而為厥火出陽分則反熱發熱固是火甚發厥則火伏於內而更盛矣先宜治其伏火使火得發轉厥為熱次乃更清其熱斯可愈耳若誤認為雜病發厥而用熱藥是促其命也其辨法雜病之厥吐利不止脈脫氣微有寒無熱伏火之厥則厥後微露熱形口不和便不溏小便不清心中疼熱煩躁不寧惡明喜暗渴欲得飲吐衄隨厥而發皆現真熱假寒之象先以清化湯合升降散攻其伏熱或當歸蘆薈丸攻之次以五蒸湯清之厥止熱不退者再用大補陰丸地黃湯以滋陰發厥之證又有寒閉於外而火不得發者用仲景四逆散加荊芥黃連枯芩審其陽陷於內而不出者白頭翁湯以清達之升陽散火湯以溫發之二方酌宜而行血家發熱固多是真熱假寒然亦有真寒者去血太多氣隨血泄以致中氣虛而不旺元氣損而不足四肢厥冷不思飲食大便溏瀉此乃虛則生寒之證法宜溫補十全大補湯參附湯養榮湯隨宜用之寒熱發熱惡寒多是外感傷其榮衛傷榮則寒傷衛則熱平人治法須用麻桂發散失血皆陰血大虧不可再汗以耗其氣分之水液只可用小柴胡湯加荊芥防風紫蘇杏仁薄荷前胡葛根等以和散之免犯仲景血家忌汗之戒也若不關外感系本身榮衛不和發為寒熱似瘧非瘧者不可作瘧治之只用小柴胡或逍遙散和其榮衛而愈又有瘀血作寒熱者其身必有刺痛之處血府逐瘀湯治之此與雜病寒熱有異醫者須知出汗汗者氣分之水也血虛則氣熱故蒸發其水而出為汗但頭汗出身不得汗者乃陽氣內郁冒於下而為汗以小柴胡湯解其鬱則通身得汗而愈蒸蒸汗出者乃血虛氣盛沸溢為汗宜用白虎湯加當歸蒲黃蟬蛻治之手足濈濈汗出者以胃中或有瘀血食積四肢為中州之應火熱中結故應手足汗出也宜玉燭散加枳殼厚朴以攻之結去而汗自止矣睡中盜汗者睡則氣歸血分血不足則氣無所歸故氣泄而汗出宜當歸六黃湯治之或地骨皮散加棗仁知母茯苓五味子黃耆黃柏以上所論皆失血家陰血內虛陽氣遏發之病亦有陰陽兩虛自汗盜汗者宜歸脾湯加麥冬五味子或當歸六黃湯加附子又有大汗亡陽者在雜病亡陽則單屬陽虛失血家大汗亡陽則兼是陰虛陽無所附非大劑參附湯不能回陽繼用獨參湯養之而愈此論血家出汗與雜證出汗有別參看汗血發熱門更詳發渴血虛則發渴有瘀血則發渴水虛亦發渴血虛發渴者血為陰氣為陽血少則氣多陽亢無陰汁以濡之故欲飲水也法宜補血血足則氣不熱矣聖愈湯加天冬花粉治之或當歸補血湯加花粉苧麻根玉竹麥冬瘀血發渴者以津液之生其根出於腎水水與血交會轉運皆在胞中胞中有瘀血則氣為血阻不得上升水津因不能隨氣上布但去下焦之瘀則水津上布而渴自止小柴胡加丹皮桃仁治之血府逐瘀湯亦治之挾熱蓄血者桃仁承氣湯治之夾寒瘀滯者溫經湯治之水虛發渴者以肺胃之水津不足是以引水自救水津雖由水穀所化而其氣實發源於腎中腎中天癸之水至於胞中循氣衝隨呼吸而上於肺部肺金司之布達其氣是以水津四布口舌胃咽皆有津液而不渴也若腎中之水不足則不能升達上焦是以渴欲引水宜啓下焦之陰以滋津液地黃湯加人參麥冬訶子或左歸飲加兒茶人參玉竹三才湯加知母治之夫水津雖生於腎而實布於肺又有腎中之水津本足而肺金鬱滯不能散布以致水結為痰咽乾口渴宜小柴胡湯通上焦之滯使肺氣通調則水津四布矣又曰津液雖生於腎布於肺而實賴胃中水穀以滋其化源胃中燥結則津不生三一承氣湯治之胃中蘊熱則津不生玉泉散治之胃經肌熱則津液被灼人參白虎湯治之胃中虛熱則津不生麥冬養榮湯治之上分三條皆失血多有之證與雜病消渴水停不化津氣不升者不同參看可也水停不化當用五苓真武等湯心煩煩者心不安也心為火臟化生血液轉賴血液以養其火故心字篆文即是倒火火降則心寧也失血家亡血過多心火失其滋養故多發煩火太甚者舌上黑苔夜不能寐黃連阿膠湯主之心中懊憹者以火不得宣故鬱而不樂也宜梔子豉湯加連翹桔梗大力生地遠志黃連草梢治之若火不甚而血太虛者心中了戾不得是為虛煩歸脾湯加硃砂麥冬炒梔子治之逍遙散加龍骨棗仁亦治之仲景酸棗仁湯尤為治煩要藥若煩而兼躁手足妄動此為虛中夾實內有燥屎必見二便不調發熱口渴脈數有力等證在傷寒為承氣證在失血家須兼顧其虛宜玉燭散或用玉女煎加元明粉煩躁之極循衣摸床小便利者陰尚未盡猶可救一二小便不利死不治矣此與陰躁不同陰躁不煩而但躁且必現陰寒可據之證須細辨之又有産後血虛心煩短氣者雖同是心煩然産血下行氣多虛脫其血之虛皆由於氣虛故心煩而必兼短氣宜歸脾湯當歸補血湯養榮湯等以補氣者生血而心煩自愈至吐血家則其氣上逆多是氣實血虛證見心煩尤血不養心之甚者也若再補其氣則氣益甚而血益虛心愈不得其安矣治宜補血清火硃砂安神丸治之須參看臥寐怔忡驚悸門臥寐附夢寐臥者身著席頭就枕之謂也寐者神返舍息歸根之謂也不得臥寐之證雜病猶少失血家往往有之不得臥有二證一是胃病一是肺病胃病不得臥者陰虛則邪並於陽煩躁不臥此與傷寒論陽明篇微熱喘冒不得臥者為胃有燥屎之義同三一承氣湯治之若無燥結但系煩熱者竹葉石膏湯白虎湯治之兼理血分則宜用玉燭散玉女煎又有胃中宿食脹悶不得臥者越鞠丸加山楂麥芽萊蔔子蓋陽明主闔和其胃氣使得還其主闔之令斯能臥矣肺病不得臥者肺為華蓋立則葉垂臥則葉張水飲沖肺面目浮腫咳逆倚息臥則肺葉舉而氣益上故咳而不得臥葶藶大棗瀉肺湯攻去其水則得臥矣或二陳湯加乾薑細辛五味子溫利水飲亦可若是火逆之氣挾痰上衝者則又宜水火兼瀉痰甚者消化丸主之火甚者滾痰丸主之平劑則宜二陳湯加柴胡栝蔞黃芩旋覆花杏仁薑汁竹瀝保和湯亦治之若無痰飲但是火氣上衝者其人晝日不咳臥則咳逆氣不得息乃肺痿葉焦臥則肺葉翹舉氣隨上衝咳嗆不已宜清燥救肺湯加生地黃栝蔞根百合五味子以斂之再加鐘乳石以鎮降之且肺之津生於腎中如腎水不能上濟上焦沖氣逆上咳不得臥者當從腎治之六味丸加參麥散再加牛膝以引氣下行加磁石以吸金氣使歸於根不寐之證有二一是心病一是肝病心病不寐者心藏神血虛火妄動則神不安煩而不寐仲景黃連阿膠湯主之陰虛痰擾神不安者豬苓湯治之一清火一利水蓋以心神不安非痰即火余每用硃砂安神丸加茯苓琥珀或用天王補心丹肝病不寐者肝藏魂人寤則魂遊於目寐則魂返於肝若陽浮於外魂不入肝則不寐其證並不煩躁清睡而不得寐宜斂其陽魂使入於肝二加龍骨湯加五味子棗仁阿膠治之又或肝經有痰擾其魂而不得寐者溫膽湯加棗仁治之肝經有火多夢難寐者酸棗仁湯治之或滑氏補肝散去獨活加巴戟四物湯加法夏棗仁冬蟲夏草龍骨夜合皮亦佳又按魂雖藏於肝於晝遊於目目在面部乃肺胃之所司肺胃之氣擾而不靜亦能格魂於外使不得返也宜生地黃百合麥冬知母枳殼五味子白芍甘草棗仁天花粉茯苓治之人參清肺湯亦治之又有虛悸恐怖不寐之證仁熟散治之思慮終夜不寐者歸脾湯加五味治之須參看怔忡煩悸門又有昏沉多睡之證在雜病為邪入陰分在失血虛癆乃血脫之後元氣不支是以昏睡如汗出氣喘危急之候也參附湯救之寤屬陽故不寤為陽虛人參養榮湯亦治之若身體沉重倦怠嗜臥者乃脾經有濕平胃散加豬苓澤瀉治之六君子湯加防己薏苡仁補中益氣湯亦治之此論多睡多是陽虛然亦有膽經火甚而多昏睡者龍膽瀉肝湯治之夢乃魂魄役物恍有所見之故也魂為病則夢女子花草神仙歡喜之事酸棗仁湯治之魄為病則夢驚怪鬼物爭鬥之事人參清肺湯加琥珀治之夢中所見即是魂魄魂善魄惡故魂夢多善魄夢多惡然魂魄之所主者神也故安神為治夢要訣益氣安神湯治之又有癆蟲生夢照癆蟲法治之又有夢而遺精詳遺精門再按睡而惡明喜暗者火邪也側臥不得轉身者少陽之樞機不利也側臥一邊者詳咳嗽門喘息人不喘息則氣平靜血何由隨之吐出哉故失血家未有不喘息者有實喘有虛喘實喘之證有二一是鬱閉一是奔迫鬱閉者氣不達於外而壅鬱於內也失血家陽來乘陰此證為多傷寒喘息者用麻桂發之血家忌汗又忌升發以動其血與傷寒開鬱閉之法不同宜小柴胡湯加杏仁以轉樞外達使腠理通榮衛和斯達氣於外不壅於內而為喘矣如果有外感閉束不得不疏解者宜香蘇飲加杏仁枯芩甘草或千金麥門冬湯借麻黃以解外而兼用清裡之藥不致過汗亡陰乃為調劑得宜奔迫者上氣喘息由於氣盛於下而逆於上失血家火盛逼血往往其氣粗賁宜大瀉其火火平則氣平用厚朴枳殼大黃使地道通氣下瀉則不上逆矣若內有瘀血氣道阻塞不得升降而喘者亦宜上三味加當歸白芍桃仁丹皮治之若是痰氣阻塞者清化丸主之若小便閉者下竅塞故上竅壅也宜五淋散加防己杏仁桑白皮葶藶子虛喘亦有二證一是肺虛一是腎虛肺虛作喘者以肺居上焦制節五臟開竅於鼻以通外氣以斂內氣血虛則火盛津傷肺葉痿而不下垂故氣不得降喘息鼻張甚則鼻敞若無關闌乃肺痿之重證也生津補肺宜清燥救肺湯兼治鬱火痰滯者宜保和湯或太平丸吾謂肺葉下墜宜兼用鎮斂之法三才湯合生脈散再加百合五倍子白芨花粉杏仁川貝母鐘乳石治之又有喘息由於鼻窒不通者以肺中之火鬱閉鼻管故氣並於口而為喘也太平丸加麝香即是上通鼻竅之妙藥與傷寒鼻塞有異毋誤治也腎虛喘息者以氣之根原於腎失血家火甚水枯不能化氣是以氣短而喘咳逆喘息頰赤咽乾宜大補陰丸加牛膝五味以潛降之若是陰虛陽無所附氣不歸根者地黃湯合生脈散加磁石牛膝沉香以滋納之若小水不化兼腰痛者乃是腎中之陽不能化氣宜腎氣丸治之參附湯加五味茯苓亦可上系肺腎分治之法如欲兼而治之即從諸方化裁可也此外如蘇子降氣湯四磨湯皆肺腎兼治但未能照顧血證用者須知加減又曰中宮虛則氣少人參主之中宮實則氣粗大黃主之厄噦久病聞厄為胃絶須審脈證斷之不得但據厄逆遂斷其死也失血家氣不順利多有厄逆新病形實者為伏熱攻發火性炎上氣逆而厄清熱導氣宜三物湯或柴胡梅連散加枳殼檳榔若膈間有痰閉滯者宜滾痰丸指迷茯苓丸又有瘀血阻滯而發厄者必見刺痛逆滿之證大柴胡湯加桃仁丹皮蘇木治之血府逐瘀湯亦治之若久病發厄形虛氣弱者為胃中空虛客氣動膈所謂客即痰火氣也治痰氣宜旋覆代赭石湯或二陳湯加丁香枳殼治火氣宜玉女煎加旋覆花赭石柿蒂或用梅連散加柿蒂枳殼五味子俗治厄逆但用丁香柿蒂丁香性溫降痰柿蒂性寒清火二物騎牆之見故多不效須分寒熱用之噦者吐氣也血家氣盛此證最多其治法與厄逆同惟有傷食胃中壅塞而發噦者宜越鞠丸加旋覆花枳殼萊蔔子以上皆治胃之法而心氣不舒亦有發厄噦者常見人有抑鬱心氣不暢則胸中喉間常如有物哽塞時發噦厄不得快利治法當清其心調其氣宜二陳湯加黃連連翹牛蒡子桔梗栝蔞霜當歸川貝母治之余詳痰飲門痰飲痰飲之證已詳於咳血咯血咳嗽諸條茲因失血諸人無不兼痰飲者故更言之不憚煩復痰飲者水之所聚也人身飲食之水由口入由膀胱出肺氣布散之脾氣滲利之腎氣蒸化之是以瀉而不留也此水不留則無飲邪矣人身津液之水生於腎中寄居胞室隨氣而上布於肺經是為津液津液散布則不凝結而為痰矣上焦血虛火盛則煉結津液凝聚成痰肺為之枯咳逆發熱稠黏滯塞此由血虛不能養心則心火亢甚剋制肺金津液不得散布因凝結而為痰也豁痰丸治之二陳湯加黃連黃芩柴胡栝蔞霜亦治之玉女煎加茯苓白前旋覆花或保和丸以滋肺胃為燥土燥氣甚則津結為痰指迷茯苓丸主之頑痰壅塞者滾痰丸治之痰黏喉中哽塞不下者名梅核氣證仲景用七氣湯理氣除痰血家病此多兼鬱火宜指迷茯苓丸加甘草桔梗紫蘇香附旋覆花薄荷射干栝蔞霜牛蒡余按咽中乃少陰脈所繞心經火甚往往結聚成痰發為梅核宜甘桔湯加射干山梔子茯神連翹薄荷再用半夏一大枚切片醋煮三沸去半夏入麝香少許沖前藥服又衝脈亦挾咽中若是沖氣上逆壅於咽中而為梅核必見頰赤氣喘等證審其挾水飲而上者桂苓甘草五味湯治之審其挾痰火而上者豬苓湯加梅粉栝蔞霜旋覆花治之夫痰為津液所凝而津液之生原於腎下焦血虛氣熱津液不升火沸為痰豬苓湯地黃湯加川貝母五味子麥冬旋覆花款冬花海蛤粉牛膝白前龍骨牡蠣黃柏知母等藥飲由水氣停蓄其責在於膀胱若膀胱之水因寒上泛胸腹漉漉有聲喉中潮響咳嗽哮吼等此為土不治水肺受其憊通用二陳湯治之六君子湯真武湯小青龍湯治之按失血之人由於陰虛火旺少病寒飲者即或咳吐涎水審其脈滑數心煩熱者仍是火盛水溢火逆之至是以水逆之甚也其治法清火瀉水兼而行之宜葶藶大棗瀉肺湯消化丸及二陳湯加芩連柴胡白前根參看咳嗽諸條乃詳痞滿積聚癥瘕心下為陽明之部分乃心火宣布其化之地君火之氣化血下行隨衝脈以藏於肝即從心下而起腎水之陽化氣上行隨衝脈以交於肺由肺散布以達肌膚亦從心下而出蓋此地為陽明中土乃水火血氣上下往來之都會也火降血下氣升水布則此地廓然設若火不降則血不下而滯於此矣設若氣不布則水不散而結於此矣觀傷寒論治心下痞滿之證用瀉心湯以瀉火用十棗湯以瀉水甘草瀉心湯生薑瀉心湯水火兼瀉五苓散解水結柴胡湯解火結可知此地須水升火降斯為既濟之形設上火下水阻於中宮遂成天地否象故名曰痞血家火浮於上與水不交往往見痞滿之象審系火氣不得下降者瀉心湯治之或加生附子以開其痞審系膀胱水中之陽逆於心下不得外出者以小柴胡湯轉其樞機而水火皆通達矣如水火交結輕者為結胸小陷胸湯主之重者為陷胸大陷胸湯治之若單是水氣結聚者二陳湯枳朮丸治之今醫但知停食痞滿而不知痞滿之證不一而足此外尚有胸痹等證皆未論列茲所論者乃失血家間有之證也凡遇以上諸證再能酌加當歸地黃川芎赤芍丹皮等以照顧血證斯為面面俱到又有積聚之證或橫亙心下或盤踞腹中此非凝痰即是里血通以化滯丸主之凝痰用清茶送下里血用醋酒送下無論臍上臍下左右兼治又凡在臍下多是血積抵當丸治之又有癥瘕見於臍下或見或沒為瘕常見不沒為癥癥宜腸下逐瘀湯抵當丸瘕宜橘核丸按痞滿者胸膈間病積聚者大腹之病癥瘕者下焦之病統以真人化鐵湯加吳萸治之統以逍遙散和之另詳瘀血門腫脹腫脹者水病也氣病也失血家往往水腫氣腫抑又何哉蓋以血之與氣水之與火互相倚伏是二是一吾於水火血氣論及調經去痰諸條已言之茲復不憚煩勞曰氣即水也血中有氣即有水故肌肉中有汗口鼻中有津胞中有水是水與血原並行不悖失血家其血既病則亦纍及於水水蓄胞中則為尿結水淫脾胃則為脹滿水浸皮膚則為水腫治法皮膚水腫者宜從肺治之以肺主皮毛故也肺為水之上原肺氣行則水行宜瀉白散加杏仁桔梗紫蘇茯苓五皮飲亦治之大腹脹滿者宜從脾治之補土利水則水行而土敦胃苓湯主之六君子湯加苡仁防己亦主之胞中水結小腹脹滿者五苓散治之豬苓湯亦治之諸水又皆腎之所主腎氣化則上下內外之水俱化宜六味地黃丸以上所舉之方皆平劑也醫者又須審別陰陽隨加寒熱之品乃能奏效審其口渴溺赤喜涼脈數者為陽水則知柏芩連山梔石膏天冬麥冬可加入審其口和溺清喜熱脈濡為陰水則桂附乾薑吳萸細辛可加入失血家陽水居多陰水最少醫者須臨時細審又有瘀血流注亦發腫脹者乃血變成水之證此如女子胞水之變血男子胞血之變精瘡科血積之變膿也血既變水即從水治之宜照上所舉諸方分寒熱加減再加琥珀三七當歸川芎桃奴蒲黃以兼理其血斯水與血源流俱治矣古稱婦人錯經而腫者為水化為血名曰水分經水閉絶而腫者為血化為水名曰血分其實治法總宜從水治之方證加減舉不外此也觀於婦人水分血分之説則知血家所以多腫脹者亦是水分血分之病也此與雜證水腫有別勿妄用舟車丸及消水聖愈湯等另詳血臌門怔忡俗名心跳心為火臟無血以養之則火氣衝動是以心跳安神丸清之歸脾湯加麥冬五味子以補之凡思慮過度及失血家去血過多者乃有此虛證否則多挾痰瘀宜細辨之心中有痰者痰入心中阻其心氣是以心跳動不安宜指迷茯苓丸加遠志菖蒲黃連川貝母棗仁當歸治之硃砂安神丸加龍骨遠志金箔牛黃麝香治之又有胃火強梁上攻於心而跳躍者其心下如築牆然聽之有聲以手按其心下復有氣來抵拒此為心下有動氣治宜大瀉心胃之火火平則氣平也瀉心湯主之或玉女煎加枳殼厚朴代赭石旋覆花以降之再加鬱金莪朮以攻之使血氣火三者皆平自不強梁矣驚悸悸者懼怯之謂心為君火君火宣明則不憂不懼何悸之有心火不足則氣虛而悸血不養心則神浮而悸仲景建中湯治心氣虛悸炙甘草湯治心血不足而悸今則以養榮湯代建中以歸脾湯代炙甘草一治氣虛一治血虛又有飲邪上干水氣凌心火畏水克而悸者苓桂朮甘湯治之失血家多是氣血虛悸水氣凌心者絶少又曰正虛者邪必湊之凡是怔忡驚悸健忘恍惚一切多是痰火沃心擾其神明所致統用金箔鎮心丸主之驚者猝然恐惕之謂肝與膽連司相火君火虛則悸相火虛則驚蓋人之膽壯則不驚膽氣不壯故發驚惕桂枝龍骨牡蠣甘草湯治之恐畏不敢獨臥者虛之甚也仁熟散治之又凡膽經有痰則膽火上越此膽氣不得內守所以驚也溫膽湯加龍骨牛黃棗仁琥珀柴胡白芍治之復有陽明火盛惡聞人聲聞木音則驚者此內經所謂氣並於陽故發驚狂者也乃肝膽木火脾土法宜大瀉陽明之火大柴胡湯治之當歸蘆薈丸亦治之血家病驚多是陽明火盛病虛驚者亦復不少用以上諸方須兼顧血證以盡其化裁勿執桂甘龍牡等湯而不知宜忌也健忘健忘者適然而忘其事盡心力思量不來凡所言行往往不知首尾病主心脾二經蓋心之官則思脾之官亦主思此由思慮過多心血耗散而神不守舍脾氣衰憊而意不強二者皆令人猝然忘事也治法必先養其心血理其脾氣以凝神定志之劑補之亦當處以幽間之地使絶其思慮則日漸以安也歸脾湯主之若心經火旺者是火邪擾其心神治宜清火寧心天王補心丹治之亦有痰沉留於心包沃塞心竅以致精神恍惚凡事多不記憶者宜溫膽湯合金箔鎮心丸治之硃砂安神丸加龍骨遠志菖蒲茯神炒黃丹亦治之失血家心脾血虛每易動痰生火健忘之證尤多又凡心有瘀血亦令健忘內經所謂血在下如狂血在上喜忘是也夫人之所以不忘者神清故也神為何物即心中數點血液湛然朗潤故能照物以為明血在上則濁蔽而不明矣凡失血家猝得健忘者每有瘀血血府逐瘀湯加鬱金菖蒲或硃砂安神丸加桃仁丹皮鬱金遠志恍惚癲狂見鬼大病傷寒之後欲食不食欲臥不臥欲行不行精神恍惚若有鬼神附其體中者名曰百合病謂百脈一宗合致其病肺主百脈肺魄不寧故病如此諸多恍惚未盡名狀必見溺赤脈數之證乃肺金受克之驗也仲景用生地百合滑石治之此專言雜病餘邪為患者也失血家陰脈受傷凡是恍惚不寧皆百合病之類總宜清金定魄為主清燥救肺湯加百合茯神琥珀滑石生地金箔治之地魄湯亦治之或瓊玉膏加龍骨羚羊角百合或人參清肺湯加百合滑石大凡夜夢不寧者魂不安也魂為陽夜則魂藏而不用魂不能藏故夜夢不寧寤時恍惚者魄不安也魄為陰寤時而陰氣不足故恍惚不定治魂以肝為主治魄以肺為主二者對勘自明然恍惚驚悸惑亂怔忡癲狂皆是神不清明之證人身有魂魄而所以主是魂魄者則神也故凡諸證總以安神為主安神丸金箔鎮心丸治之語言錯亂為癲多由喪心失魄痰迷心竅所致統以金箔鎮心丸治之怒罵飛走為狂由於火邪逼迫心神迷亂四肢躁擾滾痰丸治之見鬼者癲狂之類也陽明病胃有燥屎則目中見鬼宜三一承氣湯下之失血家瘀血在內亦譫語見鬼以其同為實邪故俱能擾目之明也桃仁承氣湯治之暈痛傷寒雜病頭暈痛者風寒也血家暈痛則多是痰火誤用發散藥鮮不增劇痰氣上攻頭目沉重昏花兀兀欲吐首如裹物右手脈實陰雨增痛是痰候也二陳湯加防風川芎黃芩薄荷細辛石膏治之病重者消化丹治之火逆暈痛者煩渴引飲見火增劇掉頭更痛口苦嗌乾溺赤便閉左手脈數是火症也大柴胡湯治之當歸蘆薈丸亦治之輕則小柴胡湯加菊花以上所論皆暈痛之實證又有暈痛之虛證須分暈與痛之兩門而後施治有別也肝虛則頭暈內經云諸風掉眩皆屬於肝肝血不足則生風風主動故掉眩失血之人血虛生風者多逍遙散加川芎青葙子夏枯草治之或但滋肝臟以為息風之本左歸飲加牛膝巴戟天杭菊花細辛枸杞腎虛則頭痛內經所謂頭痛巔疾下虛上實過在少陰是也六味地黃丸加細辛蔥白麝香治之若是腎厥頭痛乃腎中濁陰上逆於頭上實下虛手足厥冷宜腎氣丸加細辛蔥白此證之痛連齒入腦與尋常微痛者不同血家頭痛似此者少宜用六味丸者多又曰頭暈痛雖是兩病失血之人往往兼見二證由於血虛則風動而眩火動而暈吾謂不分暈痛亦不分治肝治腎總以四物湯加元參枸杞肉蓯蓉玉竹天麻細辛知母黃柏山茱萸牛膝眼目目黃出火見鬼昏花目珠紅眼為肝竅又陽明脈絡所繞故其為病皆肝胃兩經之咎眼珠黃者在胃經屬濕熱甚則通身皆黃小便必然不利宜五苓散加茵陳梔子秦皮黃柏知母治之在肝經是瘀熱仲景云衄家目黃者衄未止是血中有熱故也凡是血熱者其目多黃四物湯加柴胡黃芩丹皮蘇木茵陳紅花治之目珠紅亦是瘀血治與上同目中出火者一是胃火亢甚必兼口渴身熱等證犀角地黃湯加石膏天花粉金銀花枳殼治之一是肝火外越必兼口苦耳鳴等證當歸蘆薈丸治之目中見鬼者一是胃有燥屎目神昏花三一承氣湯治之一是肝經血室蓄有瘀熱夜則譫語大柴胡湯加桃仁牡丹皮治之目運者肝之風火也觀羊角風可悟宜小柴胡湯加當歸白芍防風菊花治之眼花者腎之陰虛瞳神屬腎客熱犯之時見黑花或成五色宜地黃湯加枸杞硃砂磁石肉蓯蓉石決明元參知母細辛治之又有陽虛血大吐後目光散大不能見者必小便多也宜腎氣丸以上所舉皆血家間有之病其餘目疾非血家兼有者不贅耳病陳修園曰腎開竅於耳而腎脈卻不上頭腎與心交假道於心腑小腸之脈以入耳中名曰聽宮為司聽之神所居其形如珠皮膜包裹真水若真水破而耳立聾有為大聲所震而聾者皮膜破也或聾或不聾者心腎不交也宜磁朱丸以交心腎有先耳鳴而後聾者腎虛不能閉藏陰氣窒塞於陽竅也宜六味丸去丹皮加磁石五味龜板令陰氣自盛於本宮不觸於陽竅而愈若外感暴聾總不外少陽一經足少陽膽脈繞耳輪手少陽三焦脈入於耳邪氣壅塞聽宮為其所掩宜逍遙散去白朮加黃芩半夏生薑竹黃羚羊角玉竹治之風火交煽宜防風通聖散肝火熾甚宜當歸蘆薈丸尺脈弱者宜桂附地黃丸尺脈數者宜大補陰丸俱加磁石菖蒲肉蓯蓉神而明之存乎其人非筆楮所能盡按上陳修園説最明但又有久病之人以及産婦中宮大虛不能堵塞肝腎之氣以致虛火上衝而發耳鳴者雖系膽與腎中之火卻要填補脾胃以堵塞之歸脾湯加柴胡山梔子魚鰾蓮子五味治之四君子湯加蓮米芡實薏苡仁黃精白芍淮山藥亦治之口舌五臟六腑皆秉氣於胃五臟六腑之氣亦皆發見於胃口者胃之門戶故五臟六腑之氣皆見於此口苦是膽熱小柴胡湯加黃連治之口甘是脾熱甲己化土湯加天花粉茵陳蒿炒梔子茯苓枳殼厚朴黃芩石膏治之口酸是濕熱觀炎天羹肉過夜則酸便知酸是濕熱所化葛根黃連黃芩湯加防己茵陳木通滑石花粉雲苓治之或蒼朮黃柏黃連吳茱萸亦治之口咸是脾濕潤下作咸脾不化水故咸也二陳湯加旋覆花藿香白芍檀香吳茱萸治之胃苓湯亦治之或六味地黃湯加旋覆花牛膝白前根從腎中化水納之下行以隔治之口淡是胃虛六君子湯隨寒熱加減治之口澀是風熱通聖散去芒硝大黃治之口麻是血虛聖愈湯加薄荷治之口臭是食積之火平胃散加山楂神麯麥芽黃芩石膏治之口中糜爛是膀胱遺熱於小腸熱氣不得下泄故糜及於口導赤散加天花粉天門冬麥門冬金銀花燈心車前子梔子治之喉腥是肺火痰滯瀉白散合甘桔湯再加射干馬兜鈴黃芩杏仁川貝母天冬麥冬百合栝蔞霜治之總而論之口乃胃之門戶總以治胃為主宜分舌熱用甘露飲平胃散加減治之舌為心之苗而居口中臟腑之氣發見於口者多著於舌故即舌苔可以診知臟腑諸病傷寒邪在表者舌無苔在半表半裡者舌乃有苔入里則苔結矣故凡有苔皆系內證苔白為濕熱小柴胡湯加花粉石膏滑石木通治之苔黃為燥熱犀角地黃湯加知母石膏天花粉大黃枳殼治之黑苔芒刺為實熱大承氣湯治之若苔黑而舌滑潤者乃水極似火真寒假熱之證四逆湯加豬膽汁人尿蔥白治之血家虛火又宜地黃湯加肉桂牛膝五味子龍骨以引導之又凡舌腫舌裂痛瘡等證均是心脾火毒瀉心湯治之大清涼散亦治之若舌根木強或舌短縮者皆是少陰經風邪內動陰火上騰之候地黃飲子加羚羊角治之上所論口舌諸證血家間亦有之要宜以血證為主參以上各法斯為本末兼權之術咽喉咽喉為肺之關胃之門少陰心脈之所絡肝經衝脈之所夾凡此四經皆血之所司也故失血家往往有咽痛之證凡咽痛而聲不清利者為肺火肺主氣氣管中痛故聲不清利甘桔湯加馬兜鈴黃芩杏仁川貝母黃連麥冬百合薄荷治之凡咽痛而飲食不利者胃火也胃上口為食管食管痛故飲食不利白虎湯加金銀花大黃桔梗枳殼治之咽喉作痛而上氣頰赤者肝經衝脈逆上之火也宜玉女煎加旋覆花射干再用鹽炒安桂少許以引火下行喉中塞腫及潰爛皆為少陰心經之火宜瀉心湯加山豆根牛蒡子桔梗甘草薄荷細辛膽南星牛黃治之腫塞者外用人爪甲雞內金急性子全蠍合巴豆炒過去巴豆再加火硝硼砂冰片膽礬青黛黃連枯礬吹上吐痰血即愈潰爛者外用雄黃黃連珍珠桑螵蛸寒水石牛黃硼砂麝香吹之又有梅核證在痰飲門參看再按血家咽痛多是肺胃虛火及衝脈火逆吾於咳嗽諸條言之甚詳癆蟲蝕咽見聲音門宜參匯聲音失血家初病失音多是風火聲音者肺之所主肺金清朗則聲音顯明失血家肺金陰虛為火所克肺竅不通鼻塞聲閉若系外感閉其氣者宜小柴胡湯加杏仁桔梗荊芥薄荷治之若是肺中實熱壅遏其竅而聲音閉者人參瀉肺湯治之又有津液乾枯肺痿葉焦聲音嘶小者乃失血之虛弱證人參清肺湯清燥救肺湯治之常用白蜜川貝母人參胡桃百合蒸服又有癆蟲居於肺間齧壞肺臟金蝕不鳴喉中癢咳喘熱難已此為癆瘵難治之證宜百部人參明雄獺爪白芨百合蠶砂麝香桔梗甘草獺肝鰻魚骨治之又凡癆瘵而咽喉破爛者均在不治總宜上方外用珍珠人參牛黃明雄吹之夫聲音者氣所從出也氣根於腎故聲音之出實由腎生氣不歸元則咳愈甚氣愈乏而聲愈干宜以都氣丸主之加人參沉香訶子腎氣丸亦治之腹痛血家腹痛多是瘀血另詳瘀血門然亦有氣痛者以失血之人氣先不和是以血不平而吐衄但血家氣痛與雜病氣痛有別雜病氣痛則痛之甚血家氣痛不甚但覺胸腹之中不得和暢有鬱滯結聚之形宜逍遙散加薑黃香附子檳榔天台烏藥治之再參瘀血痞滿門更詳痹痛身體不仁四肢疼痛今名痛風古曰痹證虛人感受外風客於脈分則為血痹仲景用黃耆五物湯以桂枝入血分行風最效失血家血脈既虛往往感受外風發為痹痛或遊走不定或滯著一處宜黃耆五物湯重加當歸丹皮紅花如血虛火旺之人風中兼火外見痹證內見便短脈數口渴等證則不宜桂枝之辛溫宜四物湯加防風柴胡黃芩丹皮血通秦艽續斷羚羊角桑寄生玉竹麥冬治之血虛生風往往而然當歸紅花荊芥酒水煎服瘀血竄走四肢亦發疼痛證似血痹惟瘀血之痛多如錐刺脈不浮不拘急此略不同另詳瘀血門又有周痹腳氣痰濕走注者皆系雜證此不具論痿廢痿者足廢不能行之謂分五痿治之心氣熱則脈痿筋縱而不任地天王補心丹加丹皮治之肝氣熱為筋痿則筋急而攣四物湯加羚羊角續斷山茱萸黃柏地骨皮治之脾氣熱為肉痿胃干而渴肌肉不仁四物湯加人參山藥黃芩黃柏澤瀉雲苓治之腎氣熱則骨痿腰脊不舉地黃湯及大補陰丸治之肺氣熱則津痿不能灌溉於足疲乏不行清燥救肺湯治之以上治法雖分五臟而總系陰虛熱灼筋骨不用之所致欲熱之退莫如滋陰欲陰之生莫如獨取陽明陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關陽明虛則宗筋縱帶脈不引故足痿不用也宜瓊玉膏加玉竹煅石膏石斛花粉珍珠竹茹治之玉女煎加犀角亦治之然痿廢之原雖在於胃而其病之發見則在於筋骨凡虎骨龜板鹿筋豬脊髓牛骨髓狗脊骨碎補牛膝苡仁枸杞子菟絲子續斷皆可加入以為嚮導痿證與腳氣有異切不可誤用風藥遺精世謂上吐血下遺精其病不治謂其上逆下竭立見消耗也然病此者但未沉久猶可圖治蓋遺精失血雖是兩病其實一而已矣精者腎中陽氣所化乃天一所生之癸水也女子十四則癸水至於胞中而衝任兩脈即通將心火所化之血轉輸入胞與癸水交合水從血化是為月信男子十六則癸水亦至於胞中而衝任兩脈亦輸血入胞與癸水合血從水化是謂之精胞者精之舍即血之室也吐衄者是胞中血分之病遺精者是胞中水分之病血與水上下內外皆相濟而行吾已言之屢矣故病血者未嘗不病水病水者亦未嘗不病血也是以吐血多兼痰飲血亦變水腫淋祕亦有下鮮血者以血與水原相倚伏耳精者水之所化遺精者水病也而又吐衄是血亦病也先吐血而後遺精是血病纍及於水先遺精而後吐血是水病纍及於血治法無論先後總以治肝為主胞宮乃肝之所司精與血皆藏於此治血者必治胞治精者亦必治胞胞為肝所司故皆以治肝為主肝寄相火氣主疏泄火熾氣盛則上吐血而下遺精地骨皮散加柴胡胡黃連知母黃柏牡蠣龍骨茯苓蒲黃血餘治之丹梔逍遙散加阿膠龍骨牡蠣蒲黃以平之吐血甚而遺精輕者以治吐血為主生地黃散加金櫻子牡蠣治之遺精甚而吐血輕者以遺精為主地黃湯加血餘龍骨牡蠣治之仲景治遺精有用天雄附子法腎氣不納心火不下交於腎有用肉桂法皆陽虛之證也若失血家則多是火遺即心腎不交亦是水不濟火其為夢遺十之八九蓋肝經火旺則魂不內守恍惚有見亦有無夢而遺仍屬相火之甚者火甚則神不清是以昏沉迷悶不覺精之走失比較有夢而遺者其火更甚毋得誤認為陽虛之證也大補陰丸加生棗仁牡蠣龍骨茯神治之若氣不攝精者其人必見虛寒之狀不徒以有夢無夢為別也淋濁淋者小便短數淋瀝不通之謂也單病此者自有諸書可考血家病此特其兼見者耳然二便為消息之門戶若一閉塞則上中焦不得消息故傷寒論有言急下者有言當利其小便者有言有小便則生無小便死者無一不吃緊於此此水病也水與血相為倚伏吾已言之屢屢單病血不病水者易愈以水調則其血雖病猶有水以濡之也若病血而又纍及於水則上而喘咳外而腫熱下而淋濁均不能免水病則無以濡血而血證亦因以難愈矣吾於尿血腫咳諸條已詳言之可以參看血家病淋多是肺痿肺主制節下調水道肺則津液不流氣不得下而制節不達於州都是以小便不利宜生地百合天花粉知母杏仁桑白皮滑石桔梗豬苓阿膠甘草梢治之血家血虛火旺心遺熱於小腸不能泌別清濁則小便赤短淋瀝導赤飲加炒梔子車前子黃連白芍燈心脾土不化亦能壅濕使小水不利五苓散治之濕中挾熱者去桂尖加茵陳蒿防己黃柏炒梔子前陰屬肝肝火怒動莖中不利甚則割痛或兼血淋宜龍膽瀉肝湯加肉蓯蓉或地黃湯加肉蓯蓉黃柏車前子治之若血淋則加地榆蒲黃腎為水臟膀胱為水府腎中陰虛水源枯竭則小便不化知柏地黃湯少加肉桂以反佐之若是陽虛不能化水者金匱腎氣丸治之以上分別臟腑施治即三焦為決瀆之義也陳修園用五淋散統治三焦吾謂不如分別中下而又各區臟腑以施治尤為精細濁者小水不清或白或黃或青或赤此如暑天洪水泥潦之類乃濕熱為之也濕甚用胃苓湯加黃芩黃連黃柏白朮治之熱甚用茵陳蒿梔子黃柏秦皮木通車前子防己甘草梢治之又有敗精為濁者或由思淫不遂或由淫而精停宜萆薢分清飲加鹿角屑桑螵蛸白芍肉蓯蓉治之又有中氣虛弱小便滴在地上即變色者宜六君子歸脾湯治之便閉二便皆脾胃之出路小便是清道屬氣大腸是濁道屬血失血家血虛便燥尤其應得四物湯加麻仁主之血燥者加桃仁川軍氣燥者加杏仁枳殼風燥者加皂角白芷防風火燥者宜加枳殼厚朴大黃芒硝大腸乃胃之關門胃為燥土若胃有燥屎而不下者其責不在大腸而在胃其證口渴手足潮熱或發譫語三一承氣湯下之或四物湯加麻仁枳殼厚朴大黃以滋降之又小便數而不禁大便反閉者名為脾約謂脾津下泄無以潤腸故也仲景用脾約丸治之丹溪謂宜清肺燥肺清則小水有制而脾得灌溉宜用清燥救肺湯治之腎開竅於二陰腎虛陰不足無以潤腸者宜左歸飲加黑芝麻肉蓯蓉治之肺與大腸相表裡肺遺熱於大腸則便結肺津不潤則便結肺氣不降則便結肺遺熱者人參瀉肺湯治之肺津不潤者清燥救肺湯治之肺氣不降者清燥救肺湯合四磨湯再重加杏仁或少加葶藶子治之與便血條合看自明此外又有瘀血閉結之證或失血之後血積未去或跌打損傷內有瘀血停積不行大便閉結或時通利仍不多下所下之糞又帶黑色腹中時時刺痛口渴發熱脈帶澀象宜用桃仁承氣湯治之或失笑散加杏仁桃仁當歸白芍瀉泄失血虛癆最忌泄瀉以脾胃敗壞不能任藥且少納穀胃氣將絶故也雜病泄瀉用參朮薑苓應手取效此則薑朮補胃轉傷其陰下咽之後立見喘熱竟成枯骨矣然使用滋陰之藥則脾已瀉泄益陰則愈動其瀉勢必土崩不救矣病至此者吾莫如之何也已擬用黃土湯作調停之計效否不敢必也以上所論乃虛極胃將絶之瀉也如非胃氣將絶之瀉便當按證治之毋得語斷其死以恐駭病人濕瀉者如水傾下腸鳴身重其腹不痛胃苓湯主之風泄者大便不聚或帶清血八珍湯加粉葛根丹皮防風白芷寒泄者腹中切痛雷鳴鴨溏下利清白色附子理中湯主之六君子湯加薑附亦治之暑泄者煩渴尿赤暴瀉如水越鞠丸加竹茹粉葛根連翹車前子牛蒡子白芍黃連扁豆枳殼厚朴生薑藿香飧泄者米穀不化香砂六君子治之此與暴注完穀為肺氣迫下者不同暴注則水與谷食入即下為熱迫三一承氣湯食積泄者瀉後痛減臭如抱壞雞子噫氣作酸失血虛人停食作瀉者尤多宜逍遙散或小柴胡湯加山楂神麯麥芽萊蔔子治之越鞠丸平胃散皆治之又有泄血泄痢者另詳便血門又有腎泄五更作泄一名晨泄乃色欲過度足冷氣虛所致宜四君子湯加熟地黃枸杞子菟絲子巴戟天杜仲破故紙肉豆蔻五味子山茱萸治之豬腎一枚加故紙小茴香青鹽燒服亦可飲食水穀入胃其濁者為渣滓下出幽門達大小腸而為糞以出於穀道其清者倏然而化依脾氣而上升於肺其至清而至精者由肺而灌溉乎四體為汗液津唾助血脈益氣力為生生不息之運用也其清中之濁者下入膀胱而為溺此虞天民醫學正傳所論其言水穀消化之道甚明故全録之凡食不化者責之於脾六君子湯主之水不化者責之於肺二陳湯加防己桑皮桔梗木通治之消渴者肺火也甘露飲加花粉治之消穀者胃火也白虎湯加黃連人參枳殼厚朴生地黃治之飲一溲二為下消腎虛也腎氣丸主之食入即吐為火逆瀉心湯加生薑竹瀝治之但用水漱口而不欲飲者多是經脈中有瘀血宜四物湯加紅花血通乾漆冰片蔥白桃仁治之食入良久翻胃吐出或不化而飧泄者為脾不磨食六君子湯加肉豆蔻破故紙吳茱萸五味子治之夫人之所以能化食思食者全賴胃中之津液吾於總論已詳言之有津液則能化食能納食無津液則食停不化觀停食病食入反吐糞如羊屎可知無津液則食不能化之故矣觀噤口痢咽乾津竭食不得下可知無津液則食不能納之故矣痢證噤口者另詳便血門膈食不化以及血虛津枯不思飲食者宜用左歸飲加天花粉人參玉竹黨參蓮米白芍芝麻治之一凡平人內傷飲食多是中寒洞泄治宜理中湯平胃散以溫燥之若失血之人內傷飲食則反多壅實生熱之證往往手足潮熱口乾氣逆衝脈作咳若用溫燥之藥不惟飲食不化且更加壅熱矣用小柴胡湯加枳殼厚朴大黃輕則加萊蔔子麥芽越鞠丸加減亦治之感冒血家最忌感冒以陰血受傷不可發汗故也然血家又易感冒以人身衛外之氣生於太陽膀胱而散布於肺血家肺陰不足壯火食氣不能散達於外故衛氣虛索易召外邪偶有感冒即為頭痛寒熱身痛等證若照常人治法而用麻桂羌獨愈傷肺津肺氣益束而不能達不惟涸血分之陰愈以助氣分之邪矣治惟和解一法為能補正祛邪宜先生其津使津足而火不食氣則肺氣能達於皮毛而衛氣充矣次宜疏理其氣使血分和則不留邪為患而外邪自解矣宜小柴胡湯加杏仁荊芥防風紫蘇主之口渴加花粉去半夏身痛加粉葛根內動痰火者再加茯苓旋覆花內動寒水者另用蘇子降氣湯治之外感風寒客於肺中外證已退久咳不愈者失血家往往有之宜千金麥門冬湯其麻黃搗茸蜜炙變峻為緩以搜陳寒寒客肺中久則變而為熱故用此方或小柴胡加蘇子薄荷細辛亦與麥門冬湯倣佛感冒甚重傳變為熱者宜照傷寒法治之清熱攻裡可以任量惟失血家不得輕用吐法戒之失血之人有狀似感冒而實非感冒者由於肺痿氣虛時時灑淅惡寒鼻塞流清涕乃金被火克內壅外閉衛氣不布之故只宜清養肺金毋得妄用發散以張火焰也太平丸補散兼行以治之千金麥門冬湯小柴胡湯皆宜小柴胡湯通上焦之津液以調和榮衛尤平穩而神奇痙掣拘急痙者角弓反張掣者手足抽扯拘急者頭勾足局肘膝相構傷寒中風凡遇此等分三面治之失血家亦宜分三面施治而用藥略有不同眉列如下角弓反張者太陽經病也無汗用葛根湯有汗用桂枝加葛根湯血家病此多是血燥生風筋灼而攣麻桂皆其所忌前方不中與也宜四物湯加葛根防風荊芥獨活羚羊角桑寄生續斷杏仁治之手足抽掣口目斜引者少陽經病也傷寒中風用大秦艽湯此方風藥雖多尚兼滋補血家病此亦可借用再加阿膠羚羊角人參天花粉以柔潤熄風則與血家更宜而前拘急屬陽明經傷寒中風得此者三一承氣湯治之血家得此為陽明津液大虛筋為之縮法宜大生津液玉女煎加天花粉玉竹葛根竹茹人參麥門冬白芍枳殼治之又曰肝主筋肝病則驚駭筋攣今且不必縷分總以治肝為主四物湯加羚羊角酸棗仁木瓜荊芥黃芩治之此乃血家發痙之治法非通治諸痙之法讀者須知暑疫暑者濕熱合氣之謂也熱蒸則濕動濕鬱則熱遏濕熱合化是為暑氣月令所謂土潤溽暑此之謂矣熱甚則心煩口渴脈數溺赤濕甚則泄痢腫滿喘急閉悶病狀不一總系熱濕二氣而已血家陰虛濕熱之邪尤易感受宜統以大清涼飲治之濕甚者再加防己雖不能盡暑之治法然本此方以推廣之可以得變通之妙又有陰暑實非暑也乃夏月伏陰內動之寒症毋循名而失實疫者四時不正惡戾臭穢之氣觸人為病病氣又能傳染是名曰疫沉冬則無夏秋常有其氣觸人皆從口鼻而入內伏臟腑之中發作則壯熱頭痛變瘧動痢狂躁腫急不一其形雖有外證不得發表但解其里則表氣自和清溫敗毒飲加酒大黃治之血家陰虛疫邪易發故並言之另有瘟疫專書詳明者多宜細查閲此第舉其大意耳食復失血家胃氣清和津液自生火自降痰自順而病亦自愈矣若傷飲食則中宮壅滯氣與火不得順利上衝於肺則為咳嗽外蒸肌肉則發熱內鬱於心則為煩由是血不得寧因之復發名為食復宜甲己化土湯加枳殼厚朴炒梔子麥芽為主咳者加紫菀麥冬五味子杏仁發熱者加石膏知母心煩者加黃連當歸腹痛者加酒大黃已動血者加桃仁蘇木或用逍遙散照上加減法亦調和胃氣善方小柴胡湯亦可仲景治食復言有宿食者皆主芍藥大黃義取二物力能推蕩蓋宿食不去不獨阻新食之進且傷氣壅邪轉生諸疾故主大黃以速去之以免傷其正氣勝查麴之功千萬醫者須知此理臨證庶有膽識夫失血之人所以易於停食者多是胃中有熱貪多飲食既食之後脾津枯少不能糜爛消化是以易於停食宜四君子湯加黃精山藥玉竹天花粉麥芽白芍生地黃枸杞子當歸麥冬山楂萊蔔汁煎服此等治法但讀東垣脾胃論者斷不能知勞復怒復靜則氣平而生陰動則氣躁而生陽煩熱喘咳隨之而作失血病因勞動而復發者十之五六亟宜調息瞑目以收斂浮動之氣使陰生陽祕而血乃不復動矣人參固本湯加蒲黃蘇木治之煩熱甚者宜用地骨皮散加炒梔子蒲黃喘咳甚者宜人參清肺湯治之或三才湯加五味子云茯苓沉香甘草清燥救肺湯亦治之血復止後多飲獨參湯熟睡以息之怒復者怒氣傷肝相火暴發而血因奮興當歸蘆薈丸以瀉之龍膽瀉肝湯以清之丹梔逍遙散以和之小柴胡湯加牡蠣青皮以抑之血潮不止者瀉心湯加當歸白芍沉香香附子降真香以止之十灰散用香附子檳榔童便醋調服以止之去血過多則陰愈傷陽愈亢怒氣愈不能平宜當歸人參沉香香附子生地黃五味子以大補之少與之食以消息之總之失血之人戒勞更能戒怒醫學考辨有戒怒詩云病家誤戒忿怒忿怒無非些小故血隨氣上不循經猶如輕車就熟路吾臨血證多矣每有十劑之功敗於一怒病家自誤醫士徒勞堪發一嘆時復時復者謂血家春夏得病至次年春夏復發秋冬得病至次年秋冬其病復發值其時而仍病故曰時復夫人身五臟六腑與天之氣運呼吸相通原是一體故天之陰陽能構人之疾病其實非天病人也乃人身氣血先有偏盛故感天氣之偏盛而病遂作焉血家病得於春者乃肝經血虛火旺春木之氣內通於肝肝經感木氣而風動火發故值春時舊病復作其已發吐血者宜地骨皮飲加蒲黃黃芩龍膽草杏仁柴胡荊芥醋炒大黃治之尚未發作者須服五味逍遙散加牡蠣阿膠龍骨香附子五味子或用左歸飲加阿膠龜板牡蠣五味子以滋養之使肝腎陰足則火伏而不動矣凡冬日春時得血病者均宜用此法以養肝腎使陽氣封謐而不泄斯病不發矣又凡肝經火動者必先有熱蒸口苦魂夢不寧諸證柴胡清骨散亦治之失血之病得於夏者乃心經火旺次逢夏月復發宜瀉心湯加丹皮蒲黃生地黃木通甘草梢降香牛膝其未發時若見煩熱即宜預服生地黃散以遏止之或天王補心丹以養之又按夏月暑盛病多發於陽明以陽明主燥熱暑熱相合故多屬陽明病在陽明者口渴身熱煩躁便閉惡聞人聲脈勢洪大以此為辨其吐出之血亦必甚多宜犀角地黃湯加葛根金銀花知母蒲黃大黃枳殼若尚未動血初覺發熱口渴者玉女煎加蟬蛻秦皮茵陳枳殼或先服甘露飲以養胃陰免動燥氣秋乃金令肺氣主之凡失血家至秋時皮毛收斂未能祕密往往外合風氣內壅熱邪發咳動血尤為容易病家醫家皆須善為調理庶可補天再造也若是秋時得病是病本得於肺次逢秋月本臟不潤復發痿燥而咳血者清燥救肺湯加生地蒲黃治之人參清肺湯加紫菀當歸蒲黃亦可葛可久太平丸既滋肺陰兼清風痰尤治肺良方若肺氣鬱而不布衛陽不外達津液不下降皮毛灑淅寒熱作咳者宜小柴胡加荊芥防風桔梗杏仁蒲黃蘇木栝蔞根麥冬桑皮陳皮枇杷葉治之風寒客於肺中久咳不止者宜千金麥門冬湯其麻黃搗茸炙過以搜陳寒或重用太平丸重加薄荷亦和散之法冬令屬水腎氣主之此時陰氣堅凝則陽氣潛藏龍雷不作若陰氣不足則陽氣不潛況此時陽氣皆入於內人身陰虛者既多內熱加以陽氣入內兩熱相合致失冬令寒熱之象此與冬行夏令無異是以火迫血動而復發也治法宜滋腎陰泄內熱使其陰凝陽祕覆成為大冬之令斯病愈矣已動血者玉女煎加蒲黃丹皮蘇木繼服大補陰丸六味丸以收功乘其未發先用麥味地黃湯滋之火之不藏如三冬不雪臘月鳴雷潛納陽氣皆可加龍骨牡蠣吾於衝脈言之甚詳須參看凡物有根者逢時必發失血何根瘀血即其根也故凡復發者其中多伏瘀血以及遇節氣遇陰雨而即蒸熱發動者均是瘀血為病宜血府逐瘀湯加乾漆桃奴治之或用仲景大黃蟅蟲丸少少與之此理須知方不為血證所瞞房勞復血之運行聽命於氣氣乃先天腎水之中一點生陽靜而復動化生精血若以房勞傷其精血則水虛而火發氣動而血升烏有病之不發乎宜都氣丸加麥冬龜鹿膠治之火盛者大補陰丸加鹿膠桑螵蛸治之或加味虎潛丸脾腎兼治或三才湯加桑螵蛸秋石海粉黃柏紫梢花治之失血之人以養息為第一若不忌房勞是自促命期於醫何咎附抱兒癆論世謂婦人有胎復得咳嗽發熱骨蒸或吐血或夢交名為抱兒癆其胎不能孕滿十月或七八月或五六月胎便萎墮兒不長成其每坐産之後不得滿月定然廢命古書不見名論俗醫又無治法世皆以死證目之而死者果相接踵良可哀也夫婦人懷孕其氣血既結養胞胎又加以病再耗其氣血一身之氣血無多那堪兩件消耗是以其胎不能長養而母被胎困又受病侵雙斧伐枯樹不死何待顧其受命之重誠如所云而果得治法何難起死回生哉吾妻病此親手調治竟得保全始知抱兒癆之所以不起者失治之咎耳夫婦人血和然後有子血病於是胎病治之之法總視其證有時以安胎為主胎安則母自安有時以治病為主病去則胎自固據其見證照病用藥自無不愈者也大旨此病世皆謂為極虛之證而不知此病多是實邪何以言之蓋人身除腸胃中皆不可有物塞礙是以針砭刺穴停住片時即能堵塞其氣況胎乃塊然一大物塞於下部則氣實而喘氣逆而嘔氣盛而為火皆以其壅塞故也夫人之懷孕不啻藏珍而胎之病人有如積塊是以懷孕之脈沉分搏指亦與下焦積塊之脈相似第積塊攻而通之則實邪去而人安胎則無攻通之法是以不便施治然有逆實之證亦須消息以補兼攻斯不至留病為患蓋必擺脫一切拘禁而後可救皆不能救之死證內經云有故無殞也則知不拘禁例一意治病為安胎最上之法故抱兒癆吐血逆滿不須顧胎直宜涼血泄瘀丹皮桃仁所以不忌瘀血既去則不壅熱去舊生新胎反得新血之養若氣逆火甚非尋常杏仁枳殼枯芩等藥所能治者酒炒大黃亦間可用又凡此病皆胎氣壅於下部反而上熏肺金直當其氣故治抱兒癆以保養肺金為第一要法清燥救肺湯紫菀散主之痰凝氣阻咳逆不休者豁痰丸治之水飲沖肺肺脹咳嗽不得臥息者葶藶大棗瀉肺湯主之桔梗寧肺湯補瀉兼行保和湯多補少瀉皆宜酌用此病發於胞中其本在下清理肺金不過治標之法耳然胎在下部既不能攻治其本則不得不重治其標保助肺金以敵病氣雖病氣上熏亦無礙也且肺為華蓋位雖居上而通調水道下輸膀胱又主制節下達大腸肺調則大腸不滯氣得從大腸而泄則胎雖阻之而上熏之勢亦稍殺矣肺調則小水通利氣得從小水而泄則胞中之氣亦得從小水泄下蓋膀胱者胞之室膀胱暢則胞氣可借之得舒而上熏之勢亦少殺矣若大便燥結者急宜用清燥救肺湯加火麻仁白芍肉蓯蓉枳殼厚朴當歸治之若小便不利者急宜用清燥救肺湯加草梢生地木通防己知母桑皮治之且小便出膀胱屬太陽經主皮毛大便出大腸屬陽明經主肌肉二經調達則肌肉皮毛之氣皆清理而不滯自不發寒蒸熱矣第皮毛肌肉之屬氣分者既可以免而腠理之熱屬血分者並不關於二經人身腠理之氣乃三焦所司三焦屬相火內寄於肝膽而下藏於胞室今胞室既為胎所占則相火上壅而為嘔吐失血者往往而然相火之氣循經外達壅於腠理則生寒熱甚則骨蒸推原其故以胞室為胎所占相火不得任意遊行是以壅遏此時不能奪去其胎只得清泄胞中之氣使相火有所泄斯不與大壅耳宜四物湯加黃柏知母赤茯苓澤瀉山萸肉甘草梢肉蓯蓉此是治胞室以滋相火之本也外用小柴胡湯以和其腠理蒸熱之甚者可用清骨散以瀉之此是治少陽以清相火之標也是時胞宮不便重治只合多清少陽以重治其標即不全愈而亦殺其病氣矣如欲胞室腠理面面兼治則宜四物湯合柴胡清骨散治之夫抱兒癆之病根雖在胞而其受病則在於肺惟其肺金津虛無以轉輸於下是以胞中之水皆得泛上而為病無論咳熱諸證總宜大滋其肺使肺津得調肺氣得降則胞中之水火雖欲上逆而亦不為害救肺湯紫菀散太平丸保和湯人參清肺湯阿膠瀉白散可常服之第胞宮之水火上逆則病見肺而水火之實又實根於腎中胞宮之相火腎中之陽也胞宮之陰水天癸之水也須極力滋補其腎使水化則不為痰陰足則不動火此為正本清源之治腎中陰虛而火動者則水結為痰為咳為腫為淋閉骨蒸地黃湯加杏仁五味子麥冬桑皮黃柏知母以清之腎中陽虛不化水者則水停為飲為咳為腫為淋閉清穀不化宜地黃湯加故紙杜仲艾葉附片臺烏藥沉香木通以溫其陽若腎中痰火上逆之至喘咳不止胎亦上逼照上用六味地黃湯加龍骨牡蠣鐘乳石牛膝半夏五味子麥門冬川貝母治之此墜降之藥各書俱云墮胎然無病之胎固忌此等今既有腎氣逆上之病高者抑之有病受墜而下之乃適當其胎之正位胎反其位而不上逼何墮之有至於氣逆之極發動吐血嘔咳厄噦諸般上逆之證宜降氣者枳殼厚朴葶藶子檳榔任量而施宜降火者酒大黃胡黃連知母黃柏龍膽草隨宜取用亦所不妨況乎胎中吐血多因素有瘀血阻滯胎氣兩不相容是以動血欲去瘀血凡桃仁丹皮五靈脂紅花延胡索等皆宜用之若徒守拘禁與養癰成患無異醫者果能破除俗見而參透其所以然於治抱兒癆何難起死回生哉又曰用藥雖不必徒守拘禁然亦須審病中病而止勿毫無顧忌而不知輕重也慎之産母之所以系胎者帶脈也帶脈解則胎墜矣若見腰痛之證則早用當歸白朮熟地淮山藥杜仲故紙山萸肉龜膠黃柏黃耆知母菟絲子甘枸杞續斷雲茯苓治之其餘帶脈治法詳經血産血門産母既病抱兒癆困憊之極胎不能保則亦無須存胎但以安保産母為急歸芎湯加人參糯米苧根阿膠聽其安可也墮亦可也胎既下後但照正産按法治之去瘀生新自無不愈再按抱兒癆産前已大虛耗一旦産後必見危險之證較之尋常正産更宜預防一汗出不止獨參湯救之浮熱脈大者加附子以引陽入陰此雖胎前常病火燥而至是陽氣欲脫不得仍照火燥治法四物湯加炮薑亦是從陰引陽之法皆可審用一喘促為氣脫之候參附湯加五味沉香治之一血崩為血脫之候歸脾湯加血餘灰棕灰海螵蛸魚膠治之亦有怒動肝火而血崩者歸脾湯加柴胡梔子治之此三危證正産有之病抱兒癆者在所必有醫家病家皆宜預防夫胎前屬實熱産後屬虛寒平人大抵然也至於病抱兒癆者胎前之病無一非熱至於産後則不盡虛寒蓋胎前已病陰虛而産後去血過多其陰愈虛發熱發咳尤屬痿燥之極若徒守産後宜溫補之説鮮不促命宜左歸飲加阿膠天花粉百部人參麥門冬玉竹五味子治之骨蒸咳逆者團魚丸治之陰虛火動挾水飲而上乾者四物湯合二陳湯再加柴胡黃芩薑汁竹瀝竺黃膽南星金箔牛黃治之其餘雜證均照産科治法自無不愈茲所論者乃抱兒癆産後之治法與正産略異然亦第舉其端尚待醫士擴而充之一凡治抱兒癆必先熟吾書中經血胎血産血諸門而於各女科又參酌庶克有濟一凡抱兒癆須在初病時即行調治治或未愈而用藥不錯庶幾産後可以治愈如不知治法則産後必亡醫家病家兩宜慎之以上所論抱兒癆治法已具大略而內中又或加外感則雖照血家感冒之法加減治之或加內傷則雖照血證飲食諸法加減治之或添怒氣而病增則宜照怒復條內所用諸藥治之或加房勞而病劇則宜照房勞復條內所用諸藥治之法外有法難以筆傳
