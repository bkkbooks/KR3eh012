body:
  text: 卷四便血大腸者傳導之官化物出焉謂大腸下脾胃之化物為中宮作傳導之官故呼為地道乃宮中之出路也其經與肺相表裡肺為清金大腸即為燥金在五行本屬一家故診脈者可於肺部診大腸焉大腸之所以能傳送者全賴於氣氣者肺之所主不獨大腸賴肺氣之傳送即小便亦賴肺氣以化行此乃肺金制節之能事而大腸之氣化金道又與之合故治病者多治肺也大腸位居下部又系腎之所司內經云腎開竅於二陰又曰腎為胃關故必腎陰充足則大腸腴潤厥陰肝脈又繞後陰腸與胞室又並域而居故肝經與腸亦相干涉是以大腸之病有由中氣虛陷濕熱下注者有由肺經遺熱傳於大腸者有由腎經陰虛不能潤腸者有由肝經血熱滲漏入腸者乃大腸與各臟相連之義也但病所由來則自各臟而生至病已在腸則不能復還各臟必先治腸以去其標後治各臟以清其源故病愈而永不發矣一先血後便為近血謂其血即聚於大腸去肛門近故曰近血此有兩等證治一為臟毒下血一為腸風下血臟毒者肛門腫硬疼痛流血與痔漏相似仲景用赤豆當歸散主之取赤豆芽以疏郁取當歸以和血赤豆性能利濕發芽赤色則入血分以為排解之用當歸潤滑養血以滋大腸則不祕結仲景略示其端以為治臟毒者必須利濕熱和血脈也非謂此二藥外別無治臟毒之法吾即此藥引而伸之若大腫大痛大便不通者宜解毒湯取防風枳殼等疏理其氣即赤豆芽義也取大黃赤芍等滑利其血即仲景用當歸之義也若大便不結腫痛不甚者不須重劑用四物湯加地榆荊芥槐角丹皮黃芩土茯苓地膚子苡仁檳榔治之四物湯即仲景用當歸養血之義所加諸藥即仲景用赤豆芽以疏利濕熱而解血鬱也仲景但用養血疏郁今恐濕熱難解故兼用清藥欲止血者兼服石灰散亦可臟毒久不愈者必治肝胃血者肝所司腸者胃之關胃若不輸濕熱於腸從何而結為臟毒哉肝之血分如無風火則亦不迫結肛門矣治胃宜清胃散加銀花土茯苓防己黃柏苡仁車前子升清降濁使陽明之濕熱不再下注則臟毒自愈治肝者宜龍膽瀉肝湯逍遙散又有肺經遺熱傳於大腸而久不愈者必見寸脈浮數洪澀口渴溺黃咳逆等病方用人參清肺湯取烏梅粟殼酸澀之品以收斂肺氣而余藥安肺肺自不遺熱與腸矣若去此二味而用薄荷桔梗以代之則又義取解散在人變化耳腸風者肛門不腫痛而但下血耳臟毒下血多濁腸風下血多清仲景書無腸風之名然傷寒論云太陽病以火攻之不得汗其人必躁到經不解必圊血太陽病下之脈浮滑者必下血兩條皆謂太陽外邪內陷而下血又云陽明病下血譫語者為熱入血室厥陰篇云若厥而嘔胸脅煩滿者其後必便血此即今所謂腸風下血之義夫腸居下部風從何而襲之哉所以有風者外則太陽風邪傳入陽明協熱而下血內則厥陰肝木虛熱生風風氣煽動而血下風為陽邪久則變火治火即是治風凡治腸風下血總以清火養血為主火清血寧而風自熄矣壽世保元用槐角丸統治之而未明言其義吾謂此方荊防治太陽陽明傳入之風烏梅川芎治肝木內動之風余藥寧血清火以成厥功宜其得效然而外風協熱宜得仲景葛根黃連黃芩湯之意使內陷之邪上升外達不致下迫斯止矣治病之法高者抑之下者舉之吐衄所以必降氣下血所以必升舉也升舉非第補中益氣之謂開提疏發皆是升舉葛根黃連黃芩湯加荊芥當歸柴胡白芍槐花地榆桔梗治之若肝經風熱內煽而下血者必見脅腹脹滿口苦多怒或兼寒熱宜瀉青丸治之逍遙散小柴胡均可加減出入謹按肝風所以能下血者何也肝主血血室又居大腸膀胱之間故熱入血室有小便下血之證內有積血有大便黑色之證蓋肝血上干從濁道則吐從清道則衄肝血下滲從清道則尿血從濁道則下血肝為風木之臟而主藏血風動血不得藏而有腸風下血之症上數方力足平之或用濟生烏梅丸亦妙以烏梅斂肝風以殭蠶息肝風風平火息而血自寧矣然肝風動血宜得仲景白頭翁湯之意以清火消風較有力量或四物湯合白頭翁湯兼補其血治風先治血血行風自滅此之謂也如無白頭翁則擇柴胡青蒿白薇代之桑寄生得風氣而生代白頭翁更佳又曰肝經之橫以肺經不能平木故也肺與大腸又相表裡借治肺經亦隔治之一法虛者人參清肺湯實者人參瀉肝湯凡腸風臟毒下血過多陰分虧損久不愈者腎經必虛宜滋陰臟連丸啓腎陰以達大腸最妙六味丸加蓯蓉槐角皆宜一先便後血為遠血謂其血在胃中去肛門遠故便後始下因名遠血即古所謂陰結下血也黃土湯主之黃土名湯明示此症系中宮不守血無所攝而下也佐以附子者以陽氣下陷非此不能舉之使黃芩者以血虛則生火故用黃芩以清之仲景此方原主溫暖中宮所用黃芩乃以濟附子之性使不燥烈免傷陰血普明子謂此症必脈細無力唇淡口和四肢清冷用理中湯加歸芍或歸脾湯十全大補湯時醫多用補中益氣湯以升提之皆黃土湯之意凡中土不能攝血者數方可以隨用但仲景用溫藥兼用清藥知血之所以不寧者多是有火擾之凡氣實者則上干氣虛者則下陷今醫但用溫補升提之藥雖得治氣虛之法而未得治血擾之法豫即仲景之意分別言之若陰虛火旺壯火食氣脾陰虛而肺氣燥失其斂攝之制者人參清肺湯治之若肝經怒火肺經憂鬱以致血不藏攝者歸脾湯加炒梔麥冬阿膠五味或用丹梔逍遙散加阿膠桑寄生地榆此即黃土湯主用黃芩之義也若系虛損不足下血過多脾氣不固腎氣不強面色萎黃手足清厥六脈微弱虛浮者宜大補肝脾腎三經人參養榮湯補脾膠艾四物湯加巴戟甘草補肝斷紅丸補腎此即黃土湯主用附子之義也能從此擴而充之自有許多變化豈楮墨間所能盡者豫按此證與婦人崩漏無異女子崩中屬虛陷此病亦屬虛陷女子崩中屬虛寒而亦兼有虛熱者男子此症亦屬虛寒而亦兼有虛熱者蓋女子之血有經男子之血亦有經同是離經之血下泄而出故病情相類也但所出之竅各有不同崩漏出前陰故多治肝以和血室便血出後陰故兼治肺腎以固腸氣腎主下焦主化氣上升腎足則氣不下陷肺與腸相表裡肺氣斂則腸氣自固醫者能知此理而又參用女子崩中之法可以盡其調治又按此證與吐衄同是血病然一則其氣上行一則其氣下行故虛實治法略有不同便膿此證有二一是內癰一是痢疾一內癰在上中焦者其膿已潰嘔吐而出在下焦者或少腹癰小腸癰脅癰肝癰膿血均從大便瀉出初起時其部分必隱隱刺痛脹滿脈沉滑數甚則痛如刀錐欲病此者未有口不發渴大凡血積均應發渴癰初起血已凝聚故應發渴此時急奪其血則不釀為膿以免潰爛之險用丹皮湯加乳香沒藥柴胡荊芥山甲治之如血已化膿便宜排膿赤豆苡仁湯逐水即是排膿潰後屬虛宜補養生肌八珍湯主之參看吐膿門自詳客問積血何以變而成膿答曰血者陰之質也隨氣運行氣盛則血充氣衰則血竭氣著則血滯氣升則血騰故血之運氣運之即瘀血之行亦氣之行血瘀於經絡臟腑之間既無足能行亦無門可出惟賴氣運之使從油膜達腸胃隨大便而出是氣行而血自不留也若氣不運之而反與相結氣為血所鬱則痛血為氣所蒸則化為膿今舉外證比例凡氣盛者瘡易托化氣虛者瘡難托化氣即水也氣至則水至故血從氣化則從其水之形而變為膿刀傷黏水亦從水而化膿水即氣之質血從氣化有如此者是故閃跌血積得氣化之則腫處成膿不得氣化之則腫處仍是血以知血從氣氣運血凡治血者必調氣使氣不為血之病而為血之用斯得之矣一痢症便膿者其症裡急後重欲便不便或白或赤或赤白相半或下痢垢濁皆非膿而似膿者也夫胃腸之中除卻糟粕只微有脂膏水液而已膏脂屬血分水液屬氣分病氣分則水混而為白痢病血分則血擾而為赤痢氣血交病則赤白相半由何處釀成真膿而從大便泄出哉有之則毒聚腸胃將腸胃膏脂血肉蒸化為膿或下如爛瓜或如屋漏水此腐腸潰胃之危候與癰瘡之腐爛無異此非尋常治痢之法所能克也吾今借仲景之法證之乃得有膽有識之術仲景云陽明病脈數下不止必協熱而便膿血少陰病下利便膿血者可刺厥陰病脈數而渴者必圊膿血以有熱故也此雖無方然曰可刺曰有熱故也已示人瀉濕清熱之法防風通聖散去麻黃芒硝加赤豆防己為表裡瀉實之大劑地榆散為清熱之通劑仲景又曰少陰病下利便膿血者桃花湯主之此湯溫澀似與可刺有熱之說大相徑庭不知病久則熱隨膿血而瀉實變為虛觀癰膿潰後屬虛損則知便膿血久而屬虛症譬之天時其初則酷暑流金轉瞬而涼飈振落衣夏葛者不得不換冬裘矣況腸胃血液既化為膿恐其滑脫故主桃花湯溫澀填補之一服愈余勿服者仲景意謂此乃急時澀脫之法止後便當滌除余病無以澀傷氣無以燥傷陰也蓋膿血乃傷陰之病故一時權宜而少用乾薑後仍不可多服也吾推其意審其病後有虛熱者逍遙散歸脾湯加柴胡山梔寸冬花粉此祖桃花湯用糯米之意審其病後有虛寒者六君子加當歸炒乾姜白芍或人參養榮湯皆可此祖桃花湯用乾薑之意成無己注桃花湯謂陽證內熱則溢出鮮血陰證內寒則下紫血如豚肝是明以桃花湯為治陰證之方惟即鮮血分陰陽未能的確蓋色不足憑凡痢證須審脈微沉遲手足厥冷腹痛喜按唇淡口和為陰證附子理中湯加當歸白芍木香此乃補桃花湯所不逮者矣消渴口熱胸腹脹滿堅實拒按為熱證則用三一承氣湯此乃可盡仲景有熱可刺之能事矣至於尋常紅白則不須如此重劑病在水分者痢下白濁此如暑雨不時行潦汙漲是濕甚而傷氣也審其脈數身熱口渴者為熱濕宜清利之四逆散合豬苓湯去阿膠再加厚朴老連枯芩黃柏審其脈沉弦遲口不渴手足清冷者為寒濕胃苓湯加煨姜有食積者均再加麥芽神麯山楂萊蔔子白痢之故總是水不清之故水即氣也吾於水火論已詳言之故調氣即是治水導水須於上原調氣以肺為主是治肺乃清水之原即是調氣之本細思此病發於秋時秋乃肺金主氣金不清肅是以水濁氣滯而為痢知此理則知迫注者肺之肅不通者金之收也人參瀉肺湯以導其滯小柴胡加花粉杏仁枳殼桑皮茯苓知母桔梗以和之人參清肺湯以收功此乃專為治肺立法示醫者以法門使知所從事非臨證必用此方也且病無單見未有肺病而餘臟不病者故臨證時尚須變化病在血分者則利下純紅口渴便短裡急後重脈滑大者地榆散加酒軍枳殼厚朴苡仁澤瀉脈細數者不必下之但用原方若血黯黑脈遲手足冷者屬虛寒黃土湯治之紅痢之故總是血分為病血生於心火而下藏於肝肝木內寄相火血足則能濟火火平則能生血如火太旺則逼血妄行故血痢多痛如刀錐乃血痛也肺金當秋剋制肝木肝不得達故鬱結不解而失其疏泄之令是以塞而不通調肝則木火得疏泄而血分自寧達木火之郁宜小柴胡去半夏加當歸白芍白頭翁湯或四物湯加蒲黃五靈脂延胡索黃柏龍膽草黃芩柴胡桑寄生肝風不扇則火息鉤藤青蒿白頭翁柴胡桑寄生皆清風之品殭蠶蟬蛻亦能祛風肝氣不遏則血暢香附檳榔橘核青皮沉香牡蠣皆散利肝氣之品茯苓膽草秦皮枯芩又清肝火之品當歸生地阿膠白芍又滋肝血之品桃仁地榆五靈脂川芎又行肝血之品知理肝之法而治血痢無難肝藏血即一切血證一總不外理肝也各書痢證門無此論說豫從各書旁通會悟而出實先從吾陰陽水火血氣論得其原委故此論精確不似他書捉影客曰凡瀉泄皆脾胃所主痢亦泄瀉之類何以不主脾胃哉答曰滲瀉洞瀉誠屬脾胃故內經曰長夏善病洞瀉寒中以長夏為脾主氣故也痢發則多在秋天而其情理脈證亦與洞瀉不同雖關於脾胃而要以肝肺為主乃得致病之原噤口者下痢不食是火熱濁攻胃氣被傷而不開各書俱遵丹溪用石蓮湯金鑑謂內熱盛上衝心作嘔噤口者用大黃黃連好酒煎服以攻之按腸胃所以能食者以胃有津液清和潤澤是以思食西洋醫雖滯於跡亦間有可信處言谷入於胃即有胃津注之將谷渾化如糜常探胃津攪飯頃刻亦化為糜據此論說則胃之思食全是胃津使然試觀犬欲得肉則涎出於口此涎即欲食之本也人之胃津其思食之情亦類乎此今胃為邪熱濁氣所攻踞其清和之津盡化而為濁滯下注於大腸則為痢停聚胃中則拒不納食丹溪石蓮湯雖知清火補胃然石蓮是蓮米有黑殼者今醫用石蓮子不知何物斷不可用即蓮米性亦帶澀痢證宜滑以去著澀乃所忌且胃中濁滯非洗滌變化不為功此方雖寒熱未差然未能洗滌其滯變化其濁非起死回生之方也清溫敗毒飲竹葉石膏湯人參白虎湯麥冬養榮湯出入加減庶可以洗胃變津為開胃進食之良法至嘔不食金鑑用二黃好酒取其峻快以攻逆然治逆洵為得法而不知化生胃津終未得進食之本也吾意以為宜用大柴胡湯加石膏花粉人參則攻逆生津開胃進食兩面俱到治噤口者從無此論吾今悟出切實之理為斯人大聲疾呼海始欲以文章報國令已自分不能庶幾發明此道稍有補於斯民歟查對各書言痢證者說法不一張景嶽主溫朱丹溪主涼喻嘉言主發汗利水陳修園主寒熱合治皆有至理景嶽謂夏月貪涼過食生冷至秋伏陰內動應時而為下痢佐關煎治之此即仲景下利不止用四逆湯桃花湯之意乃虛寒治法然必須有虛寒實據乃用此法朱丹溪謂濕熱蒸灼氣血為黏膩用黃連解毒湯是即仲景白頭翁湯意也此類最多然必有熱證之實據乃用此法喻嘉言謂宜從汗先解其外外邪內陷而為痢必用逆流挽舟之法引其邪而出於外人參敗毒散主之此即仲景協熱下痢用葛根黃連黃芩湯之意第仲景升發邪氣兼清其熱而喻則辛溫升散未能兩面俱到即如仲景白頭翁湯亦取白頭翁能升達其氣知開提疏發為治下迫後重之良方喻嘉言自以逆流挽舟獨得其祕而未能根柢仲景是以得半遺全吾擬用柴胡湯去半夏加花粉當歸白芍枳殼粉葛自謂升發清降兩得其治喻氏又謂若熱已奔迫大腸者毋庸更從外解急開支河從小便而順導之金匱紫參湯訶黎勒散主之此即仲景利不止者當利其小便之意大清涼散藥徹內外最有力從高原導水使不浸漬腸胃擬用甘桔湯加桑皮杏仁枳殼防己木通石膏雲苓苡仁柴胡薄荷生薑白芍治之斯於喻氏發表利水之法或更有發明陳修園謂此證有臟寒腑熱胃寒腸熱之辨仲景瀉心湯擇用如神余謂寒熱合病必有寒熱兼見之實證不得籠統言之而混用寒熱雜方也即如仲景烏梅丸所治之證消渴氣上衝心心中疼熱飢不欲食此熱證之實據也食即吐蛔下之利不止此寒證之實據也惟其有此腑熱臟寒之實據故用烏梅丸兼寒熱治之又如仲景生薑瀉心湯所治之證云心下痞硬乾噫食臭此火證也脅下有水氣腹中雷鳴此水病也惟其有此火在胃中水在腸間之實據故用生薑瀉心湯治之初頭硬大便後半溏者此胃中有寒腸中有熱陳修園擬用理中湯加大黃此皆有寒熱兼見之實據醫者辨證必如是之嚴而後用藥處方不失銖黍以上四家治法合而用之而治痢不虞束手矣黃坤載曰人之大便所以不失其常者以肺主傳送而腸不停肝主疏泄而肛不閉宜用參朮以助肺之傳送用桂枝以助肝之疏泄此黃氏論大便祕結之語也吾從此語旁通之而因得痢證之原以知痢者肺氣傳送太力故暴注大腸肝氣鬱而不疏故肛門閉塞欲便不便而為逼脹此從黃氏之論推求之而痢證迫而不通之故誠可識矣第桂枝參朮與痢證不合痢證肺氣之奔迫以其火熱暴注也故傷寒論飲食入胃即下利清水完穀者乃肺之傳送太急熱之至也宜急下之據此則治奔迫者當以清火為主人參清肺瀉肺二湯治之肝氣不得疏泄亦由木鬱為火結而不暢桂枝溫木是益其火得毋慮不戢自焚乎觀仲景白頭翁湯用秦皮白頭翁以涼達肝木四逆散裡急後重者加薤白以疏郁則知助肝疏泄之法矣當歸蘆薈丸瀉肝湯丹梔逍遙散加減治之至於和肝調肺止奔迫解鬱閉一方而肝肺並治者自古無之余擬用白頭翁湯加石膏知母杏仁桔梗枳殼檳榔柴胡麥芽當歸白芍甘草治之輕劑則用小柴胡加歸芍杏仁桔梗枳殼檳榔麥芽花粉調和肺肝則肺氣不迫注肝氣得開利矣又或肝氣欲泄而下注肺氣欲收而不開故痢多發於秋秋金肺氣閉而不開肝氣決裂而不遏是以迫痛此又從黃氏之義另翻一解而各書均不載者也治宜甘桔湯加白芍以桔梗開提肺氣以白芍平治肝木本此意以為加減則鱉甲龍膽草青皮秦皮蘆薈皆平肝之藥當歸生地桃仁五靈脂延胡索皆治肝經血分之藥黃芩麥門冬桑皮知母皆清肺之藥枳殼貝母杏仁陳皮皆肺經調氣之藥隨宜致用變化在人烏有不治之痢哉調血則便膿自愈調氣則後重自除此二語為千古治痢之定法而亦相沿治痢之套法耳蓋泛言調血則歸芍地榆用盡而不效泛言調氣而陳皮木香多服而無功不知木香陳皮乃調脾氣之藥痢雖脾病而其所以逼迫者肝肺之咎也知調肝肺則善調氣矣血乃血海所總司血海居大腸之間故痢症臍下極痛者必有膿血痛不甚者無膿血以臍下血海之血痛故也知理血海則善治血矣普明子謂痢證多兼食積宜用枳殼厚朴大黃輕則用山楂神麯萊蔔子麥芽此論最淺而中肯久痢不止肺氣下泄則魄隨之陷而魄脫則死肺藏魄治宜調補肺氣人參清肺湯以固之如寒滑者桃花湯治之仲景訶黎勒散即是清肺固脫之方四神丸烏梅丸皆是桃花湯之義方難盡舉升提固澀總須分寒熱用藥斯無差爽休息痢者止而復作乃固澀太早留邪在內故時復發作治宜按上治痢之法視何經見證則用何經之藥以消除其邪伏邪既去而邪自不作如羊脂白蜜黃連末服不過取滑去著寒去火之義尤未若視其邪所發見之情而分經用藥更為對證又補論曰凡噤口痢上噤下痢法宜和中此與霍亂對看自明霍亂上吐下瀉必以和中而愈則知噤口痢上噤下痢亦必以和中而愈第霍亂是中寒而發為上下俱脫之證法主理中湯以溫之噤口痢上閉下滯其為中熱可知熱結於中上下不開和中之法宜反理中湯諸藥以寒涼治之生薑瀉心湯去乾薑為宜人參白虎湯亦佳尿血膀胱與血室並域而居熱入血室則蓄血熱結膀胱則尿血尿乃水分之病而亦干動血分者以與血室並居故相連纍也其致病之由則有內外二因一外因乃太陽陽明傳經之熱結於下焦其證身有寒熱口渴腹滿小便不利溺血疼痛宜仲景桃仁承氣湯治之小柴胡湯加桃仁丹皮牛膝亦治之一內因乃心經遺熱於小腸肝經遺熱於血室其證淋祕割痛小便點滴不通者呼赤淋治宜清熱治心經遺熱虛煩不眠或昏睡不醒或舌咽作痛或怔忡懊憹宜導赤飲加炒梔連翹丹皮牛膝治肝經遺熱其證少腹滿脅肋刺痛口苦耳聾或則寒熱往來宜龍膽瀉肝湯加桃仁丹皮牛膝鬱金尿血治心與肝而不愈者當兼治其肺肺為水之上源金清則水清水寧則血寧蓋此證原是水病纍血故治水即是治血人參瀉肺湯去大黃加苦參治之清燥救肺湯加藕節蒲黃亦治之以上結熱之證其血溺出皆有淋滴不通之象乃尿血之實證也此外又有虛證溺出鮮血如尿長流絶無滯礙者但當清熱滋虛兼用止血之藥無庸再行降利矣蓋前陰有二竅一為水竅一為血室之竅血竅在女子則為胎孕之門血竅在男子則為施精之路故女子血室之血能由此崩漏而下男子血室之血亦能由此走泄而出是以血尿之虛證與女子崩漏之證無異宜用四物湯加減治之肝如鬱火者加丹皮炒梔子柴胡阿膠芥灰心經血虛火旺者加黃連阿膠血餘脾氣虛寒不能攝血者四肢清冷脈微遲面黯淡加魚鰾黃耆人參艾葉黑姜甘草五味治之房勞傷腎加鹿膠海螵蛸發灰散治之又有肺虛不能制節其下以致尿後滲血者審系肺陰虛則兼氣逆痰咳口渴等證人參清肺湯主之若肺陽虛不能治下則必有遺溺足冷水飲喘嗽之證甘草乾薑湯治之經血婦科已有專書然男女血本同原故並論之經云女子二七而天癸至任脈通太衝脈盛月事以時下故能有子天癸者謂先天腎中之動氣化生癸水至者謂至於胞中也水為陽氣所化陽倡而陰必隨之血者陰也衝任主之故應癸水而即輸血於胞中血之應水而下是謂以陰從陽衝任兩脈皆起胞中上屬陽明陽明乃後天水穀之海居中宮稱戊土化氣取汁變赤為血隨衝任兩脈以下合癸水是謂戊與癸合男女皆然男子主氣故血從水化而為精女子主血故血從水化而為經血是男子之精水中有血女子之經血中有水故行經前後俱有水漿可驗夫此水乃腎中衝陽之氣所生氣亢則水竭而血不濡熱證於是乎生矣氣寒則水冷而血不運寒證於是乎生矣故凡調血先須調水調水即是調氣氣生於腎而主於肺血生於胃而藏於肝以血海為肝之部分肺金司氣之制節又為水之上源調血調水人當知所從事矣故或調氣中之水以滋血或調血中之氣而利水是女子調經之法即凡為血證之治法學者宜鑑觀之血熱者水之不足也因見行經趲前發熱口渴諸證四物湯加天冬麥冬黃芩花粉柴胡阿膠牛膝等藥以滋水者濡血或用六味地黃湯以滋肺腎亦能啓水之源此以滋水為養血之法也血寒者水不溫也因見經水後期黯淡清冷之狀以及凝滯疼痛兼作四物湯加茯苓甘草桂枝黑姜附子等藥以溫水者行氣氣行則血行也血虛者行經太少以及乾枯淡薄諸虛證猶雜出難言審系腎中天癸之水不足者必骨熱氣逆足痿脈數子宮乾澀經血前後均無漿水宜左歸飲加菟絲龜板阿膠麥冬五味蓯蓉以滋天癸之水審系胃虛陽明衝任之血不足者經水必淡只有水漿而少鮮血宜炙甘草湯養榮湯酌而用之以補生血之源而血虛可治矣血滯者瘀血阻滯因見身痛腹脹寒熱帶漏散經閉經諸證總是瘀血阻滯其氣若無瘀血則經自流通安行無恙何緣而錯雜變亂哉凡此之類故總以去瘀為要四物湯加元胡桃仁香附乳香沒藥主之有熱加黃芩黃連有寒加乾薑附片王清任血府逐瘀湯膈下逐瘀湯皆宜瘀血之甚者非仲景土瓜根下瘀血等湯不治另詳瘀血門總而論之血氣二者原不相離血中有氣氣即是水吾於本條及水火氣血論已詳言之知此則如瘀血阻滯者乃血阻其氣是血之咎故破散其血而氣自流通桃仁丹皮五靈脂等在所必用血分有熱者乃氣分之水不足以濡血故令血熱用梔芩等以瀉火瀉火即是滋水也血分有寒者乃氣分之水水凝濕滯而不化故濡滯不流通也吳茱萸細辛桂枝艾葉以溫水者溫血水溫則氣和氣和則血和觀此可知男子瘀血熱結寒凝治法與此皆無異矣觀於生天癸以生血之法則知男子滋腎養血之法觀於補陽明以補血之原則知男子補血之原矣觀於滋肺以養血之法則知男子生津以養血之法以至血熱而水凝為痰血虛而水溢為汗同類異情無不畢見崩帶婦人面色青黃肢體消瘦心戰腰痠時下濁物其物黃赤青白黯黑並下是帶脈之血傷損而成故名曰帶證古法又分白濁一條謂帶下是帶脈為病其色汙雜白濁則是心脾腎三經為病其色純白而所用之方仍相倣佛其實同一病也皆是帶脈為病吾為指明曰白濁五帶所下似血非血乃胞中之水也此水清則為天癸以濟經血前論詳矣此水濁則為白濁為五帶水濁而血因以濁矣蓋帶脈下系胞宮中束人身居身之中央屬於脾經脾經土氣衝和則帶脈寧潔而胞中之水清和是以行經三日後即有胞水黃明如金是腎中天癸之水得帶脈脾土之制而見黃潤之色乃種子之的候無病之月信也若脾土失其沖和不能制水帶脈受傷注於胞中因髮帶證白濁汙雜治宜和脾以利水治脾即是治帶治帶即治水也觀腎著湯用白朮治腰痛如帶五千錢者腎著名湯明言是腎中水邪著於帶脈故從脾治之以土治水而帶脈自愈矣即此可知女子帶證是水不清濁證仍是水不清不必強分總以和脾利水為主胃苓湯主之挾熱者去桂枝加黃芩黃連黃柏夾寒者加細辛吳萸夫脾土鬱蒸濕氣腐化變生五帶赤白汙濁理脾解鬱宜逍遙散加防己木通主之熱加丹皮梔子黃柏寒加臺烏藥艾葉砂仁以上所論雖未盡帶濁之治然已得法門學者推而廣之遇熱證則硝黃甘遂未必非宜遇寒證則參朮耆附尤所必用以及寒熱錯雜皆可隨證制方有紙筆不能盡傳者在醫師之自悟也崩漏者非經期而下血之謂也少者名曰漏下多則名為血崩行經而去血過多如水之流不能止者亦是血崩古名崩中謂血乃中州脾土所統攝脾不攝血是以崩潰名曰崩中示人治崩必治中州也月經名曰信水以五行惟土主信土旺則月水有信土虛則失信而漏下甚則崩中矣治法總以治脾為主或勞倦傷脾或思慮飢飽傷脾脾虛不攝宜用歸脾湯加艾葉阿膠灶心土大虛者宜十全大補湯加阿膠續斷升麻炮薑棗仁山萸肉再用魚肚鹿角霜蓮米姜鹽燉食以調養之黃耆糯米當歸煎服亦大補氣血六君子養榮湯炙甘草湯皆脾經補益之藥可以加減用之凡是崩中此為正治又有治肝以治脾之賊者肝經怒火妄動木鬱剋土火擾而血不寧其人善怒頭痛口苦目眩脅腹脹滿六脈弦數與脾經虛寒之證顯有不同宜歸脾湯加丹皮梔子柴胡白芍麥冬五味子補脾土清肝火兩面俱到或用丹梔逍遙散加牡蠣阿膠蒲黃謹按帶漏雖是水病而亦有夾瘀血者以血阻氣滯因生帶濁小調經湯隨寒熱加減治之崩中雖是血病而實則因氣虛也氣下陷則水隨而瀉水為血之倡氣行則水行水行則血行宜服補氣之藥以升其水水升則血升矣補中益氣治之合崩帶觀之一是水病一是血病女子男子皆有血與水之病宜通觀之産血婦人胎中有血衣以裹兒血衣之下又有水衣以襯墊之將産則胎水先破水衣先下然後血衣破而兒生兒生之後血衣乃下世謂水衣墊胎水衣既行則其胎顛墜是以兒出此乃著跡之論未得其所以然也夫胎産之事乃關氣化豈猶什物之襯墊懸墜所可擬者吾為指出其理曰天地之大總是以陽統陰人身之生總是以氣統血氣乃腎中水化之陽故氣著於物還復為水吾是以有氣即是水之論婦人懷子墊胎之水衣即氣也胎乃氣載舉之氣即是水故水墊其胎實則氣載其血也將産之時水衣先行氣下行故水下行水行實則氣行也氣既下行則其胎血自隨之而下血之從氣又豈有氣行而血不行者哉故胎之未生氣載之胎之將産氣運之知此則知護胎者必調氣催生者必行氣而治一切血證皆宜治氣均可於此悟出將産之時腰腹大痛者以氣欲行而血未行血阻其氣而氣必欲迫之使行故令大痛此必初胎初産之婦血道新開礙氣之行故其痛或甚或數産之婦內有瘀血阻滯其氣故令大痛若壯婦身無瘀血則將産時微痛而已或微脹而已蓋其氣行而血隨之下血道既是熟路又無瘀血阻滯何痛之有其極痛而胎不下者催生之法總宜行血不使阻滯其氣則氣下而胎隨以下佛手散主之交骨不開者加敗龜板及婦人油發燒灰義總取於活血血活則氣通胎順而自生矣既産之後身痛腰痛惡血不盡阻滯其氣故作痛也蓋離經之血必須下行不留斯氣無阻滯自不作痛又能生長新血若瘀血不去則新血不生且多痛楚宜歸芎失笑散及生化湯治之夫産後百脈空虛亟宜補血而猶力主去瘀者瘀血不去則新血斷無生理吾於男女異同論已詳言之雖産後大虛仍以去瘀為急去瘀正為生新計也吐衄家須去瘀血觀此益信産後血暈由血隨氣上迷亂心神故眼前生花甚者悶絶口噤神昏氣冷有下血過多而暈者屬虛但昏悶煩亂而已法當補血宜炙甘草湯及八珍湯加棗仁龍骨硃砂丹皮有下血少而暈者乃惡露上搶於心心下滿急神昏口噤絶不知人法當破血宜當歸延胡索血竭沒藥荊芥穗京墨煅紅醋淬童便引血暈之證吐衄家間亦有之醫者不可不知産後血崩乃榮氣空虛不能攝血歸經大劑歸脾湯主之如兼汗出氣喘者乃是血脫氣散之危證參附湯加阿膠熟地茯苓甘草以救之然又有怒氣傷肝肝氣橫決血因不藏者歸脾湯加炒梔子阿膠艾葉柴胡逍遙散加阿膠牡蠣棕炭炒梔蓮葉香附皆宜敗血乾肺口鼻黑色面如茄色或發鼻衄乃氣逆血升之危候或則喘急或咳逆欲死總緣肺虛不能制節其下是以下行之血得以上干宜參蘇飲主之鼻衄加杏仁喘咳加五味吐衄家血乾肺臟者亦與此同敗血乾心心氣閉塞舌強不語神昏譫語如見鬼狀宜歸芎失笑散加龍腦硃砂血竭沒藥治之牛膝散加棗仁琥珀熟地人參皆宜敗血乾脾則嘔逆腹脹不能飲食生化湯加半夏茯苓枳殼厚朴如發為水腫是血從水化而變為水與血變為膿無異既從水化則從水治之五苓散加蒲黃丹皮以利之總之血以下行為順上行為逆知産血上逆之為病則愈知吐衄之血上逆為病也但吐衄與産血其病原不同故治法亦異此外尚有數證乃産後多有之證亦與吐衄義可參觀因連類及之條列如下産後喘促最危之候因榮血暴竭衛氣無依為血脫氣散之證宜參附湯飲之四磨湯亦可若因敗血乘肺氣喘目黑鼻起煙煤者是為肺氣將絶之證參蘇飲治之二證一是腎氣虛脫而陽上越一是肺氣虛竭而血上乘兩方皆主人參大生水津水者氣之母也方主補氣故用人參以滋水滋水即是補氣而陽上越者佐附子以引之歸根血上乾者佐蘇木以速之下降誠産後救危之良方男子血氣脫絶之證亦不能外此義也産後汗出身微似汗者吉蓋産後血虛微汗則氣來就血陽來和陰汗者氣分之水也産後血不足而氣有餘故微泄其氣以與血配最吉之兆若陰虛於內陽浮於外濈濈汗出是為自汗與微汗有別法宜補陰而引陽聖愈湯加附子五味麥冬龍骨治之若大汗亡陽其汗如水之流乃元氣脫散氣即水也氣脫故大汗非大劑參附湯不能回陽又有但頭汗出劑頸而還者乃血不得其和氣因鬱而上蒸故但頭汗仲景謂之鬱冒用小柴胡湯解之盜汗陰虛者當歸六黃湯治之此與吐衄家汗出諸證有相通處宜參觀之産後發熱因陰血暴傷陽無所附四物湯加炮姜從陰引陽為正治之法若頭痛惡寒而發熱者屬外感不當作尋常傷寒治之惟宜用四物湯加荊芥柴胡蔥白和血解表而愈又有停食發熱者必見脹悶噯氣嘔噦等證異功散加山楂神麯麥芽厚朴生薑治之若因瘀血壅滯而發熱者必見身腹等處刺痛之證生化湯治之若去血過多煩躁口渴面赤身熱者當歸補血湯治之若陰虛陽無所附孤陽外越而發熱者急進參附湯救之金鑑此條於産後發熱虛實之證略備與男子亡血發熱者治法相同但亡血是血上行産後是血下行一逆一順其間略有不同耳産後雜證猶多所舉數條皆與吐血之證有互相發明者其餘不及備載另有産科諸書可查又補論曰産後氣下泄故多脫證吐血氣上逆故少脫證吐血之脫證皆宜降産後之脫證則宜升此絶不同
