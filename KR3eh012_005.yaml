body:
  text: 卷五瘀血吐衄便漏其血無不離經凡系離經之血與榮養周身之血已睽絶而不合其已入胃中者聽其吐下可也其在經脈中而未入於胃者急宜用藥消除或化從小便出或逐從大便出務使不留則無餘邪為患此血在身不能加於好血而反阻新血之化機故凡血證總以去瘀為要世謂血塊為瘀清血非瘀黑色為瘀鮮血非瘀此論不確蓋血初離經清血也鮮血也然既是離經之血雖清血鮮血亦是瘀血離經既久則其血變作紫血譬如皮膚被杖血初被傷其色紅腫可知血初離經仍是鮮血被杖數日色變青黑可知離經既久其血變作紫黑也此血在經絡之中雖已紫黑仍是清血非血塊也是以能隨氣運行走入腸胃吐下而出設在經絡之中即是血塊如何能走入腸胃耶至於血塊乃血入腸胃停留片時立即凝結觀宰割豬羊滴血盆中即時凝結便可知矣故凡吐衄無論清凝鮮黑總以去瘀為先且既有瘀血便有瘀血之證醫者按證治之無庸畏阻瘀血攻心心痛頭暈神氣昏迷不省人事無論産婦及吐衄家有此證者乃為危候急降其血而保其心用歸芎失笑散加琥珀硃砂麝香治之或歸芎湯調血竭乳香末亦佳瘀血乘肺咳逆喘促鼻起煙煤口目黑色用參蘇飲保肺去瘀此皆危急之候凡吐血即時斃命者多是瘀血乘肺壅塞氣道肺虛氣促者此方最穩若肺實氣塞者不須再補其肺但去其瘀使氣不阻塞斯得生矣葶藶大棗湯加蘇木蒲黃五靈脂童便治之瘀血在經絡臟腑之間則周身作痛以其堵塞氣之往來故滯礙而痛所謂痛則不通也佛手散加桃仁紅花血竭續斷秦艽柴胡竹茹甘草酒引或用小柴胡加歸芍丹皮桃仁荊芥尤通治內外之方義較穩瘀血在上焦或發脫不生或骨膊胸膈頑硬刺痛目不了了通竅活血湯治之小柴胡湯加歸芍桃仁紅花大薊亦治之瘀血在中焦則腹痛脅痛腰臍間刺痛著滯血府逐瘀湯治之小柴胡湯加香附薑黃桃仁大黃亦治之瘀血在下焦則季脅少腹脹滿刺痛大便黑色失笑散加醋軍桃仁治之膈下逐瘀湯亦穩瘀血在裡則口渴所以然者血與氣本不相離內有瘀血故氣不得通不能載水津上升是以發渴名曰血渴瘀血去則不渴矣四物湯加棗仁丹皮蒲黃三七花粉雲苓枳殼甘草小柴胡湯加桃仁丹皮牛膝皆治之溫經湯以溫藥去瘀乃能治積久之瘀數方皆在酌宜而用瘀血在腠理則榮衛不和發熱惡寒腠理在半表半裡之間為氣血往來之路瘀血在此傷榮氣則惡寒傷衛氣則惡熱是以寒熱如瘧之狀小柴胡湯加桃仁紅花當歸荊芥治之瘀血在肌肉則翕翕發熱自汗盜汗肌肉為陽明所主以陽明之燥氣而瘀血和蒸郁故其證象白虎犀骨地黃湯加桃仁紅花治之血府逐瘀湯加醋炒大黃亦可治之也瘀血在經絡臟腑之間則結為癥瘕瘕者或聚或散氣為血滯則聚而成形血隨氣散則沒而不見方其既聚宜以散氣為解血之法九氣丸治之在胸膈上者加桔梗枳殼栝蔞生薑甘草在右者加蘇子桑皮陳皮在左者加青皮牡蠣當歸在中焦大腹者加厚朴枳殼防己白芍甘草在小腹下者加橘核小茴荔核檳榔川楝子五靈脂氣散則血隨而散自不至於結聚矣至其既散之後則又恐其復聚宜以調血為和氣之法此時瘕氣既散處於血分之中但一調血則氣自和而不復聚矣逍遙散加丹皮香附治之歸脾湯加柴胡鬱金子亦治之癥者常聚不散血多氣少氣不勝血故不散或純是血質或血中裹水或血積既久亦能化為痰水水即氣也癥之為病總是氣與血膠結而成須破血行氣以推除之元惡大憝萬無姑容即虛人久積不便攻治者亦宜攻補兼施以求克敵攻血質宜抵當湯下瘀血湯代抵當丸攻痰水宜十棗湯若水血兼攻則宜大黃甘遂湯或祕方化氣丸外治法貼觀音救苦膏瘀血在經絡臟腑之間與氣相戰鬥則鬱蒸腐化而變為膿另詳吐膿便膿瘡膿門茲不再贅瘀血在經絡臟腑之間被氣火煎熬則為乾血氣者腎中之陽陰虛陽亢則其氣上合心火是以氣盛即是火盛瘀血凝滯為火氣所熏則為乾血其證必見骨蒸癆熱肌膚甲錯皮起面屑名為乾血癆病至此者十治二三仲景大黃蟅蟲丸治之蓋既系乾血便與氣化隔絶非尋常行血之品所能治也故用諸蟲齧血之物以消蝕乾血瘀血不去新血且無生機況是乾血不去則新血斷無生理故此時雖諸虛畢見總以去幹血為主也如膽識不及可以滋補之藥送下此丸亦調停之一術瘀血在經絡臟腑之間被風氣變化則生癆蟲氣者腎水之所化也故氣動即為濕風者肝陽之所生也故風動即為熱濕蒸熱煽將瘀血變化為蟲是為癆蟲此猶之草腐為螢谷飛為蟲也其辨法面色乍赤乍白乍青乍黃唇口生瘡聲嗄咽癢煩夢不寧遺精白濁發焦舌燥寒熱盜汗口出穢氣不知香味喜見人過常懷忿怒夢見亡先驚悸咳逆或腹中有塊或腦後兩邊有小結核或食豆而香又用乳香薰其手背帕覆手心須臾毛長至寸許每日平旦精神尚好日午向後四肢微熱面無顏色皆是癆蟲之候也月華丸主之多食鰻魚肉既有滋補又善殺癆蟲或用鰻魚骨燒黑鱉甲炒為末煎人參當歸白芍白薇湯送下補虛殺蟲相輔而行若專事殺蟲金蟾丸亦可間服金線蛙燒服亦妙黑貓殺取肝焙乾為末月初五更空心服大能殺除癆蟲可代獺肝獺爪為末酒下癆蟲居肺葉間咯血聲嘶者皆能治之癆蟲乃血化之蟲最為靈異其人死後蟲為妖孽傳染家人為傳尸癆殺三人者其蟲不治傳尸之證與其所感之病人無異金鑑謂宜服傳尸將軍丸方載丹溪心法中今查丹溪心法不載此方然以將軍名丸其主用大黃可知夫傳尸蟲孽襲染人身亟宜除去故主攻下亦如仲景攻乾血法以免留邪為患也此蟲一傳人身便能聚積人身之血以為窠囊食息生育變化無窮吾謂可用移尸滅怪湯殺其蟲而奪其血斯無遺留之邪矣以上二證大便不溏泄者尚可攻治溏泄者不能任藥必死蓄血蓄血者或傷寒傳經之邪或溫疫時氣之邪傳於血室之中致周身之血皆為邪所招致而蓄聚胞中小腹脹痛其人或寒或熱晝日明瞭夜則譫語甚則發狂呼叫打罵內經所謂血在上喜忘血在下如狂是也癲犬咬傷毒聚胞中故令發狂皆屬蓄血之證仲景抵當湯治之桃仁承氣湯亦治之若膽識不及可用膈下逐瘀湯加大黃若血猶未結但是熱入血室夜則譫語用小柴胡湯加桃仁丹皮治之血臌附血腫血臌之證脅滿小腹脹滿身上有血絲縷煩躁漱水小便赤大便黑腹上青筋是也醫書俱云是婦人之病唯喻嘉言謂男子恆有之面色萎黃有蟹爪紋路脈雖虛極而步履如故多怒善忘口燥便祕脅脹腹疼逮脹之既成腹大如箕遂不可救東南最多所以然者東海饒魚鹽魚者甘美之味多食令人熱中鹽者鹹苦之味其性偏於走血血為陰象初與熱合不覺其病日久月增中焦沖和之氣亦漸為熱矣氣熱則結而血不流矣於是氣居血中血裹氣外一似婦人受孕者然至彌月時腹如抱甕推而言之凡五方之膏粱厚味椒薑桂糈成熱中者皆其類也治之之法以六君子湯加乾薑川芎防己為末陳米荷葉煎湯泛丸白湯下執中央以運四旁法也謹按喻氏之論其言血臌之原最為詳確惟所主之方與氣熱則結而血不流之説未能吻合蓋六君子與所加之藥於治痰臌為宜且須寒飲方為切合如論所謂宜用清和理氣之品攻劑代抵當丸主之和劑丹梔逍遙散加薑黃香附治之諸書皆用桃奴散或琥珀散治之第兩方用溫藥亦血因寒凝之劑與喻氏所論又有不同醫者審證擇用可也又有石瘕腸覃狀如懷子腹日以大月事以時下者為腸覃以寒客於腸外氣病而血不病也宜橘核丸主之月事不以時下者為石瘕乃寒氣客於子門子門閉塞惡血當下不下衃以留止故成石瘕是氣病而血亦病也宜琥珀散桃奴散治之後服溫經湯單腹脹者為血臌若四肢皆脹或先從四肢腫起其色紅者謂之血腫亦有不紅者血從水化而為水故不紅也或得於吐衄之後瘀血化水而腫或得於婦人經水不行血化為水而腫既化為水則兼治水五皮飲加當歸白芍蒲黃丹皮桃仁治之或用乾漆雄黃醋丸麥芽湯下亦可又凡臌脹浮腫俱要分陰證陽證陰證脈沉澀弦緊必有寒痰諸證宜中滿分消湯加桃仁陽證脈數口渴便短氣逆等證宜小柴胡湯加知母石膏防己丹皮桃仁豬苓茯苓車前子治之另詳六卷腫脹門經閉婦女經閉有四一寒證一熱證一實證一虛證寒閉者積冷結氣經水斷絶至有歷年胞門為寒所傷經絡凝堅陰中掣痛少腹惡寒上引腰脊繞臍寒疝或瘀血不行留為石瘕皆霜凝冰結之象也用溫經湯主之或用溫藥下之附子理中湯加當歸桃仁大黃細辛牛膝肉桂生化湯下之尤穩經通之後再服腎氣丸收功熱證者胞為血室血室為肝之所司肝火橫逆從胞脈上迫於心肺心肺之氣不得下通則發寒熱頭暈耳鳴煩躁多怒咳逆氣上治宜平其肝火使肺氣得下降心血得下注斯經通矣當歸蘆薈丸加桃仁以攻之丹梔逍遙散加桃仁以和之又曰衝任兩脈起於胞中上屬陽明若胞中火逆隨衝任兩脈上衝頭暈頰赤咽喉不利發熱口渴咳逆喘息此乃胞氣上逆合於陽明之氣而為燥動之證法宜從陽明以折衝逆使火下降斯經通矣玉燭散治之如脾胃素虛不便攻治者玉女煎加桃仁丹皮治之金匱麥門冬湯尤能逆折沖氣數方皆從陽明降氣使氣下達胞中則經自通又有從腎中引氣下行以通經之法用六味地黃湯加知柏牛膝桃仁此又引沖氣下行隔治之法實證經閉者婦人少腹如敦狀小便微難而不渴此為水與血結在血室也大黃甘遂湯主之又仲景曰婦人傷寒中風經水適斷胸脅滿如結胸狀譫語者此為熱入血室也小柴胡湯主之婦人經閉藏堅癖不止者中有乾血濕熱腐變化出白物礬石末納入陰戶吾謂可用土瓜根湯加黃柏防己治之又或小腹結痛大便黑色小便不利明知血欲行而不肯利下宜抵當湯主之時方可用膈下逐瘀湯虛證經閉者或因失血過多面與爪甲之色俱淺淡黃白血既從上而脫更何從再注胞中以為經水哉治法宜止其吐衄之血使其下行再補其虛則血生而氣順下注胞中斯經得通矣四物湯加牛膝枳殼降香郁金血餘童便茯苓甘草阿膠或因過淫精竭腎中天癸之水不至胞中則不能引動衝脈之血是為陽不倡陰水不化血宜滋補其水以益天癸左歸飲主之三才湯亦主之或因生産過多傷血血枯聖愈湯主之或室女血枯名為童癆室女正當血盛之時而乃經少血枯以致骨蒸肌熱面色枯白兩顴發赤懶於飲食皮乾消瘦咳嗽喘息此宜大滋其血之化源使血驟生而諸病乃退炙甘草湯主之又或婦人女子不得隱曲心念不遂脾氣抑鬱以致胃病不思飲食倦怠少神怔忡健忘脾不化汁心不化赤是血虛而無經水血虛則生內熱肌肉乾瘦如風之消物故又名風消其證難治宜歸脾湯主之血虛則火盛無制心乘肺金金氣不行不能運布水津留於胸中津液盡化為痰咳嗽不已日久成癆經所謂傳為息賁則不能治謂喘息也都氣丸加人參麥冬棗仁五味子鐘乳石治之天王補心丹亦治之保和丸清燥救肺湯皆可借治息賁葉氏養胃湯加熟地五味雲苓亦佳經血原委已於四卷詳言之茲特就經閉大略出其證治化裁通變之用則存乎其人而已末段所論生血之法男女略同治血證者須切究之胎氣婦人以血養胎血或不足或不和於是有胎氣諸證此與本書血證不涉然亦血分中事不類而類因並論以啓人之悟孕婦胎中止有水血二者而已水即是氣故生産時水衣先至後下血衣行經時亦先下漿水後下鮮血水者氣之所化氣屬陽血屬陰水先乎血是為陽先乎陰也故行經也必天癸之水至於胞中而後衝任之血應之亦至胞中於是月事乃下其受胎也亦必天癸先交而沖血後聚故不曰男女構血而曰男女構精精者水與血混合之名也既成胎後腎中之陽氣則化水以養胎胃中之水穀則取汁化血從衝任兩脈下注胞中以養胎胎中水足則血不燥胎中血足制氣不亢水血調和則胎孕無病所以有病者皆水與血不和之故胎病多端吾且斬斷葛藤但就水血二者立法可以通一畢萬矣惡阻者何也胎中之水火上逆入胃故也衝任乃胞脈皆上屬於陽明陽明之氣下行為順今因有胎子宮收閉沖氣不得下泄轉而上逆挾胞中之水以干胃土則為痰水上溢因而嘔吐治宜調胃利痰二陳湯加枳殼砂仁生薑藿香治之香砂六君子湯亦治之水降則氣降胃得安而不嘔吐矣又或胞氣上逆上合陽明燥氣而為火亦致吐逆嘔苦嘔酸噦氣拒食胎塞於下氣逆於上多生火證故世謂胎前不宜熱藥以此之故法宜清胃降火小柴胡湯主之麥門冬湯亦治之子嗆者何也胎中之水火上干於肺故也養胎全賴水與血二者若水不足以濡血則血燥血不足以濟水則氣熱燥熱相合是為胎火胎火循衝脈而上干犯肺金則咳喘交作兩頰發赤咽喉不利氣嗆咳嗽故名子嗆仲景麥門冬湯治之時方玉女煎加五味子亦妙方中牛膝正取其降沖逆半夏降沖逆降水也牛膝降沖逆降火也皆以墮胎之藥安胎用之得宜正無畏縮又有胎中之水上泛為痰沖肺作咳以致子嗆者於法又宜去水蘇子降氣湯六君子湯加五味炮薑細辛治之若是水火兼動而致咳嗽宜瀉白散加杏仁栝蔞霜白前黃芩枳殼甘草或葶藶大棗瀉肺湯治之但葶藶猛不可多用孕婦少腹痛仍分水分血分兩端在水分者膀胱之氣不能化水則子臟脹滿水不得泄必見小便短澀脹喘諸證審是熱結不行者導赤散加山梔防己以清之審系寒結而陽氣不化者五苓散治之取其水利則少腹之痛自止橘核丸加茯苓亦治之在血分者胞為肝腎所司肝陽不達於胞中則胞血凝滯而痛四物湯加艾葉香附阿膠茴香腎陽不達於胞室則胎冷痛上連腰脊四物湯加杜仲故紙臺烏艾葉此名胞阻謂胞中陰血與陽氣阻隔也重則用腎氣丸輕則用膠艾四物湯血與水皆陰也水為先天陽氣所化之陰液血為後天胃氣所化之陰汁腎陰又轉賴胃之水津而生胃氣又實藉腎之生陽而旺今有腎中之生陽不足者脈弦發熱愈脹而下墜腹痛惡寒子宮欲開仲景用附子湯治之保腎之陽以扶胃氣此補陽法也又有胃中之水津不足者則子臟乾燥悲傷欲哭象如神靈所憑數欠伸所以然者以腎水不足沖血不足無所潤養腎水在下則為胞中之天癸在上則為口中之津液臟燥則肺金不得津液之潤養故肺主悲傷欠伸者明系腎病如神所憑者血燥則心不化液而神無守也甘麥大棗湯滋腎之陰從衝任以輸水於腎而腎陰因籍以生此補陰法也視此二條一切滋陰補陽之法可以貫通胎漏亦分水與血二證下血者屬血熱因其火甚故逼血妄行宜四物湯加阿膠炒梔子側柏葉黃芩下水者或如豆汁下至升許名曰孤漿去水太多則胎乾枯必倚而墜水即氣也惟其氣泄是以水泄黃耆糯米濃煎補而滋之茅根白朮人參鹿角霜桑螵蛸白銀酒水煎服亦佳再按血統於脾而藏於肝肝主疏漏故漏血治以歸脾湯加柴胡山梔阿膠於法尤合水生於腎而制於肺肺氣不納故漏水今觀肺中虛寒不能制下則小便遺溺可知肺氣不納所以漏水之理矣宜用白朮人參海螵蛸龍骨牡蠣百合訶子苧根白銀子淋者小便淋瀝亦分水淋血淋二者水淋病在膀胱脹閉澀滯宜五淋散加木通澤瀉血淋者病在血室陰中割痛下滴血點四物湯加蓯蓉茅根藕節條芩赤苓草梢子懸者胎氣上逼懸塞心胸亦分水分血分二者水分之病由於氣虛水泛為痰壅湊其胎濁氣上逆脈必沉滑遲弱六君子湯加枳殼紫蘇腹皮川芎香附治之血分之病由於血虛胎中厥陰肝經相火上僭舉胎上逼宜小柴胡合四物湯再加雲苓黃連黃柏六味丸加牛膝麥冬以引之使下亦高者抑之之義毋畏牛膝之墮胎也又按子懸之證有孕七八月産母血虛胎無所養上行求食者但用下降之藥不能治也宜大補其血炙甘草湯去桂枝加淮藥棗仁治之聖愈湯加白朮雲苓甘草亦治之甘麥大棗湯皆宜又當美其飲食用黃耆人參山藥白芷芡實豬蹄燉服最佳子氣者水腫也胞與膀胱並域而居胞宮為胎所占侵逼膀胱以致膀胱之水不能化行亦由膀胱之氣化先有不足故能為胎占用五苓散主之若是胎火乘肺化源不清以致便短水腫者去桂枝加知母麥冬黃芩杏仁防己治之子煩者血虛也血者心之所主血足則心不煩胎既耗血胎中之火又上與心火相合火擾其心是以虛煩不能眠酸棗仁湯治之硃砂安神丸亦治之子眩者氣分之痰也其證目眩頭暈皆由胎水上逆為痰之所致二陳湯加紫蘇枳殼杏仁薑汁竹瀝治之子癇者血分之風也其證忽然昏冒卒倒無知手足抽掣過時則醒口噤反張乃孕婦血虛風邪入肝之所致法宜補血祛風四物湯加鉤藤防風茯神桑寄生獨活羚羊角逍遙散小柴胡皆可借治小便不通者氣不足也氣化則水能出今小便點滴不通是胞系下壓其溺竅故也究其所以下壓溺竅之故則因腎氣不足不能舉胎而上此名轉胞宜腎氣丸主之又或胃氣不足不能升提其胎補中益氣湯主之大便不通者血不足也孕婦之血足則無病血既不足則供胎猶未能給更何能分給諸臟是以必現口渴咳逆發熱大便不通等證治宜滋生其血血足則大便自通四物湯加杏仁麻仁蓯蓉菟絲子治之逍遙散加麻仁枳殼厚朴亦治之總而論之胎氣不和者皆是水分之病調水則氣自和胎火太旺者皆是血分之病調血則火自熄能知水火血氣之故則治胎不難治失血之證亦不難即治雜證更無所難此書為失血説法其氣一門皆連類而及之者然胎病之發尤水火血氣之顯然者能參透此條則於水火血氣四字自無隱匿之情其他胎病有未備録者另有胎産之書可查
