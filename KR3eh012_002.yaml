body:
  text: 卷二吐血平人之血暢行脈絡充達肌膚流通無滯是謂循經謂循其經常之道也一旦不循其常溢出於腸胃之間隨氣上逆於是吐出蓋人身之氣遊於血中而出於血外故上則出為呼吸下則出為二便外則出於皮毛而為汗其氣衝和則氣為血之帥血隨之而運行血為氣之守氣得之而靜謐氣結則血凝氣虛則血脫氣迫則血走氣不止而血欲止不可得矣方其未吐之先血失其經常之道或由背脊走入膈間由膈溢入胃中病重者其血之來辟辟彈指漉漉有聲病之輕者則無聲響故凡吐血胸背必痛是血由背脊而來氣迫之行不得其和故見背痛之證也又或由兩脅肋走油膜入小腸重則潮鳴有聲逆入於胃以致吐出故凡失血復多腰脅疼痛之證此二者來路不同治法亦異由背上來者以治肺為主由脅下來者以治肝為主蓋肺為華蓋位在背與胸膈血之來路既由其界分溢出自當治肺為是肝為統血之臟位在脅下血從其地而來則又以治肝為是然肝肺雖系血之來路而其吐出實則胃主之也凡人吐痰吐食皆胃之咎血雖非胃所主然同是吐證安得不責之於胃況血之歸宿在於血海沖為血海其脈麗於陽明未有沖氣不逆上而血逆上者也仲景治血以治沖為要衝脈麗於陽明治陽明即治沖也陽明之氣下行為順今乃逆吐失其下行之令急調其胃使氣順吐止則血不致奔脫矣此時血之原委不暇究治惟以止血為第一要法血止之後其離經而未吐出者是為瘀血既與好血不相合反與好血不相能或壅而成熱或變而為癆或結瘕或刺痛日久變證未可預料必亟為消除以免後來諸患故以消瘀為第二法止吐消瘀之後又恐血再潮動則須用藥安之故以寧血為第三法邪之所輳其正必虛去血既多陰無有不虛者矣陰者陽之守陰虛則陽無所附久且陽隨而亡故又以補虛為收功之法四者乃通治血證之大綱而綱領之中又有條目今並詳於下方云一止血其法獨取陽明陽明之氣下行為順所以逆上者以其氣實故也吐血雖屬虛證然系血虛非氣虛且初吐時邪氣最盛正雖虛而邪則實試思人身之血本自潛藏今乃大反其常有翻天覆地之象非實邪與之戰鬥血何從而吐出哉故不去其邪愈傷其正虛者益虛實者愈實矣況血入胃中則胃家實雖不似傷寒證以胃有燥屎為胃家實然其血積在胃亦實象也故必亟奪其實釜底抽薪然後能降氣止逆仲景瀉心湯主之血多者加童便茅根喘滿者加杏仁厚朴血虛者加生地當歸氣隨血脫不歸根者加人參當歸五味附片有寒熱者加柴胡生薑或加乾薑艾葉以反佐之隨證加減而總不失其瀉心之本意則深得聖師之旨而功效亦大蓋氣之原在腎水虛則氣熱火之原在心血虛則火盛火熱相搏則氣實氣實則逼血妄行此時補腎水以平氣迂闊之談也補心血以配火不及之治也故惟有瀉火一法除暴安良去其邪以存其正方名瀉心實則瀉胃胃氣下泄則心火有所消導而胃中之熱氣亦不上壅斯氣順而血不逆矣且大黃一味能推陳致新以損陽和陰非徒下胃中之氣也即外而經脈肌膚軀殼凡屬氣逆於血分之中致血有不和處大黃之性亦無不達蓋其藥氣最盛故能克而制之使氣之逆者不敢不順既速下降之勢又無遺留之邪今人多不敢用惜哉然亦有病之輕者割雞焉用牛刀葛可久十灰散亦可得效義取紅見黑即止之意其妙全在大黃降氣即以降血吐血之證屬實證者十居六七以上二方投之立效然亦有屬虛屬寒者在吐血家十中一二為之醫者不可不知也虛證去血太多其證喘促昏憒神氣不續六脈細微虛浮散數此如刀傷出血血盡而氣亦盡危脫之證也獨參湯救護其氣使氣不脫則血不奔矣寒證者陽不攝陰陰血因而走溢其證必見手足清冷便溏遺溺脈細微遲澀面色慘白唇口淡和或內寒外熱必實見有虛寒假熱之真情甘草乾薑湯主之以陽和運陰血虛熱退而陰血自守矣然血系陰汁剛燥之劑乃其所忌然亦有陽不攝陰者亦當用薑附也上寒下熱芩連薑附同用亦有焉以上數法用之得宜無不立愈其有被庸醫治壞而血不止者延日已久證多雜見但用以上諸方未能盡止血之法審系瘀血不行而血不止者血府逐瘀湯主之火重者加黃芩黃連痰多者加雲苓瓜霜咳逆加杏仁五味寸冬盜汗身熱加青蒿冬桑葉黃柏牡蠣喘者加杏仁蘇子身痛胸腹滿大便閉為瘀結加大黃如欲求詳參看痰瘀癆熱等門乃盡其治又有審病之因而分別以止其血者治法尤不厭詳因於酒及煎炒厚味之物者其證脈數滑口乾燥胸中煩熱大小便不利宜用白虎湯加茵陳炒梔大黃藕節治之因於外感者先見頭痛惡寒發熱脈浮而緊者為寒犯血分外束閉而內逆壅是以吐血麻黃人參芍藥湯治之若脈浮而數者為傷風風為陽邪宜小柴胡湯加荊芥防風當歸白芍丹皮蒲黃知母石膏杏仁治之若因瘟疫外證頗似傷寒而內有伏熱攻發口舌苔白惡熱羞明小便短赤大便濁垢心中躁煩脈見滑數宜升降散加桃仁丹皮花粉生地蔞仁石膏杏仁甘草治之犀角地黃湯亦治之若因於暑則發熱心煩暑者濕熱二氣合化之名也以清熱利濕為主升降清化湯加防己木通蔞仁治之病輕者去大黃因於怒氣逆上血沸而吐者宜丹梔逍遙散加青皮牡蠣蒲黃膽草治之氣火太甚者則用當歸蘆薈丸以平其橫決因於勞倦困苦飢飽不勻以及憂思抑鬱心神怔忡食少氣短吐血虛煩者宜用歸脾湯主之中土虛寒者加煨薑虛熱者加柴胡山梔因於跌打損傷以及用力努掙而得失血之證者法宜補氣以續其絶消瘀以治其傷四物湯加黃耆人參續斷桃仁紅花陳酒童便治之因於色欲過度陰虛火旺其證夜則發熱盜汗夢交耳鳴不寐六脈細數芤革宜地黃湯加蒲黃藕節阿膠五味治之止血之法此其大略如欲變化而盡善非參透全書不能絲絲入彀總而論之血之為物熱則行冷則凝見黑則止遇寒亦止故有用熱藥止血者以行血為止血薑艾等是也有用涼水止血者或用急流水或用井華水取冷則凝之義芩連諸藥亦即冷止之義有用百草霜京墨十灰散等以止血者取見黑則止之義黑為水之色紅為火之色水治火故止也此第取水火之色猶能相剋而奏功則能知水火之性以消息用藥何血證難治之有又有用鹹以止血者童便馬通揚塵水之類此內經咸走血之義童便尤能自還神化服制火邪以滋腎水大有功用故世醫云服童便者百無不生不服童便者百無不死本人小便清晨每服一碗名回龍湯各種隨筆贊回龍湯之妙者甚夥病家皆所當服也顧止血之法雖多而總莫先於降氣故沉香降香蘇子杏仁旋覆枳殼半夏尖貝厚朴香附之類皆須隨宜取用而大黃一味既是氣藥即是血藥止血而不留瘀尤為妙藥識得諸法其於止血之用思過半矣夫所謂止血者非徒止其溢入胃中之血使不吐出而已也蓋大吐之時經脈之血輻輳而至其溢入胃中者聽其吐可也下可也即停留胃中亦與糟粕無異固無大害也獨動於經脈之中而尚未溢出者若令溢出則不可復返矣惟急止之使猶可復還經脈仍循故道復返而為沖和之血所謂止血者即謂此未曾溢出仍可復還之血止之使不溢出則存得一分血便保得一分命非徒止已入胃中之死血已耳今醫動言止血先要化瘀不知血初吐時尚未停蓄何處有瘀若先逐瘀必將經脈中已動之血盡被消逐則血愈枯而病愈甚安能免於虛損乎惟第用止血庶血復其道不至奔脫爾故以止血為第一法二消瘀血既止後其經脈中已動之血有不能復還故道者上則著於背脊胸膈之間下則著於脅肋少腹之際著而不和必見疼痛之證或流注四肢則為腫痛或滯於肌腠則生寒熱凡有所瘀莫不壅塞氣道沮滯生機久則變為骨蒸乾血癆瘵不可不急去之也且經隧之中既有瘀血踞住則新血不能安行無恙終必妄走而吐溢矣故以去瘀為治血要法用花蕊石散令瘀血化水而下且不動五臟真氣為去瘀妙藥如無花蕊石用三七鬱金桃仁牛膝醋炒大黃亦有迅掃之功顧舊血不去則新血斷然不生而新血不生則舊血亦不能自去也譬諸君子之道不長則小人之道亦不消須知瘀血之去乃新血日生瘀血無處可留迫之不得不去故或化而走小便或傳而入大腸花蕊石化血從小便去醋黃散下血從大便去但能去瘀血而不能生新血不知克敵者存乎將祛邪者賴乎正不補血而去瘀瘀又安能盡去哉治法宜用聖愈湯以補血加桃仁丹皮紅花枳殼香附雲苓甘草補瀉兼行瘀既去而正不傷治瘀之法大旨如是然亦有宜用溫藥者內經曰血者喜陰而惡寒寒則澀而不流溫則消而去之且有熱伏陰分涼藥不效而宜用從治之法以引陽出陰者方用仲景柏葉湯為寒凝血滯之正治亦瘀血伏於陰分之從治法也然三藥純溫設遇火烈之證非其所宜或略加柔藥調之則合四物湯用又有合瀉心湯用者則直以此反佐之也以上通論治瘀之法而瘀血著留在身上下內外又各有部分不同分別部居直探巢穴治法尤百不失一審系血瘀上焦則見胸背肩膊疼痛麻木逆滿等證宜用血府逐瘀湯或人參瀉肺湯加三七鬱金荊芥使上焦之瘀一併廓清血瘀中焦則腹中脹滿腰脅著痛帶脈繞臍一周下連血室女子以系胎男子以束體乃血之管領也凡血證未有帶脈不病者今瘀血滯於其分則宜去之以安帶脈帶脈在中焦脾之部分即從脾治之觀仲景腎著湯可知治脾即是治帶帶有瘀血宜用甲己化土湯加桃仁當歸薑黃主之腰痛甚者加鹿角尖脅腹痛甚者加蒲黃靈脂血瘀下焦腰以下痛小腹季脅等處脹滿是血瘀肝之部分或積胞中血海為痛宜歸芎失笑散主之大便閉結者均加大黃仲景逐瘀大劑則有抵當湯桃仁承氣湯數方皆苦寒大破下為治瘀能事亦有當用溫藥下之者生化湯及牛膝散主之本女科治産後惡露及胞衣不下之方余謂男女雖異其血則同同是下焦瘀血故借用其方往往有驗且下焦原系陰分上焦之瘀多屬陽熱每以溫藥為忌下焦之瘀多屬陰凝故産婦喜溫而忌寒以其血在下焦也知此則知以溫藥治下焦瘀血尤為合宜然亦須審系寒凝乃用溫藥若血室熱則仍是桃仁承氣之證又有瘀血流注四肢疼痛腫脹者宜化去瘀血消利腫脹小調經湯加知母雲苓桑皮牛膝治之又有瘀血客於肌腠阻滯榮衛發寒發熱似瘧非瘧骨蒸盜汗咳逆交作用小柴胡湯加當歸桃仁丹皮白芍主之寒甚者再加艾穗細辛熱甚者再加花粉粉葛青蒿知母咳有痰火加瓜霜杏仁寸冬五味雲苓知母水飲上衝加葶藶子益小柴胡原是從中上疏達肝氣之藥使肝氣不郁則暢行肌腠而榮衛調和今加去瘀之品則偏於去瘀凡瘀血阻滯榮衛者用之立驗總而論之血瘀於臟腑之間者久則變為乾血化為癆蟲血瘀於軀殼之間者或病偏枯或化癰膿血瘀於肌腠之間者則變骨蒸毛髮焦折肢體瘦削一切不治之證總由不善去瘀之故凡治血者必先以去瘀為要另詳瘀血門三寧血吐既止瘀既消或數日間或數十日間其血復潮動而吐者乃血不安其經常故也必用寧之之法使血得安乃愈其法於止吐消瘀中已寓厥治然前藥多猛峻以取效乃削平寇盜之術尚非撫綏之政故特將寧血旨意重加發明以盡其用有外感風寒以致吐血止後榮衛未和必有身痛寒熱等證香蘇飲加柴胡黃芩當歸白芍丹皮阿膠治之有胃經遺熱氣燥血傷而血不得安者其證口渴噦氣惡聞人聲多躁怒聞木音則驚臥寐煩而不安犀角地黃湯主之重則合白虎湯大清大涼以清胃熱輕則止用甘露飲以生胃津而血自愈有因肺經燥氣氣不清和失其津潤之制節而見喘逆咳嗽等證以致其血牽動清燥救肺湯主之火甚加犀角血虛加生地痰多加尖貝潤燥寧血為肺痿等證之良方葛可久十藥神書專醫虛損失血用保和湯亦佳潤肺利氣平燥解鬱前方清純此方活動隨宜取用血自安靜而不動矣有因肝經風火鼓動煽熾而血不能靜者則見口苦咽乾目眩耳鳴脅痛逆氣躁怒決裂骨蒸妄夢以逍遙散平劑和之審系肝經風氣鼓動而血不寧者再加桑寄生殭蠶玉竹棗仁牡蠣青蒿此從仲景白頭翁湯得來仲景治産後血痢取白頭翁平木息風蓋肝為藏血之臟風氣散而不藏則必平之使安而從血乃得安也又或肝火偏勝橫決而不可遏致令血不能藏者則宜加阿膠山梔膽草胡黃連蔞仁牛膝青皮牡蠣當歸蘆薈丸尤破瀉肝火之重劑但不如逍遙散加減之穩又有沖氣上逆其證頸赤頭暈火逆上氣咽喉不利乳下動脈辟辟彈指頸上動脈現出皮膚衝脈原不上頭項咽乾者以沖為血海屬肝因肝脈而達於咽也頸脈動面赤色者以衝脈麗於陽明沖氣逆則陽明之氣隨逆故也內經謂沖為氣街又謂沖為血海氣逆血升此血證之一大關鍵也故仲景治血以治沖為要麥門冬湯主之陳修園謂去粳米加白蜜尤能滋補其陰豫謂治衝脈獨取陽明促景既引其端後人亦即當擴而充之審其衝陽太旺者知母枳殼白芍煅石膏均可加入以清折之梔子黃芩木通蔞仁牛膝利陽明之水者尤可加入以分消之此衝脈之氣上合陽明之治法也然沖為氣街氣根於腎血海即丹田腎氣之所藏也若衝脈挾腎中虛陽上逆喘急者宜用四磨湯調納逆氣是仲景桂苓甘草五味湯意但仲景用桂枝化膀胱之寒水謂氣從少腹上衝咽喉面熱如醉或熱流於兩股或小便難而昏冒忽上忽下如電光之閃灼無定乃陰盛格陽而陽氣飛越故以辛溫化之今系失血陰氣既傷再用桂枝豈不犯陽盛則斃之戒故用沉香代桂以納浮陽而即用人參以滋陰沉香直走下焦烏藥治膀胱腎間之氣沖為血海居膀胱腎間之地治陽明者治其末治膀胱腎間者是治其本也若腎中陰氣大虛而衝陽不能安宅則用四磨湯加熟地棗皮山藥五味枸杞子滋陰配陽以安之若其人素有水飲格陽於上因而動血者仲景桂苓甘草五味湯又為對證第其方與血證本不相關可加當歸白芍丹皮阿膠或用蘇子降氣湯利痰降氣以靖沖逆或用小柴胡湯加龍骨牡蠣以導沖逆桂苓蘇子湯是治痰飲以治沖之法小柴胡又是清火以治沖之法本方治熱入血室血室者肝之所司也衝脈起於血室故又屬肝治肝即是治沖血室在男子為丹田在女子為子宮其根系於右腎腎中真陽寄於胞中為生氣之根乃陰中之陽肝木得之發育條達是為相火其火如不歸根即為雷龍之火龍骨牡蠣乃陽物而能蟄藏取其同氣以潛伏陽氣此尤治衝脈更進一層之法合小柴胡大有清斂相火之功若腎經陰虛陽無所附雷龍之火上騰者用二加龍骨湯加阿膠麥冬五味以引歸其宅亦妙腎氣丸麥味地黃湯皆可酌用二方一以溫藥化氣一以陰藥滋降腎居衝脈之下又為衝脈之根安腎氣即是安沖氣沖氣安而血海寧自不至於潮上矣總而論之血之所以不安者皆由氣之不安故也寧氣即是寧血以上所論各氣治法亦云詳備在臨證者細審處之四補血邪之所輳其正必虛不獨補法是顧虛即止血消瘀用攻治法亦恐其久而致虛故亟攻之使邪速去以免其致虛耳但彼時雖恐其虛而猶未大虛故以去邪為急若延日已久未有不虛怯者即血既循經一如平人而前次所吐之血已屬有去無回其經脈臟腑又系血所走泄之路非用封補滋養之法烏能完全補法不一先以補肺胃為要肺為華蓋外主皮毛內主制節肺虛則津液枯竭喘嗽痿燥諸證作焉因其制節不得下行故氣上而血亦上未有吐血而不傷肺氣者也故初吐必治肺已止尤先要補肺用辛字潤肺膏滋補肺中陰液肺既津潤則其葉下垂氣澤因之得以下降利膀胱傳大腸諸竅通調五臟受益如肺葉枯焦不能覆下則翹舉而氣亦上逆不得臥息外應皮毛不榮下則二便不調足痿腸燥百病俱生惟此膏潤津為痿燥良劑近人黃坤載所立地魄湯補土生金補金生水於補肺之法頗得平時代茶可用生脈散黃耆糯米湯加阿膠麥冬尤能充補肺臟凡此皆滋補肺陰為失血必有之證治也而陳修園謂血雖陰類運以陽和心肺之陽一宣如日月一出爝火無光諸般邪熱俱除血自不擾而循經矣故又有溫補肺陽之法用保元湯甘溫除大熱使肺陽布濩陰翳自消設有痰飲咳嗽者加五味杏仁或用六君湯加炮薑五味內經云形寒飲冷則傷肺上二方為形寒者立補肺之法凡陽虛生外寒及濁陰乾上焦者用以扶肺之陽洵屬良劑然失血之人多是陰虛若執甘溫除大熱之説妄投此等藥料鮮不致誤故年來從修園法者能醫雜證而不能醫虛癆以其偏於補陽故也第以理論之原有氣不攝血之義故什百之中亦有一二宜補陽者因並列其方使人參觀以盡其變心為君火主生血血虛火旺虛煩不眠怔忡健忘淋遺祕結神氣不安用天王補心丹啓腎之水上交心火火不上炎則心得所養心經水火不相濟者以此補水寧心若不關水虛但由本臟之血虛火旺者則但用養血清心之藥而已硃砂安神丸瀉心火補心血並安心神凡怔忡昏煩不寐之證皆可治之若心陽不收汗出驚悸以及心火不下交於腎而為夢遺溺赤等證者隨用上二方再加龍骨牡蠣棗仁蓮心浮麥等以斂戢之此為心經血虛火旺之大法其有心經火虛不能生血瘦削悸怯六脈細弱宜用人參養榮湯補脾胃以補心內經云中焦受氣取汁變化而赤是為血是湯補心化血以奉周身名養榮者專主以陽生陰和暢榮血凡氣血兩虛變見諸證皆可服也然女人血崩及産後亡血過多均以溫補為主因其血下瀉屬於脫證故也至於吐血乃血脈奮興上干陽分是為逆證宜溫補者最少然亦有陽不統陰暴脫大吐陰亡而陽亦隨亡者溫補又為要法甚矣醫者辨證不可不詳而用藥不可執一也故近日從丹溪者專用苦寒從修園者專用溫藥皆是一弊脾主統血運行上下充周四體且是後天五臟皆受氣於脾故凡補劑無不以脾為主思慮傷脾不能攝血健忘怔忡驚悸盜汗嗜臥少食大便不調等證歸脾湯統治之脾虛發熱加丹皮炒梔兼肺氣燥者加麥冬五味脹滿而水穀不健運者加陳皮煨薑或加阿膠以滋血或加柴胡貝母以解鬱或加魚膠以固血獨於熟地不可加入以礙其統攝運行之用蓋此乃以陽生陰以氣統血之總方不似四物六味以陰益陰也且脾與肝腎滋陰之法亦各不同若脾陰虛脈數身熱咽痛聲啞慎柔五書用養真湯煎去頭煎止服二三煎取無味之功以補脾為得滋養脾陰之祕法楊西山專主甲己化土湯亦頗簡當而人參花粉尤滋生津液之要藥世但知砂半薑蔻為扶脾進食之要藥不知脾陽不足不能熏化水穀者砂半薑蔻自系要藥若脾陰不足津液不能融化水穀者則人參花粉又為要藥試觀回食病水穀不下由於胃津乾枯則知津液尤是融化水穀之本近日西洋醫法書傳中國與內經之旨多有抵牾實則內經多言其神化西洋多滯於形迹以內經之旨通觀之神化可以該形迹然西人逐迹細求未嘗無一二通於神化者也內經之旨謂脾主消磨水穀肝膽之氣寄在胃中以疏泄水穀西醫則云谷入於胃有甜肉汁來注以化之又苦膽汁注於小腸以化之與胃津合併化其穀食內經所言化谷以氣西醫所言化谷以汁有此氣自有此汁今人讀內經不知經文舉精以該粗竟至得用而遺體反不若西醫逐迹以求尚知穀食之化在於汁液也但西醫有此論而用藥不經不足為訓吾於滋胃汁每用甘露飲清燥養榮湯葉氏養胃湯滋脾汁用人參固本湯炙甘草湯去桂枝加白芍滋膽汁用小柴胡湯去半夏加花粉生津化谷以折衷中西之醫法而為補養脾陰要義知此庶可補李東垣脾胃論之所不足若果脾陽不旺不能磨化水穀者則用六君子加香砂以燥之如欲專意填補則仲景小建中湯尤勝補陽致陰為虛癆聖方今即不能恪遵但得其意則于歸脾六君補中益氣諸方可以變化神奇用收廣效歸脾湯從建中湯重濁處用意補中湯從建中湯輕清處用意第此方桂枝陽燥於血證有宜不宜用者審之如命門真火不能生土吐利厥冷陰火上衝頭面赤色噁心逆滿用正元丹溫補少火而又無壯火食氣之虞是能得小建中之遺意者也葛可久白鳳膏化平胃散之燥變為柔和又用酒送取五穀之精合諸藥以養脾胃治飲食不進發熱勞倦和血順氣功效最大肝為藏血之臟血所以運行周身者賴衝任帶三脈以管領之而血海胞中又血所轉輸歸宿之所肝則司主血海衝任帶三脈又肝所屬故補血者總以補肝為要李時珍謂肝無補法蓋恐木盛侮土故為此論不知木之所以剋土者肝血虛則火擾胃中肝氣虛則水泛脾經其侮土也如是非真肝經之氣血有餘也且世上虛癆多是肝虛此理自東垣脾胃論後少有知者肝血虛則虛煩不眠骨蒸夢遺宜四物湯加棗仁知母雲苓柴胡阿膠牡蠣甘草斂戢肝魂滋養肝血清熱除煩為肝經陰虛滋補之法又有肝經氣虛臟寒魂怯精神耗散桂甘龍牡湯以斂助肝陽陽虛遺精驚悸等證宜之獨與失血未盡合宜以其純用氣分藥故也仁熟散用血分藥較多溫潤養肝血功與炙甘草湯相近若肝之血不暢和亦可用滑氏補肝散以酸味補肝體以辛味補肝用妙獨活一味借風藥以張其氣若去獨活加桑寄生則又有寧息風氣之妙方意實從逍遙散套出但此方氣味厚俱純於補肝逍遙散氣味較薄故純於和肝凡肝有鬱火胸脅刺痛頭眩心悸頰赤口苦寒熱盜汗少食嗜臥無不治之又有肝經血脈大損虛悸脈代者法宜大生其血宜仲景炙甘草湯大補中焦受氣取汁並借桂枝入心化赤為血使歸於肝以充百脈為補血第一方世醫補血而不得血之化源雖用歸地千石無益果參透此旨則歸脾湯之用遠志棗仁是入心理血之源也逍遙散之用丹梔是入心清血之源也從此一隅三反自有許多妙用腎為水臟上濟君火則水火既濟上交肺金則水天一氣水升火降不相射而相濟安有不戢自焚之患設水陰之氣虛而火熱之氣亢喘咳蒸灼痰血癆瘵均作矣凡人後天之病久則及於先天寇深矣若之何凡治虛者不可以不早也地黃湯主之補腎之陰而兼退熱利水退熱則陰益生利水則陰益暢蓋膀胱化氣有形之水氣下泄則無形之水陰如露上騰而四布矣以濟君火則加枸杞元參以輸肺金則加生脈散火甚者再加黃柏知母如小便清和無痰氣者只須專意滋腎左歸飲多服為佳回龍湯滋陰降火同氣相求視無情草木尤勝如陰虛火旺足痿筋焦骨蒸頭暈用丹溪大補陰丸滋陰潛陽以苦寒培生氣較地黃湯更優以上補腎陰法又有宜補腎陽者腎為水臟而內含陽氣是為命火此火上泛則為雷龍之火下斂則為元陽之氣引雷龍之火以歸根則無上熱下寒頭暈腰痛腫喘癃閉之證用腎氣丸從陰化陽補火濟水以治之再加牛膝車前或黃柏知母更能利水折火如不須化水但須補陽者則用黃耆天魂湯是從仲景附子湯套出雖不及附子湯力量之厚較附子湯藥尤純和血家忌剛燥間有宜補元陽者亦以此等為佳夫腎中之陽達於肝則木溫而血和達於脾則土敦而谷化筋骨強健手足不清冷衛氣固不惡寒皆腎陽足故也然腎水賴陽以化而腎陽又賴水封之此理不可偏廢補腎者所宜細求以上所論補法輕重進退各有法度非如張景嶽輩多集補藥而已也總而論之血證屬虛癆門固宜滋補第恐瘀邪未清驟用補法則實以留邪為患而正氣反不受益歷見乾血癆瘵等證皆系醫人橫用滋補以致舊血不去新血不生不知舊血客於經絡臟腑之間如木之有蛀不急去之非木死其蛀不止也故仲景治乾血用大黃蟅蟲丸夫既成虛癆之證而內有乾血猶須峻藥去之則其虛未成者更不可留邪為患故實證斷不可用補虛之方而虛證則不廢實證諸方恐其留邪為患也或虛中實證則攻補兼用或十補一攻在醫者之善治焉以上所論吐血始終治法略備惟於兼證變證不及詳言另立門類縷分條析查證治者可以鉤考而得之嘔血吐血者其血撞口而出血出無聲嘔血者血出有聲重則其聲如蛙輕則厄逆氣不暢遂而已同是血出口中治與吐血無異但吐無聲而嘔有聲證既小異而治法若不加詳安能絲絲入彀以輕重論則吐輕而嘔重吐則其氣尚順嘔則其氣更逆也以臟腑論吐血其病在於胃嘔血其病在於肝何以言之蓋肝木之氣主於疏泄脾土而少陽春生之氣又寄在胃中以升清降濁為榮衛之轉樞故傷寒論少陽為病有乾嘔嘔吐不止之病是少陽轉樞不利清氣遏而不升濁氣逆而不降也金匱嘔涎沫頭痛胸滿者吳茱萸湯主之取吳萸降肝之濁氣肝氣降而嘔自止是肝木失其疏泄之常橫肆侮土故成嘔逆主用吳茱萸降肝之濁氣肝氣不逆則嘔止矣由此觀之可知凡嘔皆屬肝膽而血又肝之所司今見嘔血之證斷以調肝為主諸家皆言嘔血出於肝而未詳其理吾故旁引金匱傷寒以證明之但金匱傷寒之嘔乃雜病之嘔屬於氣分者也而失血之嘔則專主血分治法自有不同耳先乾嘔然後嘔血嘔血後仍發乾嘔者皆少陽之逆氣也用大柴胡湯加蒲黃丹皮桃仁當歸治之嘔血既止再服小柴胡湯以調和榮衛轉樞表裡上焦得通津液得下胃氣因和嘔噦自止血自安靜而不上潮矣然肝膽相連膽病未有不及肝者丹梔逍遙散可並治之但嘔不吐屬少陽嘔吐兼有屬肝經肝氣善怒其火最橫觀傷寒論肝氣侮肺名曰縱刺期門肝氣侮脾名曰橫刺期門皆取刺法以瀉之則知肝氣怒逆而為嘔逆尤宜攘除肝火不可縱敵為患今本仲景刺法之意變用湯藥宜當歸蘆薈丸加丹皮蒲黃凡發怒嘔血以及肝氣橫逆其證惡聞人聲欲死不欲生欲按劍殺人及驚狂罵詈不認親疏皆肝經無情之火非此大劑不能殲除若此時因循延至日久病氣未衰正氣先衰虛中挾實不攻不愈欲攻不堪是猶宋用賈似道養姦為患至國促而始去之晚矣若審其病稍輕者但須涼肝血調胃氣則嘔血自止犀角地黃湯加柴胡枳殼服後血止再服逍遙散加阿膠牡蠣香附以收功有平時嘔酸嘔苦以及失血之後常嘔酸苦者嘔酸是濕熱試觀夏月熱湯過夜則變為酸味便知嘔酸是濕熱嘔苦是相火膽寄相火膽汁苦故相火之味能變胃津使苦宜借用左金丸再加血分藥以治血分為宜蓋此二藥辛苦降泄治血藥中以為引導尤效嘔血止後如肝膽火旺血虛煩躁頰赤口渴胸脅刺痛發熱盜汗魂夢不安此乃相火內熾欲作骨蒸癆瘵宜柴胡清骨散以治之如兼咳嗽喉間作癢乃肝肺之氣不相調協宜用四逆散香蘇引再加杏仁枳殼枯芩知母當歸白芍治之如咽喉中常若有氣哽塞善噦氣打厄者乃肝與心之氣不暢故也香蘇飲加柴胡薄荷射干牛蒡子尖貝當歸旋覆花治之逍遙散尤為治肝經之要藥加減得宜皆能應手而取效也嘔雖屬於肝膽然亦未有不關胃府者也胃氣逆上治法已詳吐血門今併為醫者補言之凡血證帶嘔者但治其血血止而嘔自止凡嘔證帶血者有如回食病嘔後見血水此胃逆血枯難治之證大半夏湯麥門冬湯治之玉女煎加蒲黃麻仁亦效四物湯加甘草寸冬枳殼茯苓藕汁蘿蔔汁生薑荊竹油皆清利胃氣養血止嘔之藥此篇論血單以嘔血論然失血證未有單見一證而不兼見諸證者今欲詳其條目不得不分門立説至於用方則須參考諸證而變化之若拘守一門以求方治豈不膠柱鼓瑟咯血咯血者痰帶血絲也昔人謂咯血出於心謂心主血脈咯出血絲象血脈之形故也又謂咯血出於腎蓋腎主五液虛火上升則水液泛上凝而為痰然第吐痰已也而何以又帶血絲哉蓋腎氣下行則水出膀胱今腎經之氣不化於膀胱而反載膀胱之水上行為痰膀胱者胞之室膀胱之水隨火上沸引動胞血隨之而上是水病兼病血也觀女人先發水腫然後斷經者名曰水分是水病而連纍胞血之一證又觀傷寒論熱結膀胱其血自下夫熱結膀胱是水病也而即能惹動胞中之血從小便而下又水病兼動胞血之一證也據此可知水泛為痰而亦能牽引胞血矣古法但謂咯血出於腎而未能發明致庸劣者竟謂其血出於腎臟非也所謂咯血出於腎者乃腎氣不化於膀胱水沸為痰而惹動胞血之謂也此論從古未經道及而豫從傷寒悟出千慮一得不容自祕醫者知此則可知治咯之法並可知治痰之原矣仲景豬苓湯化膀胱之水而兼滋其血最為合法再加丹皮蒲黃以清血分凡痰之原血之本此方兼到或用地黃湯加旋覆花五味天冬寸冬蒲黃火甚者用大補陰丸加海粉牛膝雲苓丹皮蛤蚧凡此數方皆主利痰立法是就腎主咯血之説以出治也腎水化於膀胱故瀉膀胱即是瀉腎膀胱與血室同居一地膀胱之水不泛則自不動血室之血矣數方皆治膀胱兼治血室故效夫痰為腎之所主血實心之所主也況水火互根腎病及心心病亦及腎其有心經火旺血脈不得安靜因而帶出血絲咳逆咽痛者導赤飲加黃連丹皮血餘蒲黃天冬寸冬尖貝茯苓治之地骨皮散加茯苓射干旋覆花牛膝太平丸亦治之以上數方皆就咯血出於心之説以立法心主血脈部居胸中與肺為近肺氣咳逆猶易牽動心部之血故痰咳者往往帶出血絲治血絲以心為主肺為水之上源水不清而凝為痰痰不降而牽動血治肺之痰又是治咯血捷法蓋痰血之來雖由心腎而無不關於肺者也太平丸為治肺通劑紫菀散保和湯皆善能滌除肺痰補瀉兼到另參咳血唾血門可盡其治唾血脾主消磨水穀化生津液津液騰溢水陰四布口中清和湛然如露是以終日不飲而口不渴亦終日閉口而唾不生唯脾之津液不能清和散布於是凝聚而為唾是唾者脾不攝津之故也知脾不攝津而唾津則知脾不攝血而唾血矣唾津其常耳而唾血則又甚焉蓋津乃氣分之陰液其源即在胃中凝而為唾其來既近其傷不多至於唾血則出於陰分內經云脾為陰中至陰蓋五臟俱屬陰經而脾獨名太陰以其能統主五臟而為陰之守也其氣上輸心肺下達肝腎外灌溉四旁充溢肌肉所謂居中央暢四方者如是血即隨之運行不息所謂脾統血者亦即如是世醫不識統血之義幾指脾為貯血之器豈不愚哉脾能統血則血自循經而不妄動今其血走泄胃中為唾而出是脾之陰分受病而失其統血之常也審系脾經火重唇口乾燥大便祕結脈滑實者宜用瀉心湯加當歸生地白芍花粉寸冬枳殼蒲黃甘草若是脾經陰虛脈細數津液枯血不寧者麥冬養榮湯加蒲黃阿膠甲己化土湯加生地花粉人參寸冬藕節側柏葉萊蔔汁枳殼皆滋利脾陰之要藥如或七情鬱滯脾經憂慮傷其血而致唾血者以脾主思慮故每因思慮而傷脾陰睡臥不寧怔忡勞倦飲食不健宜用歸脾湯以補心脾再加阿膠柴胡炒梔棕灰血餘以解鬱火清血分此治脾兼治心心脾為思慮所傷者應手而效又凡脾經憂抑則肝木之氣遏於脾土之中不能上達故清陽不升郁為內熱不須清熱但解其鬱郁升而火不遏矣逍遙散主之脾土陰而用陽脾經陰虛火鬱者上法略備又有脾之陽氣不旺無以統運陰血心戰脈弱四肢清冷飲食不健自汗身熱者用歸脾湯補脾之陽以生血人參養榮湯正元丹皆治之亦有清晨唾血每早初醒血液滿口唾出即淨明晨又唾乃臥後血不歸經溢出口中實證則由肝不藏血必有頭痛口渴便閉之證用當歸蘆薈丸治之虛證則由脾不統血必有怔忡虛煩不眠等症用歸脾湯加丹皮山梔棕灰五味治之此證與腎虛齒衄相似宜參看之高士宗曰偶然唾血一哈便出者不藥可愈謂其血近胃如先血後便為近血一般故不藥可愈吾謂亦宜少用清味之藥可服甲己化土湯加銀花竹茹萊蔔汁丹溪又謂唾血皆屬於腎是混唾咯為一證而以腎血之來其路最深其證最重用保命生地散治之吾謂先唾痰水唾久然後唾血者此血來路遠其證深可用丹溪法治之然亦有丹溪法所不能治者即吾所定諸方亦有不能盡治別參吐咳諸門自有治法勿謂豫論之不備也咳血肺主氣咳者氣病也故咳血屬之於肺肺之氣外合於皮毛而開竅於鼻外證鼻塞皮毛固閉則其氣反而內壅嗆出喉間發為咳嗽此外因之咳也肺之氣下輸膀胱轉運大腸通調津液而主制節制節下行則氣順而息安若制節不行則氣逆而咳此內因之咳也夫外因之咳不過其竅閉塞肺氣不得達於膚表於是內奔喉間而為咳其於肺之本體固未常受傷也至於內因之咳則由於制節不行之故蓋肺為金體其質輕清肺中常有陰液沖養其體故肺葉下垂如天道下際其氣澤之下降亦如雨露之下滋因之膀胱通大便調五臟六腑之氣皆得潤利而不壅遏肺氣通調之益也設肺中陰液不足被火克刑則為肺痿肺葉焦舉不能下垂由是陰液不能垂之下注肺中之氣乃上逆而為咳此內因之咳難治之證也以上二者乃肺之本病自致咳嗽者也又有為他臟所幹而亦咳嗽者則以肺為華蓋諸臟皆居其下故他臟痰飲火氣皆能上熏沖射使肺逆咳故內經咳嗽論詳別臟腑而總言之曰聚於胃關於肺病雖由於他臟而皆關於肺此肺之所以主咳嗽也人必先知咳嗽之原而後可治咳血之病蓋咳嗽固不皆失血而失血則未有不咳嗽者或外感失血病由皮毛內合於肺自應咳嗽或由胃中積熱火盛乘金氣上而咳或由肝之怒火上逆而咳此失血之實證必致咳嗽者也或由陰虛火旺肺失清肅之令痿燥作咳或挾脾經憂鬱心經虛火以致咳嗽或腎經陰虛陽氣不附上越而咳此失血之虛證不免咳嗽者也又有痰咳界在半虛半實之間又有氣咳屬在虛多實少之證或先咳而後失血或先失血而後咳或暫咳即愈或久咳不止種種不一必細推究之而於失血虛勞庶得調治之法一實咳外感風寒先見頭痛惡寒發熱等證仲景云咳而喘息有音甚則吐血者用麻黃湯李東垣師其意用麻黃人參芍藥湯可見咳嗽吐紅之證多有因外感者古法用麻黃乃劫病之劑且是氣分之藥於血分尚少調治須知咳固氣病然使不犯血分又何緣而失血也哉故必以兼顧血分為宜醫宗金鑑用蘇子降氣湯豫則用小柴胡湯加紫蘇荊芥當歸白芍丹皮杏仁於氣分血分兩兼治之最得和表清裡之法火重祕結者加酒軍惡寒無汗者加麻黃胸脅腰背刺痛脹滿者為有瘀血再加桃仁紅花蓋小柴胡為通利三焦治肺調肝和榮衛之良方加減得宜左宜右有凡血家兼有表證者以此方為主極為妥當普明子止嗽散亦可用但藥力薄不堪治重病如咳嗽輕帶血少者又須用此輕劑以調之斯為中病而不致太過止血者再加蒲黃藕節清火者再加枯芩寸冬降痰加尖貝茯苓降氣加杏仁枳殼補血加當歸生地凡上兩方及加減之法皆為新病咳血而設其有外感既久陳寒入肺久咳喘滿因而失血者乃咳嗽氣逆牽動諸經之火以克肺金肺氣亦能牽動胸背脈絡之血隨咳而出是病雖生於寒而實因寒動火治法但溫其寒益動其火宜清火疏寒面面俱到斯不差爽用千金麥門冬湯並小柴胡加蘇子冬花蓋寒中包火者宜小柴胡加減以清鬱火火中伏寒者宜千金麥門冬湯以搜陳寒或用細辛代麻黃再加黑薑五味尤去肺寒要藥但血證多忌剛燥更合枯芩寸冬玉竹瓜霜以柔之用去火中伏寒庶幾調劑得法然而寒在肺中久亦變從火化既化為火便當專治其火兼溫其寒是猶抱薪救火矣以上所論外感風寒變為咳血此證最多醫者誤治往往釀成癆瘵慎之慎之此外又有內受溫暑濕熱者亦能攻發而為咳血其證身熱口渴小便不利胸腹煩滿與外感風寒相似治宜專清其里忌發其表蓋此病皆襲人口鼻侵人脈絡伏留腸胃膜原之間不似傷寒從膚表入者故但用清裡之藥不可發表以張病勢里清則表自和咳血自止人參瀉肺湯治之若其人素嗜厚味胃火炎上作咳者用犀角地黃湯加麥冬五味杏仁枳殼藕節又或肝經怒火逆上侮肺作咳則用柴胡梅連散加青皮牡蠣蒲黃丹皮生地又有熱邪激動水氣水上衝肺咳逆不得臥或其人面目浮腫者仲景謂之風水用越婢湯血家風火相動激水氣上升者毋庸以麻桂發表平肝風宜柴胡白芍桑寄生殭蠶青蒿荊芥薄荷之屬清肺火宜枯芩知母石膏天麥冬清肝火宜膽草黃柏清心火宜黃連炒梔治激動衝上肺中之水宜葶藶苡仁防己桔梗杏仁雲苓合此數品藥以求方治其於風火激動水氣衝肺肺脹咳嗽之證乃為合宜蓋仲景越婢湯是治外感肺脹之法吾所論者乃血證內傷肺脹之法吾曾治數人有用瀉白散合葶藶瀉肺湯而效者有用二陳湯和知母石膏荊芥薄荷防己木通而效者有用小柴胡加荊芥紫蘇杏仁防己木通寸冬兜鈴而效者又丹溪云此證多系痰挾瘀血礙氣為病若無瘀血何致氣道如此阻塞以致咳逆倚息而不得臥哉用四物湯加桃仁訶子青皮竹瀝薑汁治之丹溪此論洵中病情蓋失血之家所以有痰皆血分之火所結而成然使無瘀血則痰氣有消容之地尚不致喘息咳逆而不得臥也血家病此如徒以肺脹法治之豈不南轅北轍丹溪此論可謂發矇振聵第其用四物湯加減於痰瘀兩字未盡合宜豫謂可用通竅活血湯加雲苓桔梗杏仁桑皮丹皮尖貝小柴胡加當芍桃仁丹皮雲苓尤妥此皆血家咳嗽屬實證者再兼參咳嗽條更詳一虛咳肺為嬌臟無論外感內傷但一傷其津液則陰虛火動肺中被刑金失清肅下降之令其氣上逆嗽痰咳血變為肺痿重病吐白沫如米粥咽痛聲啞皮毛灑淅惡寒憎熱皆金損之證不易治也此病無論寒久變火火鬱似寒總以十藥神書保和湯治之蓋肺金火甚則煎熬水液而為痰水液傷則肺葉不能腴潤下垂其在下之肝腎氣又熏之肺葉焦舉不能制節故氣逆為咳氣愈逆所以久咳不止也此方潤肺滌痰止血和氣無論寒久變火火鬱似寒痰血痿燥等證皆統治之凡由外傷變作虛咳勞證者以此方為第一又有肺中陰虛本臟氣燥生痰帶血發為痿咳以及失血之後肺燥成痿痰凝氣鬱久咳不止此乃內傷所致不必治其餘病但補其肺諸病自愈用清燥救肺湯甘涼滋潤以補胃陰而生肺金肺金清潤則火自降痰自祛氣自調咳自止血枯加生地火甚加犀角痰多加貝母帶血加蒲黃以上二方於肺經虛火治法綦詳失血之人多是陰虛火旺照上治法者十居八九亦有一二屬肺經虛寒者內經云形寒飲冷則傷肺肺惡寒多漩唾上氣仲景用甘草乾薑湯治之然金匱自言遺溺小便數所以然者以上虛不能制下故也則明見有虛冷遺溺之實據乃用甘草乾薑以溫之且其脈必沉弦遲微痰必清稀泛溢不似清燥保和二湯所治故主溫藥吾謂可用六君子為主再加當歸白芍炮薑五味則於止咳止血皆宜脾經虛寒痰動咳嗽者此方亦宜若脾經虛火生痰帶血則宜逍遙散加寸冬藕節蒲黃若肝經虛火生痰帶血亦宜逍遙散加丹皮山梔五味又有腎經虛火生痰帶血者另詳唾血咯血門肝腎虛證均詳吐血門降沖氣條並詳見六卷咳嗽門一痰咳肺中痰飲實熱氣逆而咳血者揚湯止沸不如釜底抽薪瀉肺丸主之夫咳血之證未有不與痰為緣者人身之氣以運血人身之血即以載氣血少則氣多不能載之壅於內而為熱熱則水津被灼煎熬成痰是以火旺則痰盛痰盛則滯氣之往來氣阻則壅積而益生其熱故痰甚而火益旺此時補虛則助邪此時逐邪則重虛是惟攻補兼用庶幾兩得其治先用十藥神書消化丸臨臥用飴糖拌吞以攻其實即噙化太平丸以補之攻補兼施為除暴安良之妙法時醫但事滋補豈不誤了多人若病家兢業不敢用消化丸者可用二陳湯以初解之二陳降氣利水為祛痰通劑若欲兼利肺氣加杏仁蘇子桑皮咳逆倚息不得臥者為水飲沖肺肺葉不得下降加葶藶大棗若火甚者加栝蔞霜黃芩老連火輕者加寸冬知母兼理風寒加柴胡荊芥防風兼理血分加當歸白芍丹皮桃仁上方皆是去實痰之治法又有虛痰乃肺經陰虛燥氣生痰黏著喉間滯澀聲音喘咳發熱脈細數者不宜滲利再傷水津但宜滋潤以生津津生則痰豁宜保和湯清燥救肺湯紫菀散如喉中有痰核氣核哽塞不得吞吐者為梅核證乃心火凝痰宜豁痰丸加牛蒡子香蘇飲加桔梗枳殼尖貝雲苓旋覆甘草亦治之又有胃中疼氣動膈證見胸脅逆滿咳喘噦厄者失血家往往有之宜用礞石滾痰丸治之若胃中氣虛挾痰飲者宜旋覆代赭石湯兼治血分則加當歸白芍蘇木兼治火熱則加寸冬枯芩噦厄詳六卷茲論痰咳未及備載痰咳之證又在肝氣上逆干犯肺經挾痰滯氣以致咳嗽其證口苦頭痛頰赤多怒兩脅作痛宜溫膽湯加青皮白芥柴胡山梔若肝火橫決怒逆者加薑黃大黃若肝經虛火鬱而生痰宜用丹梔逍遙散加龍骨牡蠣阿膠貝母夫痰飲之病其標在肺其本在腎腎水上泛是為痰飲痰飲沖肺乃生咳嗽故治痰飲以腎為主腎經陽虛不能鎮水水氣泛上振寒喘咳者用真武湯加細辛乾薑五味若腎水因寒而動上凌心火心悸喘咳虛陽上浮咽痛面熱宜用苓桂朮甘湯加細辛五味溫寒利水然此乃單為痰飲立法血家陰虛陽亢多忌剛燥往往以此等藥劑為忌即系腎陽不能化水以致便短喘咳痰飲上干亦只宜腎氣丸從陰化陽溫而不烈此方自宋元來莫不珍為至寶謂失血虛癆上熱下寒陽浮於外陰孤於內唯此方引陽入陰用藥神妙顧腎陽虛浮者此方誠為至寶若腎陰虛浮者此方又非所宜夫失血之人浮熱昏煩痰喘咳嗽多是真陰內虛陽無所守究陽之所以不守實由陰虛使然非陽虛也徑投此方陰未生而陽愈亢名為以陽生陰實則以陽促陰也如果上熱下寒外陽內陰之證則尺脈必微弱大小便必溏泄手足必清冷即渴欲飲亦是飲一溲二乃用此方最為神效設純是陰虛則此方又不宜用即欲以陽生陰亦只可少用桂附以反佐之如滋腎用知柏各五錢而桂只五分藉以從陽引陰耳豈可多用桂附而助陽以敵陰哉若是腎中陰虛火上水升凝滯為痰則宜豬苓湯主之地黃湯加麥冬五味旋覆阿膠杏仁蛤蚧牛膝亦仲景豬苓湯意而滋補之功尤多參看咯血門更詳一氣咳無痰無血但是氣嗆作咳乃失血家真陰虛損以致肺氣不斂腎氣不納其病至重最為難治審其由肺氣不斂者其人不能仰臥臥則氣逆而咳咳則心下煽動或肺葉偏枯則側臥一邊翻身則咳不休俱宜用清燥救肺湯加百合五味琥珀鐘乳石以鎮補肺金金得保養則能覆下收斂而氣自不咳審其由腎氣不納者其人短氣喘息陰火上衝兩顴發赤咽喉不利仲景謂失血脈數發熱而咳者不治即謂此陽不附陰氣不歸元之重證六味丸加沉香五味麥冬磁石以滋補鎮納之使氣既吸引歸腎而腎水滋生又有以封鎮其氣則氣自不咳逆矣或用腎氣丸加麥冬五味牛膝借桂附以引氣歸元陳修園謂肺腎不交水天俱虛用二加龍骨湯加阿膠麥冬五味豫按腎氣丸二加龍骨湯皆是腎陽虛肺陰虛上熱下寒之治法也若肺腎之陽俱虛元氣不支喘息困憊者則宜用保元湯加五味上二方又不恰切若肺腎之陰俱虛者上三方俱不中肯失血家氣喘咳逆者多是陰虛氣生於腎而主於肺肺陰足則氣道潤而不滯腎陰足則氣根蓄而內涵惟肺陰不足是以氣燥而咳腎陰不足是以氣浮而咳此乃肺腎陰虛不交之證治宜參麥地黃湯及三才湯以滋二臟之陰納肺氣則加百合五味鐘乳石納腎氣則加磁石沉香五味此外又有沖氣上逆之治法説詳吐血及六卷咳嗽門一骨蒸咳失血證久咳不止發熱盜汗世謂之骨蒸勞咳乃肝之血分夾有瘀滯癥結則肝氣鬱而不和肝寄相火肝氣即相火也相火內行三焦外行腠理血分無瘀滯則腠理無阻是以相火往來溫養肌肉而不遏抑故肌肉不寒冷相火溫之也而亦不發熱相火不遏郁之故也觀婦人經不調每遇行經必發寒熱為血分瘀滯所致則失血骨蒸為血分瘀滯郁遏相火而使然也小柴胡湯清理之若延日既久發熱咳嗽不止恐成癆瘵用團魚丸疏理肺氣滋利肝血攻補兼用方法最善一癆蟲咳心中鬱郁微煩面色乍赤乍白喉中癢不可耐咳嗽不止不知香臭宜用月華丸調肺殺蟲治之究蟲之生乃由瘀血停聚熱蒸濕腐又被肝風扇動是以化生癆蟲既變成蟲則從蟲治之而亦須兼去瘀血以除其根清濕熱以滌其源息風木以靖其機聚毒藥以殺其類此方數法兼備於治癆蟲已得大概另詳癆蟲門參看自知又有肺癰咳嗽吐膿血者另詳吐膿門又有食積之火沖肺作咳其火多在五更流入肺中而咳此病不關血分然虛人往往有之隨用小柴胡逍遙散加山楂神麯麥芽萊蔔子山梔麥冬黃昏咳嗽為陽將入陰浮火不能內斂入肺而咳宜用五味子川文蛤兜鈴等治之其餘雜血咳嗽不關血證者自有方書可查茲不具論鼻衄鼻為肺竅鼻根上接太陽經脈鼻孔下夾陽明經脈內通於肺以司呼吸乃清虛之道與天地相通之門戶宜通不宜塞宜息不宜喘宜出氣不宜出血者也今乃衄血何哉金匱謂熱傷陽絡則衄血熱傷陰絡則便血陰絡者謂軀殼之內臟腑油膜之脈絡內近腸胃故主便血陽絡者謂軀殼之外肌肉皮膚脈絡之血從陽分循經而上則干清道而為衄也然則陽絡者太陽陽明之絡脈也蓋太陽陽明統走人身軀殼之外陽絡之血傷於太陽者由背上循經脈至鼻為衄仲景所謂春夏發太陽者是也傷於陽明者由胸而上循經至鼻仲景所謂秋冬發陽明者是也今分兩條論之太陽主開春夏陽氣本應開發若一鬱閉則邪氣壅而為衄其證鼻塞頭痛寒熱昏憒或由素有鬱熱應春夏開發之令而動或由風瘟暑疫攻發而動又有傷寒失汗邪無出路因由血分泄而為衄此名紅汗乃邪欲自愈醫者不可不知然即紅汗論之可知太陽之氣不得泄於皮毛則發為紅汗即可知太陽之熱不得發越於外者必逼而為鼻衄也皮毛者肺之合太陽之氣外主皮毛內合於肺鼻又為肺之竅欲治太陽之衄者必以治肺為主觀傷寒論治太陽用麻杏理肺則知治肺即治太陽矣法宜清瀉肺火疏利肺氣肺氣清則太陽之氣自清而衄不作矣風寒外來皮毛灑淅無汗者麻黃人參芍藥湯如肺火壅盛頭昏痛氣喘脈滑大數實者人參瀉肺湯加荊芥粉葛蒲黃茅根生地童便久衄血虛用丹溪止衄散加茅花黃芩荊芥杏仁以上數方鼻塞者俱加麝香黃連蓋風寒雜證鼻塞多是外寒閉之此證鼻塞者尤多乃是內火壅之如用羌活則鼻愈塞矣故用黃連麝香以開火之閉衄血既止宜多服止衄散原方及六味地黃湯以收功又有腎經虛火浮遊上行干督脈經而衄血者必見腰痛項脊痛頭昏足厥冷等證所以然者腎經虛火上行故也宜用止衄散去黃耆加碎補牛膝續斷粉葛鹿角尖童便元參治之蓋督脈麗於太陽故以治太陽者兼治督脈亦猶衝脈麗於陽明而以治陽明者兼治衝脈也太陽為少血之經督脈乃命元之主其血均不可損衄止後即宜用地黃湯加天冬阿膠血餘五味以補之陽明主闔秋冬陰氣本應收斂若有燥火傷其脈絡熱氣浮越失其主闔之令逼血上行循經脈而出於鼻其證口渴氣喘鼻塞孔干目眩發熱或由酒火或由六氣之感總是陽明燥氣合邪而致衄血蓋陽明本氣原燥病入此經無不化而為燥治法總以平燥氣為主瀉心湯加生地花粉枳殼白芍甘草或用犀角地黃湯加黃芩升麻大解熱毒鼻衄止後宜用玉女煎加蒲黃以滋降之再用甘露飲多服以調養之肆飲梨膠藕汁萊蔔汁白蜜等皆與病宜以上兩條治法各異然鼻總系肺經之竅血總系肝經所屬故凡衄家目必昏黃仲景云目黃者衄未止目了慧者其衄已止以肝開竅於目血擾肝經故目黃也治宜和肝而其血犯肺竅出又宜和肺今且不問春夏不分秋冬總以調治肝肺為主生地黃湯治之服後衄止再服地骨皮散以滋之蓋不獨衄血宜治肝肺即一切吐咯亦無不當治肝肺也肝主血肺主氣治血者必調氣舍肝肺而何所從事哉又凡衄血久而不止去血太多熱隨血減氣亦隨血亡矣此如刀傷血出不止則氣亦隨亡而血盡則死也急用獨參湯救之手足冷氣喘促再加附子以引氣歸根如其人鼻口黑黯面目茄色乃血乘肺臟之危候緩則不救二味參蘇飲治之此等危證在所不治用參蘇飲亦理應如是救濟耳其效與否非敢期必按病在腸胃者藥到速病在經脈者藥到緩衄血病在經脈兼用外治法亦能取急效用十灰散塞鼻併吞咽十灰散為極穩妥或用人爪甲煅為末吹鼻止衄或用壁錢窠塞鼻取其脈絡以維護之龍骨吹鼻能幹結血孔免衄白礬吹鼻性走竄截血醋和土敷陰囊囊為肝所屬肝主血敷囊以收斂肝氣則肝血自止上病取下治尤有理鱔血滴鼻中鱉血點鼻溫水浸足使熱氣下引捆病人中指用濕紙貼腦頂尉斗尉紙令乾乃湯尉取火之法數者或效或不效備録其方以資採擇衄家不可發汗汗則額陷仲景已有明禁以此例推可知一切血證均不宜發汗醫者慎之雖與吐咳諸證不同然其為血一也宜參看各門庶治之百不失一腦衄腦衄者口鼻俱出血也乃鼻血多溢從口出非別有一道來血也亦非真從腦髓中來此不過甚言鼻衄之重而因名之曰腦衄耳蓋吐血多者血每嗆入鼻中故衄血多者血亦溢入口中治法用白紙折十餘疊打濕貼腦頂用尉斗尉令熱氣蒸騰其衄自止此乃因腦衄之名望文生義而出尉腦止衄之法非探本之治故有效有不效其實腦衄只鼻衄之甚者耳宜照鼻衄分經用藥乃不致循名失實腦衄治法與鼻衄同但腦衄出血既多易成虛證宜參蘇飲用人參以補之用蘇木以行之如衄甚不止身熱脈浮喘促足厥者乃氣隨血泄陰脫陽亡急危之候也宜獨參湯加附子稠煎服後得睡汗不出熱稍退氣稍息則命根乃定此等虛脫之證血家最少而最危勿因其少而誤用涼瀉目衄白珠黑珠均無出血之竅目下眼皮只有淚竅乃陽明經脈所貫注春秋傳稱蔡哀侯之淚盡繼之以血則是血自淚竅出也陽明脈起於承泣穴淚竅出血乃陽明燥熱所攻發犀角地黃湯加歸尾赤芍銀花白芷粉葛牛膝石膏草梢治之如風熱重大便閉者通脾瀉胃湯治之陽明之脈繞絡於目故凡治目多治陽明吾嘗觀審視瑤函外障目翳諸方共一百零而用大黃者七十餘方可知瀉陽明胃經之熱是治目疾一大法門治目衄者可以類椎凡白虎湯甘露飲玉女煎均治陽明方醫者審虛實先後而用之罔不奏效夫目雖陽明經所屬而實肝所開之竅也血又肝之所主故治目衄肝經又為要務地骨皮散加柴胡炒梔益母草及丹梔逍遙散治之謹按病發於肝者多是怒逆之氣火耳鳴口苦胸脅刺痛宜從肝治之可用上二方及當歸蘆薈丸龍膽瀉肝湯治之病發陽明者發熱口渴目干鼻乾大便燥結宜從陽明法治之小眼角乃少陽經脈所絡原無出血之竅少陽相火隨經脈而出衝動肝經血分則生血筋竄入瞳珠及胬肉長出亦見流血但不多耳宜小柴胡加青皮當歸紅花膽草丹皮外用杏仁白礬銅緑點之大眼角乃太陽經脈所絡名睛明穴太陽氣血充足眼角內結赤肉如珠有大眼角內不起肉珠者乃太陽之氣不足故也太陽經有風熱則大眼角生血筋胬肉或微滲血點外治總以血筋胬肉之法治之內服防風通聖散去麻黃大黃芒硝再服防風歸芎湯調之點藥如上以上兩條均非目衄正病以其起血筋亦系血分為病故兼及之此書為血説法其有目疾膜翳等項均有眼科專書盡多可採茲不具論耳衄耳中出血謂之耳衄腎開竅於耳而腎脈卻不能上頭腎與心交假心之府小腸之脈上貫於耳為司聽之神所居其形如珠皮膜包裹真水是為神之所出聲之所入內通於腦為空虛之府他物不得而擾之即或腎虛陰火上衝則為耳鳴神水不足則為耳聾亦斷無血從此出者其有血從耳出者則以足少陽膽脈繞耳前後手少陽三焦之脈入耳相火旺挾肝氣上逆及小腸相火內動因得挾血妄行或因瘟疫躁怒火氣橫行肆走空竅衄出於耳總系實邪不關虛勞治法總宜治三焦膽肝與小腸經自無不愈小柴胡湯加五苓散統治之分治肝膽宜龍膽瀉肝湯治三焦柴胡梅連散治小腸宜導赤飲加黃芩黃連薄荷川芎三經皆司相火治法大抵相同愈後皆宜常服六味地黃湯補水濟火外治法用十灰散吹耳中麝香龍骨末和吹耳中壁錢窠燒灰吹入燕窠泥塗耳前後齒衄齒雖屬腎而滿口之中皆屬於胃以口乃胃之門戶故也牙床尤為胃經脈絡所繞故凡衄血皆是胃火上炎血隨火動治法總以清理胃火為主胃中實火口渴齦腫發熱便閉脈洪數者通脾瀉胃湯加蒲黃藕節治之如大便不閉者不須下利但用清涼解之犀角地黃湯加葛根貫仲枳殼萊蔔汁胃中虛火口燥齦糜其脈細數血不足者宜甘露飲加蒲黃以止衄玉女煎引胃火以下行兼滋其陰以上兩條所論齒齦虛實二證均屬於火有火中挾風者宜加防風白芷火中挾濕者宜加防己木通亦有腎虛火旺齒豁血滲以及睡則流血醒則血止者皆陰虛血不藏之故統以六味地黃湯加牛膝二冬碎補蒲黃上盛下虛火不歸元尺脈微弱寸脈浮大者加桂附外治之法宜用冷水漱口取血遇冷則凝之義醋漱取酸以收之之義百草霜糝十灰散糝取血見黑則止亦以清降其火火降則血降也枯礬五倍子蚯蚓同為末糝更能固牙舌衄舌乃心之苗觀小兒吐舌弄舌木舌重舌皆以去心經風火為主則知舌衄皆是心火亢盛血為熱逼而滲出也治法總宜清泄心火導赤飲加黃連大力連翹蒲黃牛膝元參治之舌腫脹衄血多者為火太盛瀉心湯主之心煩神昏者安神丸加童便血餘灰治之夫舌雖心之苗然口乃胃之門戶舌在口中胃火熏之亦能出血大便祕者玉燭散加銀花治之口渴兼發熱者竹葉石膏湯加蒲黃藕節治之舌本乃肝脈所絡舌下滲血肝之邪熱四物湯加桃仁紅花炒梔丹皮牛膝赤苓重則宜用當歸蘆薈丸龍膽瀉肝湯蓋舌衄雖同而此外所見之證必顯有分別故分心胃肝三經治之非強為區別也外治之法與齒衄同大衄大衄者九竅出血之名也此非疫癘即中大毒人身止此九竅而九竅皆亂危亡之證法在不治惟有猝然驚恐而九竅出血者可用硃砂安經丸加發灰治之零腥零腥者吐出星點黃白色細如米粟大如豆粒氣極腥臭雜在漩唾之中而非漩唾乃吐血之後血分瘀熱所化或未吐血之前血分之熱化為星點先吐星點後乃吐血總系血分瘀熱變化而成治宜清熱化血降氣消痰以其似痰必假痰氣而生故也在未吐血之前而見零腥者總以降氣消痰為主蓋此時血尚未動但當治其氣分氣分清而零腥自除豁痰丸治之小柴胡湯亦治之在既吐血之後而零腥見者總以清熱化血為主以其在吐血之後乃瘀血壅熱而出故宜兼治瘀血太平丸治之生地黃散亦治之此證古書不載吾臨證往往遇之因撰其名而論列之以補血證之缺吐膿膿者血之變也血不阻氣氣不戰血則血氣調和瘡癤不生血滯氣則凝結為痛氣蒸血則腐化成膿軀殼外者易治至於吐膿則出於臟腑之內其證最危在中焦以下則便膿在中焦以上則吐膿夫人身之氣乃水所化氣即水也故血得氣之變蒸亦化而為水不名曰水而名曰膿者以其本系血質雖化為水而較水更濃也當其未化則仍是血消瘀則膿自不生及其既化則同於水逐水則膿自排去一肺癰乳上第三根肋骨間名肺募穴隱隱疼痛食豆而香是癰將成仲景云風舍於肺其人則咳口乾喘滿咽燥不渴時時吐濁沫時時振寒熱之所過血為之凝滯蓄結癰膿吐如米粥始萌可救膿成則死謂重者肺壞而死若肺不壞亦有可救故仲景又曰口中辟辟燥咳胸中隱隱作痛脈數而實喘不得臥鼻塞不聞香臭者葶藶大棗瀉肺湯主之吐膿如米粥者甘桔湯主之仲景此論非謂除此二方別無治法不過分別未成膿者當瀉實已成膿者當開結指示兩條門徑使人知所從事且曰以此湯主之明明有加減之法見於言外余因即瀉實開結二義推而廣之其成膿者用通竅活血湯加麻黃杏仁石膏甘草從表以瀉之無表證者用人參瀉肺湯加葶藶大棗從里以瀉之如病勢猛勇急須外攘內除則用防風通聖散三方力量雄厚於仲景瀉實之法庶盡其量如識力不及只用甘桔湯加荊芥薄荷杏仁黃芩亦許免疚然而無功其已成膿者急須將膿除去高者越之使從口出用千金韋莖湯或用瓜蒂散加冬瓜仁桃仁苡仁梔子或用瀉白散加黃連栝蔞皆取在膈上則吐使膿遠去以免久延為患白散尤能吐能下加升麻鬱金以助其吐下之機再加黃芩栝蔞以解其火更善如只須下瀉不宜湧吐則合甘桔瀉肺二湯再加赤豆芽苡仁防己栝蔞杏仁知母枳殼使從下降或用桔梗寧肺湯補瀉兼行如此則於仲景開結之法庶盡其妙惟收口之法仲景未言然亦可以義例求也諸瘡生肌皆用溫補肺是金臟溫則助火刑金只宜清斂以助金令使金氣足而肺自生人參清肺湯治之後服清燥救肺湯以收功一脾胃癰與肺癰治法略同但肺癰多由外感風邪而成故有發表之法脾胃癰則由濕熱酒毒七情之火內蘊而成故無發表之法胃癰初起中脘穴在臍上四寸必隱隱作痛脾癰初起章門穴在臍上二寸旁開六寸必隱隱作痛二病皆食豆而香其證寒熱如瘧皮膚甲錯腹滿咽乾治宜攻熱下血熱去而血不停更自何地釀為癰膿哉故凡內癰膿未成者以奪去瘀熱為主丹皮湯治之膿已成者以排為主膿即水也逐水即是排膿赤豆苡仁湯治之膿血既去之後則臟腑空虛見火象者人參固本湯加黃耆茯苓以清補之若現虛寒之象則用六君子湯加黃耆當歸煨薑以溫補之方外有方視其所兼之證隨宜用之筆楮難盡此外如胸背腰脅肝膈大小腸凡有瘀熱壅血均能成癰總以丹皮湯主之近上焦者去芒硝加葶藶黃耆桔梗荊芥甘草中下焦者加薑黃余詳便膿門此書原專論血證所以兼及內癰者以癰膿之病皆由血積而成知血之變癰膿即可知血之能為乾血能變癆蟲知內癰之生寒熱即可知血證之鬱熱矣但癰膿之證系血家實積與失血虛證有異然不以此反觀合勘亦無以盡血證之情偽
